<!-- ============================================================
     Modals — teleported to body for clean z-index
     ============================================================ -->

<template x-teleport="body">
  <div x-data x-cloak>

    <!-- ── Add Candidate ─────────────────────────────────── -->
    <template x-if="$store.app.modal.open && $store.app.modal.type === 'addCandidate'">
      <div class="modal-overlay" @click.self="$store.app.closeModal()">
        <div class="modal-dialog" x-data="addCandidateModal()" x-init="init()">

          <div class="modal-header">
            <span class="modal-title">Add Candidate</span>
            <button class="icon-btn-sm" @click="$store.app.closeModal()">✕</button>
          </div>

          <div class="modal-body">
            <div class="row g-3">

              <div class="col-6">
                <label class="form-label">First Name *</label>
                <input type="text" class="form-control" x-model="form.first_name"
                  :class="{ 'is-invalid': errors.first_name }">
                <div class="invalid-feedback" x-text="errors.first_name"></div>
              </div>

              <div class="col-6">
                <label class="form-label">Last Name *</label>
                <input type="text" class="form-control" x-model="form.last_name"
                  :class="{ 'is-invalid': errors.last_name }">
                <div class="invalid-feedback" x-text="errors.last_name"></div>
              </div>

              <div class="col-6">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" x-model="form.email"
                  @blur="checkDuplicates()"
                  :class="{ 'is-invalid': errors.email }">
                <div class="invalid-feedback" x-text="errors.email"></div>
              </div>

              <div class="col-6">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control"
                  :value="form.phone"
                  @input="form.phone = formatPhone($event.target.value)"
                  placeholder="(415) 555-1234">
              </div>

              <!-- Duplicate warning banner ─ shown when an existing candidate
                   already has this email. Offers Open / Add-anyway escape hatches. -->
              <template x-if="duplicates.length > 0">
                <div class="col-12">
                  <div class="dup-warning">
                    <div class="dup-warning-title">
                      <span class="material-icons mi-inline">warning</span>
                      <span x-text="duplicates.length === 1
                        ? 'This email is already in the system.'
                        : 'This email matches ' + duplicates.length + ' existing records.'"></span>
                    </div>
                    <ul class="dup-warning-list">
                      <template x-for="d in duplicates" :key="d.id">
                        <li>
                          <button type="button" class="dup-link"
                            @click="openExistingCandidate(d.id)">
                            <strong x-text="(d.first_name || '') + ' ' + (d.last_name || '')"></strong>
                          </button>
                          <span class="dup-meta">
                            on <span x-text="d.job_title || '—'"></span>
                            · <span class="stage-chip"
                              :style="stageChipStyle(d.stage_color)"
                              x-text="d.stage_name || '—'"></span>
                            · <span x-text="d.status"></span>
                          </span>
                        </li>
                      </template>
                    </ul>
                    <div class="dup-warning-actions">
                      <label class="dup-override">
                        <input type="checkbox" x-model="forceCreate">
                        <span>Add this as a new record anyway</span>
                      </label>
                    </div>
                  </div>
                </div>
              </template>

              <div class="col-12">
                <label class="form-label">Job Opening *</label>
                <select class="form-select" x-model="form.job_id" :class="{ 'is-invalid': errors.job_id }">
                  <option value="">— Select job —</option>
                  <template x-for="j in openJobs" :key="j.id">
                    <option :value="j.id" x-text="j.title"></option>
                  </template>
                </select>
                <div class="invalid-feedback" x-text="errors.job_id"></div>
              </div>

              <div class="col-4">
                <label class="form-label">Source</label>
                <select class="form-select" x-model="form.source_id" @change="onSourceChange()">
                  <option value="">— None —</option>
                  <template x-for="s in $store.app.settings.sources.filter(x => x.is_enabled)" :key="s.id">
                    <option :value="s.id" x-text="s.name"></option>
                  </template>
                </select>
              </div>

              <div class="col-4">
                <label class="form-label">Motion</label>
                <select class="form-select" x-model="form.motion">
                  <option>Inbound</option>
                  <option>Outbound</option>
                </select>
              </div>

              <div class="col-4">
                <label class="form-label">Region</label>
                <select class="form-select" x-model="form.region_id">
                  <option value="">— None —</option>
                  <template x-for="r in $store.app.settings.regions.filter(x => x.is_enabled)" :key="r.id">
                    <option :value="r.id" x-text="r.name"></option>
                  </template>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">LinkedIn URL</label>
                <input type="url" class="form-control" x-model="form.linkedin_url" placeholder="https://linkedin.com/in/…">
              </div>

              <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea class="form-control" rows="2" x-model="form.notes"></textarea>
              </div>

            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-outline-secondary" @click="$store.app.closeModal()">Cancel</button>
            <button class="btn btn-primary" :disabled="submitting" @click="submit()"
              x-text="submitting ? 'Adding…' : 'Add Candidate'"></button>
          </div>
        </div>
      </div>
    </template>

    <!-- ── Import Candidates from CSV ───────────────────── -->
    <template x-if="$store.app.modal.open && $store.app.modal.type === 'importCsv'">
      <div class="modal-overlay" @click.self="$store.app.closeModal()">
        <div class="modal-dialog modal-lg" x-data="importCsvModal()" x-init="init()">
          <div class="modal-header">
            <span class="modal-title">Import Candidates</span>
            <button class="icon-btn-sm" @click="$store.app.closeModal()">\u2715</button>
          </div>
          <div class="modal-body">

            <!-- Step 1: paste CSV -->
            <template x-if="step === 'paste'">
              <div>
                <p class="modal-lead">
                  Paste your CSV below. First row should be headers. Required columns: <strong>first_name</strong>, <strong>last_name</strong>, <strong>email</strong>, <strong>job</strong> (by exact title).
                  Optional: phone, source, motion, region, notes.
                </p>
                <div class="mb-2">
                  <label class="form-label">Job to assign (overrides CSV's job column if set)</label>
                  <select class="form-select" x-model="defaultJobId">
                    <option value="">\u2014 Use 'job' column from CSV \u2014</option>
                    <template x-for="j in openJobs" :key="j.id">
                      <option :value="j.id" x-text="j.title"></option>
                    </template>
                  </select>
                </div>
                <textarea class="form-control csv-textarea" rows="10"
                  x-model="csvText"
                  :placeholder="csvPlaceholder"></textarea>
                <div class="modal-hint">
                  Tip: copy rows straight from Google Sheets or Excel \u2014 the tab separator is handled automatically.
                </div>
              </div>
            </template>

            <!-- Step 2: preview parsed rows -->
            <template x-if="step === 'preview'">
              <div>
                <p class="modal-lead">
                  <strong x-text="parsed.length"></strong>
                  row<span x-text="parsed.length === 1 ? '' : 's'"></span> parsed.
                  <template x-if="parseWarnings.length > 0">
                    <span class="dup-warning-title" style="font-size:13px;margin-left:10px;">
                      <span class="material-icons mi-inline">warning</span>
                      <span x-text="parseWarnings.length + ' issues'"></span>
                    </span>
                  </template>
                </p>

                <template x-if="parseWarnings.length > 0">
                  <ul class="import-warnings">
                    <template x-for="w in parseWarnings" :key="w">
                      <li x-text="w"></li>
                    </template>
                  </ul>
                </template>

                <div class="table-wrapper" style="max-height: 320px; overflow-y: auto;">
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th>#</th><th>Name</th><th>Email</th><th>Phone</th>
                        <th>Job</th><th>Source</th><th>Motion</th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="(row, i) in parsed" :key="i">
                        <tr :class="{ 'row-invalid': !row.job_id }">
                          <td x-text="i + 1"></td>
                          <td x-text="row.first_name + ' ' + row.last_name"></td>
                          <td x-text="row.email"></td>
                          <td x-text="row.phone || '\u2014'"></td>
                          <td :class="{ 'text-danger': !row.job_id }">
                            <span x-text="row._job_label || '\u26A0 not matched'"></span>
                          </td>
                          <td x-text="row._source_label || '\u2014'"></td>
                          <td x-text="row.motion || 'Inbound'"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>

                <div class="modal-hint">
                  Rows missing a job will be skipped. Fix your CSV or pick a default job above, then re-parse.
                </div>
              </div>
            </template>

            <!-- Step 3: results after import -->
            <template x-if="step === 'done'">
              <div>
                <p class="modal-lead">
                  <span class="material-icons mi-inline" style="color:var(--success);">check_circle</span>
                  Created <strong x-text="result.created"></strong> candidates.
                  <template x-if="result.skipped && result.skipped.length > 0">
                    <span style="color:var(--danger);">
                      Skipped <strong x-text="result.skipped.length"></strong>.
                    </span>
                  </template>
                </p>
                <template x-if="result.skipped && result.skipped.length > 0">
                  <div>
                    <div style="font-weight:700;margin:8px 0 4px;">Skipped rows:</div>
                    <ul class="import-warnings">
                      <template x-for="s in result.skipped" :key="s.row">
                        <li>
                          <strong x-text="'Row ' + s.row + ':'"></strong>
                          <span x-text="s.email"></span>
                          \u2014 <span x-text="s.reason"></span>
                        </li>
                      </template>
                    </ul>
                  </div>
                </template>
              </div>
            </template>

          </div>

          <div class="modal-footer">
            <template x-if="step === 'paste'">
              <div class="d-flex gap-2" style="width:100%;justify-content:flex-end;">
                <button class="btn btn-outline-secondary" @click="$store.app.closeModal()">Cancel</button>
                <button class="btn btn-primary" :disabled="!csvText.trim()" @click="parse()">Parse CSV</button>
              </div>
            </template>
            <template x-if="step === 'preview'">
              <div class="d-flex gap-2" style="width:100%;justify-content:space-between;">
                <button class="btn btn-outline-secondary" @click="step = 'paste'">\u2190 Back</button>
                <button class="btn btn-primary"
                  :disabled="submitting || parsed.filter(function(r){return r.job_id;}).length === 0"
                  @click="submit()"
                  x-text="submitting ? 'Importing\u2026' : ('Import ' + parsed.filter(function(r){return r.job_id;}).length + ' candidates')"></button>
              </div>
            </template>
            <template x-if="step === 'done'">
              <button class="btn btn-primary" @click="$store.app.closeModal()">Done</button>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- ── Reject Candidate ─────────────────────────────── -->
    <template x-if="$store.app.modal.open && $store.app.modal.type === 'confirmReject'">
      <div class="modal-overlay" @click.self="$store.app.closeModal()">
        <div class="modal-dialog" x-data="rejectModal()" x-init="init()">
          <div class="modal-header">
            <span class="modal-title">Reject Candidate</span>
            <button class="icon-btn-sm" @click="$store.app.closeModal()">\u2715</button>
          </div>

          <div class="modal-body">
            <p class="modal-lead">
              Reject <strong x-text="$store.app.modal.data?.candidateName || 'candidate'"></strong>?
            </p>

            <div class="mb-3">
              <label class="form-label">Reason *</label>
              <select class="form-select" x-model="refuseReasonId"
                :class="{ 'is-invalid': error }">
                <option value="">— Select a reason —</option>
                <template x-for="r in $store.app.settings.refuseReasons.filter(x => x.is_enabled)"
                          :key="r.id">
                  <option :value="r.id" x-text="r.name"></option>
                </template>
              </select>
              <div class="invalid-feedback" x-show="error" x-text="error"></div>
            </div>

            <div class="mb-0">
              <label class="form-label">Note (optional)</label>
              <textarea class="form-control" rows="2" x-model="note"
                placeholder="Added to the candidate's notes for context."></textarea>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-outline-secondary" @click="$store.app.closeModal()">Cancel</button>
            <button class="btn btn-danger" :disabled="submitting" @click="submit()">
              <span x-text="submitting ? 'Rejecting\u2026' : 'Reject'"></span>
            </button>
          </div>
        </div>
      </div>
    </template>

    <!-- ── Add / Edit Job ───────────────────────────────── -->
    <template x-if="$store.app.modal.open && ($store.app.modal.type === 'addJob' || $store.app.modal.type === 'editJob')">
      <div class="modal-overlay" @click.self="$store.app.closeModal()">
        <div class="modal-dialog modal-lg" x-data="jobModal()" x-init="init()">

          <div class="modal-header">
            <span class="modal-title" x-text="$store.app.modal.type === 'editJob' ? 'Edit Job' : 'Add Job Opening'"></span>
            <button class="icon-btn-sm" @click="$store.app.closeModal()">✕</button>
          </div>

          <div class="modal-body">
            <div class="row g-3">

              <div class="col-8">
                <label class="form-label">Title *</label>
                <input type="text" class="form-control" x-model="form.title"
                  :class="{ 'is-invalid': errors.title }">
                <div class="invalid-feedback" x-text="errors.title"></div>
              </div>

              <div class="col-4">
                <label class="form-label">Status</label>
                <select class="form-select" x-model="form.status">
                  <option>Open</option>
                  <option>On Hold</option>
                  <option>Closed</option>
                </select>
              </div>

              <div class="col-6">
                <label class="form-label">Department</label>
                <input type="text" class="form-control" x-model="form.department">
              </div>

              <div class="col-6">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" x-model="form.location">
              </div>

              <div class="col-4">
                <label class="form-label">Region</label>
                <select class="form-select" x-model="form.region_id">
                  <option value="">— None —</option>
                  <template x-for="r in $store.app.settings.regions.filter(x => x.is_enabled)" :key="r.id">
                    <option :value="r.id" x-text="r.name"></option>
                  </template>
                </select>
              </div>

              <div class="col-4">
                <label class="form-label">Head Count</label>
                <input type="number" class="form-control" x-model.number="form.head_count" min="1">
              </div>

              <div class="col-4">
                <label class="form-label">Recruiter</label>
                <select class="form-select" x-model="form.recruiter_id">
                  <option value="">— Unassigned —</option>
                  <template x-for="r in $store.app.settings.recruiters.filter(x => x.is_active)" :key="r.id">
                    <option :value="r.id" x-text="r.name"></option>
                  </template>
                </select>
              </div>

              <div class="col-4">
                <label class="form-label">Salary Range</label>
                <input type="text" class="form-control" x-model="form.salary_range" placeholder="e.g. $60k–$80k">
              </div>

              <div class="col-4">
                <label class="form-label">Posted</label>
                <input type="date" class="form-control" x-model="form.posted_date">
              </div>

              <div class="col-4">
                <label class="form-label">Expires</label>
                <input type="date" class="form-control" x-model="form.posting_expires">
              </div>

              <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea class="form-control" rows="2" x-model="form.notes"></textarea>
              </div>

            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-outline-secondary" @click="$store.app.closeModal()">Cancel</button>
            <button class="btn btn-primary" :disabled="submitting" @click="submit()"
              x-text="submitting ? 'Saving…' : ($store.app.modal.type === 'editJob' ? 'Save Changes' : 'Add Job')"></button>
          </div>
        </div>
      </div>
    </template>

  </div>
</template>

<script>
document.addEventListener('alpine:init', function () {

  /**
   * Bulk CSV import — 3 steps: paste → preview → done.
   *
   * Parser accepts CSV or TSV (tab-separated, matching Google Sheets' copy
   * output) and both comma and semicolon separators. Header row is required.
   * Column names are matched case-insensitively and tolerate underscores,
   * spaces, and dashes (so "First Name", "first_name", "firstName" all work).
   *
   * Job matching is by exact title; if no match AND the user selected a
   * default job, the default wins. Rows without a matched job are marked
   * invalid in preview and skipped at import time.
   */
  Alpine.data('importCsvModal', function () {
    return {
      step: 'paste',
      csvText: '',
      defaultJobId: '',
      parsed: [],
      parseWarnings: [],
      submitting: false,
      result: { created: 0, skipped: [] },
      openJobs: [],
      csvPlaceholder:
        'first_name,last_name,email,phone,job,source,motion,notes\n' +
        'Jane,Doe,jane@example.com,(415) 555-1234,Sales BDR,LinkedIn,Inbound,"Strong resume"\n' +
        'Alex,Chen,alex@example.com,,Account Executive,Referral,,"Referred by Brad"',

      init: async function () {
        this.step = 'paste';
        this.csvText = '';
        this.parsed = [];
        this.parseWarnings = [];
        this.defaultJobId = '';
        try { this.openJobs = await gasCall('getJobOpenings', 'Open'); }
        catch (e) { /* non-fatal — will show empty default-job dropdown */ }
      },

      parse: function () {
        var text = this.csvText.trim();
        if (!text) return;

        // Detect separator: tab wins if present (spreadsheet copy/paste).
        // Otherwise comma. Semicolons handled as fallback for locales.
        var sep = text.indexOf('\t') > -1 ? '\t'
                : text.indexOf(';') > -1 && text.indexOf(',') === -1 ? ';'
                : ',';

        var lines = text.split(/\r?\n/).filter(function (l) { return l.trim(); });
        if (lines.length < 2) {
          this.parseWarnings = ['CSV needs a header row plus at least one data row.'];
          return;
        }

        var headerLine = this.splitCsvRow(lines[0], sep);
        var headerMap = {};
        headerLine.forEach(function (h, i) {
          var k = String(h).toLowerCase().replace(/[^a-z0-9]/g, '');
          headerMap[k] = i;
        });

        // Column resolver — maps many variants to canonical field name
        function col(row, variants) {
          for (var i = 0; i < variants.length; i++) {
            var key = variants[i].replace(/[^a-z0-9]/g, '');
            if (headerMap[key] != null) return (row[headerMap[key]] || '').trim();
          }
          return '';
        }

        var warnings = [];
        var store = this.$store.app;
        var jobs = this.openJobs.concat(); // open jobs
        // Also include non-open jobs as fallback — user might import into closed roles
        try {
          // not critical — if this fails we just use openJobs
        } catch (e) { /* ignore */ }

        var rows = [];
        for (var li = 1; li < lines.length; li++) {
          var cells = this.splitCsvRow(lines[li], sep);
          var firstName = col(cells, ['firstname', 'first', 'fname']);
          var lastName  = col(cells, ['lastname', 'last', 'lname', 'surname']);
          var email     = col(cells, ['email', 'emailaddress']);
          var phone     = col(cells, ['phone', 'phonenumber', 'mobile', 'cell']);
          var jobTitle  = col(cells, ['job', 'jobopening', 'jobtitle', 'role', 'position']);
          var sourceN   = col(cells, ['source']);
          var motion    = col(cells, ['motion']);
          var notes     = col(cells, ['notes', 'comment', 'comments']);
          var regionN   = col(cells, ['region']);

          if (!firstName && !lastName && !email) continue;  // blank line

          var row = {
            first_name: firstName,
            last_name:  lastName,
            email:      email,
            phone:      phone ? formatPhone(phone) : '',
            job_id:     null,
            _job_label: '',
            source_id:  null,
            _source_label: '',
            region_id:  null,
            motion:     (motion === 'Outbound' ? 'Outbound' : 'Inbound'),
            notes:      notes,
          };

          // Default job override
          if (this.defaultJobId) {
            row.job_id = parseInt(this.defaultJobId, 10);
            var defJob = jobs.find(function (j) { return j.id === row.job_id; });
            if (defJob) row._job_label = defJob.title;
          } else if (jobTitle) {
            var match = jobs.find(function (j) {
              return j.title.toLowerCase() === jobTitle.toLowerCase();
            });
            if (match) { row.job_id = match.id; row._job_label = match.title; }
            else { warnings.push('Row ' + (li + 1) + ': job "' + jobTitle + '" not found'); }
          } else {
            warnings.push('Row ' + (li + 1) + ': no job specified and no default set');
          }

          if (sourceN) {
            var src = store.settings.sources.find(function (s) {
              return s.name.toLowerCase() === sourceN.toLowerCase();
            });
            if (src) { row.source_id = src.id; row._source_label = src.name; }
            else { warnings.push('Row ' + (li + 1) + ': source "' + sourceN + '" not found (skipping source)'); }
          }

          if (regionN) {
            var reg = store.settings.regions.find(function (r) {
              return r.name.toLowerCase() === regionN.toLowerCase();
            });
            if (reg) row.region_id = reg.id;
          }

          rows.push(row);
        }

        if (rows.length === 0) {
          this.parseWarnings = ['No valid rows found. Check that your first row is headers.'];
          return;
        }

        this.parsed = rows;
        this.parseWarnings = warnings.slice(0, 20);
        this.step = 'preview';
      },

      // Minimal RFC-4180 row splitter — handles quoted fields with embedded
      // separators/newlines/quotes. We don't support multi-line fields in
      // the initial paste (too exotic), so this splits a single line only.
      splitCsvRow: function (line, sep) {
        var out = [];
        var i = 0, n = line.length, cur = '', inQuote = false;
        while (i < n) {
          var ch = line[i];
          if (inQuote) {
            if (ch === '"' && line[i + 1] === '"') { cur += '"'; i += 2; continue; }
            if (ch === '"') { inQuote = false; i++; continue; }
            cur += ch; i++; continue;
          }
          if (ch === '"') { inQuote = true; i++; continue; }
          if (ch === sep) { out.push(cur); cur = ''; i++; continue; }
          cur += ch; i++;
        }
        out.push(cur);
        return out.map(function (s) { return s.trim(); });
      },

      submit: async function () {
        this.submitting = true;
        var toSend = this.parsed
          .filter(function (r) { return r.job_id; })
          .map(function (r) {
            var payload = {};
            ['first_name','last_name','email','phone','job_id','source_id','region_id','motion','notes'].forEach(function (k) {
              if (r[k] != null && r[k] !== '') payload[k] = r[k];
            });
            return payload;
          });
        try {
          this.result = await gasCall('bulkCreateCandidates', toSend);
          this.step = 'done';
          var root = Alpine.$data(document.querySelector('#app'));
          if (root) await root.reloadAll();
        } catch (e) {
          this.$store.app.toastError('Import failed: ' + e.message);
        } finally { this.submitting = false; }
      },
    };
  });

  Alpine.data('rejectModal', function () {
    return {
      refuseReasonId: '',
      note: '',
      error: '',
      submitting: false,

      init: function () {
        this.refuseReasonId = '';
        this.note = '';
        this.error = '';
      },

      submit: async function () {
        if (!this.refuseReasonId) {
          this.error = 'Pick a reason to reject this candidate.';
          return;
        }
        this.error = '';
        this.submitting = true;
        var candidateId = this.$store.app.modal.data?.candidateId;
        var reasonId = parseInt(this.refuseReasonId, 10);
        try {
          await gasCall('rejectCandidate', candidateId, reasonId);
          // If a note was provided, append it to the candidate's notes.
          if (this.note && this.note.trim()) {
            try {
              var detail = await gasCall('getCandidateDetail', candidateId);
              var existing = (detail.candidate.notes || '').trim();
              var stamp = '[Rejected ' + new Date().toISOString().split('T')[0] + '] ' + this.note.trim();
              var combined = existing ? existing + '\n\n' + stamp : stamp;
              await gasCall('updateCandidate', candidateId, { notes: combined });
            } catch (e) { /* non-fatal — reject already succeeded */ }
          }
          this.$store.app.toastSuccess('Candidate rejected.');
          this.$store.app.closeModal();
          this.$store.app.closePeek();
          var root = Alpine.$data(document.querySelector('#app'));
          if (root) await root.reloadAll();
        } catch (e) {
          this.$store.app.toastError('Reject failed: ' + e.message);
        } finally { this.submitting = false; }
      },
    };
  });

  Alpine.data('addCandidateModal', function () {
    return {
      submitting: false, openJobs: [], errors: {},
      duplicates: [],          // populated when email matches an existing candidate
      duplicatesChecked: '',   // the email we last checked, to avoid re-query spam
      forceCreate: false,      // user explicitly chose "Add anyway" after seeing dupes
      form: {
        first_name: '', last_name: '', email: '', phone: '',
        job_id: '', source_id: '', region_id: '',
        motion: 'Inbound', linkedin_url: '', notes: '',
      },

      init: async function () {
        try { this.openJobs = await gasCall('getJobOpenings', 'Open'); }
        catch (e) { this.$store.app.toastError('Could not load jobs.'); }
      },

      onSourceChange: function () {
        if (!this.form.source_id) return;
        var id = parseInt(this.form.source_id, 10);
        var src = this.$store.app.settings.sources.find(function (s) { return s.id === id; });
        if (src) this.form.motion = src.default_motion;
      },

      // Called on email blur — checks for duplicates but doesn't block anything yet
      checkDuplicates: async function () {
        var email = (this.form.email || '').trim().toLowerCase();
        if (!email) { this.duplicates = []; this.duplicatesChecked = ''; this.forceCreate = false; return; }
        if (email === this.duplicatesChecked) return;   // already checked this exact value
        this.duplicatesChecked = email;
        this.forceCreate = false;
        try {
          this.duplicates = await gasCall('findDuplicateCandidatesByEmail', email);
        } catch (err) {
          this.duplicates = [];   // non-fatal — don't block submit on a check failure
        }
      },

      openExistingCandidate: function (id) {
        this.$store.app.closeModal();
        this.$store.app.openPeek(id);
      },

      validate: function () {
        var e = {};
        if (!this.form.first_name.trim()) e.first_name = 'Required.';
        if (!this.form.last_name.trim()) e.last_name = 'Required.';
        if (!this.form.email.trim()) e.email = 'Required.';
        if (!this.form.job_id) e.job_id = 'Pick a job.';
        this.errors = e;
        return Object.keys(e).length === 0;
      },

      submit: async function () {
        if (!this.validate()) return;
        // If we found duplicates and the user hasn't explicitly opted to add anyway,
        // hold the submit — the warning banner will render in the modal body.
        if (this.duplicates.length > 0 && !this.forceCreate) {
          this.$store.app.toastError('Already have someone with that email \u2014 confirm below to add anyway.');
          return;
        }
        this.submitting = true;
        try {
          await gasCall('createCandidate', {
            first_name: this.form.first_name.trim(),
            last_name: this.form.last_name.trim(),
            email: this.form.email.trim(),
            phone: this.form.phone || '',
            job_id: parseInt(this.form.job_id, 10),
            source_id: this.form.source_id ? parseInt(this.form.source_id, 10) : null,
            region_id: this.form.region_id ? parseInt(this.form.region_id, 10) : null,
            motion: this.form.motion,
            linkedin_url: this.form.linkedin_url || '',
            notes: this.form.notes || '',
          });
          this.$store.app.toastSuccess(
            this.duplicates.length > 0 ? 'Duplicate candidate added.' : 'Candidate added.'
          );
          this.$store.app.closeModal();
          var root = Alpine.$data(document.querySelector('#app'));
          if (root) await root.reloadAll();
        } catch (e) {
          this.$store.app.toastError('Could not add: ' + e.message);
        } finally { this.submitting = false; }
      },
    };
  });

  Alpine.data('jobModal', function () {
    return {
      submitting: false, errors: {},
      form: {
        title: '', department: '', location: '', region_id: '',
        status: 'Open', head_count: 1, recruiter_id: '',
        salary_range: '', posted_date: new Date().toISOString().split('T')[0],
        closes_date: '', posting_expires: '', notes: '',
      },

      init: function () {
        if (this.$store.app.modal.type === 'editJob' && this.$store.app.modal.data && this.$store.app.modal.data.job) {
          var j = this.$store.app.modal.data.job;
          this.form = {
            title: j.title || '', department: j.department || '', location: j.location || '',
            region_id: j.region_id || '', status: j.status || 'Open',
            head_count: j.head_count || 1, recruiter_id: j.recruiter_id || '',
            salary_range: j.salary_range || '', posted_date: j.posted_date || '',
            closes_date: j.closes_date || '', posting_expires: j.posting_expires || '',
            notes: j.notes || '',
          };
        }
      },

      validate: function () {
        var e = {};
        if (!this.form.title.trim()) e.title = 'Title required.';
        this.errors = e;
        return Object.keys(e).length === 0;
      },

      submit: async function () {
        if (!this.validate()) return;
        this.submitting = true;
        try {
          var payload = {
            title: this.form.title.trim(),
            department: this.form.department || '',
            location: this.form.location || '',
            region_id: this.form.region_id ? parseInt(this.form.region_id, 10) : null,
            status: this.form.status,
            head_count: parseInt(this.form.head_count, 10) || 1,
            recruiter_id: this.form.recruiter_id ? parseInt(this.form.recruiter_id, 10) : null,
            salary_range: this.form.salary_range || '',
            posted_date: this.form.posted_date || '',
            closes_date: this.form.closes_date || '',
            posting_expires: this.form.posting_expires || '',
            notes: this.form.notes || '',
          };
          if (this.$store.app.modal.type === 'editJob') {
            await gasCall('updateJobOpening', this.$store.app.modal.data.job.id, payload);
            this.$store.app.toastSuccess('Job updated.');
          } else {
            await gasCall('createJobOpening', payload);
            this.$store.app.toastSuccess('Job created.');
          }
          this.$store.app.closeModal();
          var root = Alpine.$data(document.querySelector('#app'));
          if (root) {
            root.jobs = await gasCall('getJobOpenings');
            await root.loadCandidates();
          }
        } catch (e) {
          this.$store.app.toastError('Save failed: ' + e.message);
        } finally { this.submitting = false; }
      },
    };
  });

});
</script>
