<!-- ============================================================
     Modals — teleported to body for clean z-index
     ============================================================ -->

<template x-teleport="body">
  <div x-data x-cloak>

    <!-- ── Add Candidate ─────────────────────────────────── -->
    <template x-if="$store.app.modal.open && $store.app.modal.type === 'addCandidate'">
      <div class="modal-overlay" @click.self="$store.app.closeModal()">
        <div class="modal-dialog" x-data="addCandidateModal()" x-init="init()">

          <div class="modal-header">
            <span class="modal-title">Add Candidate</span>
            <button class="icon-btn-sm" @click="$store.app.closeModal()">✕</button>
          </div>

          <div class="modal-body">
            <div class="row g-3">

              <div class="col-6">
                <label class="form-label">First Name *</label>
                <input type="text" class="form-control" x-model="form.first_name"
                  :class="{ 'is-invalid': errors.first_name }">
                <div class="invalid-feedback" x-text="errors.first_name"></div>
              </div>

              <div class="col-6">
                <label class="form-label">Last Name *</label>
                <input type="text" class="form-control" x-model="form.last_name"
                  :class="{ 'is-invalid': errors.last_name }">
                <div class="invalid-feedback" x-text="errors.last_name"></div>
              </div>

              <div class="col-6">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" x-model="form.email"
                  @blur="checkDuplicates()"
                  :class="{ 'is-invalid': errors.email }">
                <div class="invalid-feedback" x-text="errors.email"></div>
              </div>

              <div class="col-6">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control"
                  :value="form.phone"
                  @input="form.phone = formatPhone($event.target.value)"
                  placeholder="(415) 555-1234">
              </div>

              <!-- Duplicate warning banner ─ shown when an existing candidate
                   already has this email. Offers Open / Add-anyway escape hatches. -->
              <template x-if="duplicates.length > 0">
                <div class="col-12">
                  <div class="dup-warning">
                    <div class="dup-warning-title">
                      <span class="material-icons mi-inline">warning</span>
                      <span x-text="duplicates.length === 1
                        ? 'This email is already in the system.'
                        : 'This email matches ' + duplicates.length + ' existing records.'"></span>
                    </div>
                    <ul class="dup-warning-list">
                      <template x-for="d in duplicates" :key="d.id">
                        <li>
                          <button type="button" class="dup-link"
                            @click="openExistingCandidate(d.id)">
                            <strong x-text="(d.first_name || '') + ' ' + (d.last_name || '')"></strong>
                          </button>
                          <span class="dup-meta">
                            on <span x-text="d.job_title || '—'"></span>
                            · <span class="stage-chip"
                              :style="stageChipStyle(d.stage_color)"
                              x-text="d.stage_name || '—'"></span>
                            · <span x-text="d.status"></span>
                          </span>
                        </li>
                      </template>
                    </ul>
                    <div class="dup-warning-actions">
                      <label class="dup-override">
                        <input type="checkbox" x-model="forceCreate">
                        <span>Add this as a new record anyway</span>
                      </label>
                    </div>
                  </div>
                </div>
              </template>

              <div class="col-12">
                <label class="form-label">Job Opening *</label>
                <select class="form-select" x-model="form.job_id" @change="onJobChange()"
                  :class="{ 'is-invalid': errors.job_id }">
                  <option value="">— Select job —</option>
                  <template x-for="j in openJobs" :key="j.id">
                    <option :value="j.id" x-text="j.title"></option>
                  </template>
                </select>
                <div class="invalid-feedback" x-text="errors.job_id"></div>
              </div>

              <div class="col-6">
                <label class="form-label">Recruiter</label>
                <select class="form-select" x-model="form.recruiter_id">
                  <option value="">— Auto-assign from job —</option>
                  <template x-for="r in $store.app.settings.recruiters.filter(x => x.is_active)" :key="r.id">
                    <option :value="r.id" x-text="r.name"></option>
                  </template>
                </select>
                <div class="form-text">Leave on auto-assign to inherit the job's recruiter.</div>
              </div>

              <div class="col-6">
                <label class="form-label">Source</label>
                <select class="form-select" x-model="form.source_id" @change="onSourceChange()">
                  <option value="">— None —</option>
                  <template x-for="s in $store.app.settings.sources.filter(x => x.is_enabled)" :key="s.id">
                    <option :value="s.id" x-text="s.name"></option>
                  </template>
                </select>
              </div>

              <div class="col-6">
                <label class="form-label">Motion</label>
                <select class="form-select" x-model="form.motion">
                  <option>Inbound</option>
                  <option>Outbound</option>
                </select>
              </div>

              <div class="col-6">
                <label class="form-label">Region</label>
                <select class="form-select" x-model="form.region_id">
                  <option value="">— None —</option>
                  <template x-for="r in $store.app.settings.regions.filter(x => x.is_enabled)" :key="r.id">
                    <option :value="r.id" x-text="r.name"></option>
                  </template>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">LinkedIn URL</label>
                <input type="url" class="form-control" x-model="form.linkedin_url" placeholder="https://linkedin.com/in/…">
              </div>

              <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea class="form-control" rows="2" x-model="form.notes"></textarea>
              </div>

            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-outline-secondary" @click="$store.app.closeModal()">Cancel</button>
            <button class="btn btn-primary" :disabled="submitting" @click="submit()"
              x-text="submitting ? 'Adding…' : 'Add Candidate'"></button>
          </div>
        </div>
      </div>
    </template>

    <!-- ── Reject Candidate ─────────────────────────────── -->
    <template x-if="$store.app.modal.open && $store.app.modal.type === 'confirmReject'">
      <div class="modal-overlay" @click.self="$store.app.closeModal()">
        <div class="modal-dialog" x-data="rejectModal()" x-init="init()">
          <div class="modal-header">
            <span class="modal-title"
              x-text="(($store.app.modal.data || {}).bulk) ? ('Reject ' + ((($store.app.modal.data || {}).ids || []).length) + ' candidates') : 'Reject Candidate'"></span>
            <button class="icon-btn-sm" @click="$store.app.closeModal()">&times;</button>
          </div>

          <div class="modal-body">
            <template x-if="!(($store.app.modal.data || {}).bulk)">
              <p class="modal-lead">
                Reject <strong x-text="(($store.app.modal.data || {}).candidateName) || 'candidate'"></strong>?
              </p>
            </template>
            <template x-if="(($store.app.modal.data || {}).bulk)">
              <div>
                <p class="modal-lead">
                  Reject <strong x-text="((($store.app.modal.data || {}).ids) || []).length"></strong> selected candidates?
                  The same reason will be applied to all of them.
                </p>
                <div class="mb-3">
                  <div class="form-label">Selected candidates</div>
                  <div class="dup-warning" style="max-height:140px; overflow:auto;">
                    <template x-for="(n, idx) in ((($store.app.modal.data || {}).names) || []).slice(0, 8)" :key="idx">
                      <div style="font-size:12.5px; margin-bottom:2px;" x-text="'\u2022 ' + n"></div>
                    </template>
                    <template x-if="((($store.app.modal.data || {}).names) || []).length > 8">
                      <div class="dup-meta"
                        x-text="'+' + (((($store.app.modal.data || {}).names) || []).length - 8) + ' more'"></div>
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <div class="mb-3">
              <label class="form-label">Reason *</label>
              <select class="form-select" x-model="refuseReasonId"
                :class="{ 'is-invalid': error }">
                <option value="">&mdash; Select a reason &mdash;</option>
                <template x-for="r in $store.app.settings.refuseReasons.filter(x => x.is_enabled)"
                          :key="r.id">
                  <option :value="r.id" x-text="r.name"></option>
                </template>
              </select>
              <div class="invalid-feedback" x-show="error" x-text="error"></div>
            </div>

            <div class="mb-0">
              <label class="form-label">Note (optional)</label>
              <textarea class="form-control" rows="2" x-model="note"
                placeholder="Added to the candidate's notes for context."></textarea>
            </div>
            <template x-if="(($store.app.modal.data || {}).bulk)">
              <div class="form-check mt-3">
                <input class="form-check-input" type="checkbox" id="bulkRejectConfirm"
                  x-model="bulkConfirmed">
                <label class="form-check-label" for="bulkRejectConfirm">
                  I understand this will reject all selected candidates.
                </label>
              </div>
            </template>
          </div>

          <div class="modal-footer">
            <button class="btn btn-outline-secondary" @click="$store.app.closeModal()">Cancel</button>
            <button class="btn btn-danger"
              :disabled="rejectButtonDisabled()"
              @click="submit()">
              <span x-text="submitting ? 'Rejecting…' : 'Reject'"></span>
            </button>
          </div>
        </div>
      </div>
    </template>

    <!-- ── Add / Edit Job ───────────────────────────────── -->
    <template x-if="$store.app.modal.open && ($store.app.modal.type === 'addJob' || $store.app.modal.type === 'editJob')">
      <div class="modal-overlay" @click.self="$store.app.closeModal()">
        <div class="modal-dialog modal-lg" x-data="jobModal()" x-init="init()">

          <div class="modal-header">
            <span class="modal-title" x-text="$store.app.modal.type === 'editJob' ? 'Edit Job' : 'Add Job Opening'"></span>
            <button class="icon-btn-sm" @click="$store.app.closeModal()">✕</button>
          </div>

          <div class="modal-body">
            <div class="row g-3">

              <div class="col-8">
                <label class="form-label">Title *</label>
                <input type="text" class="form-control" x-model="form.title"
                  :class="{ 'is-invalid': errors.title }">
                <div class="invalid-feedback" x-text="errors.title"></div>
              </div>

              <div class="col-4">
                <label class="form-label">Status</label>
                <select class="form-select" x-model="form.status">
                  <option>Open</option>
                  <option>On Hold</option>
                  <option>Closed</option>
                </select>
              </div>

              <div class="col-6">
                <label class="form-label">Department</label>
                <input type="text" class="form-control" x-model="form.department">
              </div>

              <div class="col-6">
                <label class="form-label">Location</label>
                <div class="input-with-quick">
                  <input type="text" class="form-control" x-model="form.location"
                    placeholder="Remote, Dallas, NYC, …">
                  <button type="button" class="btn btn-sm btn-outline-secondary"
                    @click="form.location = 'Remote'"
                    :disabled="form.location === 'Remote'"
                    title="Set location to Remote">Remote</button>
                </div>
              </div>

              <div class="col-6">
                <label class="form-label">Region</label>
                <select class="form-select" x-model="form.region_id">
                  <option value="">— None —</option>
                  <template x-for="r in $store.app.settings.regions.filter(x => x.is_enabled)" :key="r.id">
                    <option :value="r.id" x-text="r.name"></option>
                  </template>
                </select>
              </div>

              <div class="col-6">
                <label class="form-label">Recruiter</label>
                <select class="form-select" x-model="form.recruiter_id">
                  <option value="">— Unassigned —</option>
                  <template x-for="r in $store.app.settings.recruiters.filter(x => x.is_active)" :key="r.id">
                    <option :value="r.id" x-text="r.name"></option>
                  </template>
                </select>
              </div>

              <!-- Head Count + Filled, paired so the relationship is visually obvious.
                   `filled` exists separately from `head_count` so closing a partially-
                   filled requisition (e.g. 1 of 3 hired, role descoped) doesn't lose
                   the historical context that the role originally needed three. -->
              <div class="col-3">
                <label class="form-label">Head Count</label>
                <input type="number" class="form-control" x-model.number="form.head_count" min="1">
                <div class="form-text">Total positions to fill.</div>
              </div>

              <div class="col-3">
                <label class="form-label">Filled</label>
                <input type="number" class="form-control" x-model.number="form.filled"
                  min="0" :max="form.head_count">
                <div class="form-text">Hired so far.</div>
              </div>

              <!-- Structured salary range. Stored on the sheet as a single
                   "min-max" string but the UI is two clean number inputs so
                   nobody has to wonder whether to type "$60k", "60,000",
                   or "60-80". The display format on job cards is uniform
                   regardless of how the recruiter typed it. -->
              <div class="col-6">
                <label class="form-label">Salary Range</label>
                <div class="row g-2">
                  <div class="col-6">
                    <div class="input-group input-group-sm">
                      <span class="input-group-text">Min $</span>
                      <input type="number" class="form-control" x-model.number="form.salary_min"
                        min="0" step="1000" placeholder="60000">
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="input-group input-group-sm">
                      <span class="input-group-text">Max $</span>
                      <input type="number" class="form-control" x-model.number="form.salary_max"
                        min="0" step="1000" placeholder="80000">
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-6">
                <label class="form-label">Posted</label>
                <input type="date" class="form-control" x-model="form.posted_date">
              </div>

              <div class="col-6">
                <label class="form-label">Expires</label>
                <input type="date" class="form-control" x-model="form.posting_expires">
              </div>

              <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea class="form-control" rows="2" x-model="form.notes"></textarea>
              </div>

            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-outline-secondary" @click="$store.app.closeModal()">Cancel</button>
            <button class="btn btn-primary" :disabled="submitting" @click="submit()"
              x-text="submitting ? 'Saving…' : ($store.app.modal.type === 'editJob' ? 'Save Changes' : 'Add Job')"></button>
          </div>
        </div>
      </div>
    </template>

  </div>
</template>

<script>
document.addEventListener('alpine:init', function () {

  // (Bulk CSV import was removed \u2014 recruiters use the Sheet directly
  // for any legacy data migration. The Add Candidate modal covers the
  // day-to-day workflow.)

  Alpine.data('rejectModal', function () {
    return {
      refuseReasonId: '',
      note: '',
      error: '',
      submitting: false,
      bulkConfirmed: false,

      init: function () {
        this.refuseReasonId = '';
        this.note = '';
        this.error = '';
        this.bulkConfirmed = false;
        this.submitting = false;
      },

      // Centralized so the inline :disabled binding can't accidentally
      // get mis-evaluated. Single-candidate reject is enabled the moment
      // a reason is picked. Bulk reject also requires the explicit
      // confirmation checkbox.
      rejectButtonDisabled: function () {
        if (this.submitting) return true;
        if (!this.refuseReasonId) return true;
        var data = this.$store.app.modal.data || {};
        if (data.bulk) return !this.bulkConfirmed;
        return false;
      },

      submit: async function () {
        var data = this.$store.app.modal.data || {};
        if (!this.refuseReasonId) {
          this.error = 'Pick a reason to reject this candidate.';
          return;
        }
        this.error = '';
        if (data.bulk && !this.bulkConfirmed) {
          this.error = 'Confirm bulk reject before continuing.';
          return;
        }
        this.submitting = true;
        var reasonId = parseInt(this.refuseReasonId, 10);
        try {
          if (data.bulk && Array.isArray(data.ids) && data.ids.length > 0) {
            // Bulk path \u2014 single backend call rejects all selected
            // candidates, returns per-id success/failure for the toast.
            var result = await gasCall('bulkRejectCandidates', data.ids, reasonId);
            var ok  = (result.successIds || []).length;
            var bad = (result.failures   || []).length;
            var storeBulk = this.$store.app;
            if (bad === 0) {
              storeBulk.toastSuccess('Rejected ' + ok + ' candidate' + (ok === 1 ? '' : 's') + '.', {
                actionLabel: 'View rejections',
                duration: 7000,
                onAction: function () {
                  var root = Alpine.$data(document.querySelector('#app'));
                  if (!root) return;
                  root.showRejections = true;
                  root.loadRecentRejections();
                  root.scrollToSection('sec-rejections');
                },
              });
            } else {
              this.$store.app.toastError(
                'Rejected ' + ok + ', ' + bad + ' failed. First error: ' +
                  (result.failures[0].message || 'unknown'),
                { duration: 8000 }
              );
            }
            this.$store.app.closeModal();
            var rootBulk = Alpine.$data(document.querySelector('#app'));
            if (rootBulk) {
              // Drop rejected ids from selection so the action bar
              // doesn't keep showing them as pending.
              var done = {};
              (result.successIds || []).forEach(function (id) { done[id] = true; });
              rootBulk.selectedIds = rootBulk.selectedIds.filter(function (id) { return !done[id]; });
              await rootBulk.reloadAll();
            }
            return;
          }
          var candidateId = data.candidateId;
          await gasCall('rejectCandidate', candidateId, reasonId);
          // If a note was provided, append it to the candidate's notes.
          if (this.note && this.note.trim()) {
            try {
              var detail = await gasCall('getCandidateDetail', candidateId);
              var existing = (detail.candidate.notes || '').trim();
              var stamp = '[Rejected ' + new Date().toISOString().split('T')[0] + '] ' + this.note.trim();
              var combined = existing ? existing + '\n\n' + stamp : stamp;
              await gasCall('updateCandidate', candidateId, { notes: combined });
            } catch (e) { /* non-fatal — reject already succeeded */ }
          }
          this.$store.app.closeModal();
          this.$store.app.closePeek();
          var root = Alpine.$data(document.querySelector('#app'));
          if (root) await root.reloadAll();
          this.$store.app.toastSuccess('Candidate rejected.', {
            actionLabel: 'View rejections',
            duration: 7000,
            onAction: function () {
              if (!root) return;
              root.showRejections = true;
              root.loadRecentRejections();
              root.scrollToSection('sec-rejections');
            },
          });
        } catch (e) {
          this.$store.app.toastError('Reject failed: ' + e.message);
        } finally { this.submitting = false; }
      },
    };
  });

  Alpine.data('addCandidateModal', function () {
    return {
      submitting: false, openJobs: [], errors: {},
      duplicates: [],          // populated when email matches an existing candidate
      duplicatesChecked: '',   // the email we last checked, to avoid re-query spam
      forceCreate: false,      // user explicitly chose "Add anyway" after seeing dupes
      form: {
        first_name: '', last_name: '', email: '', phone: '',
        job_id: '', recruiter_id: '', source_id: '', region_id: '',
        motion: 'Inbound', linkedin_url: '', notes: '',
      },

      init: async function () {
        try { this.openJobs = await gasCall('getJobOpenings', 'Open'); }
        catch (e) { this.$store.app.toastError('Could not load jobs.'); }
      },

      // Auto-fill recruiter from the chosen job when the user hasn't
      // explicitly picked one. Mirrors the backend behavior people
      // expect — "if I just pick a job, the candidate goes to that
      // job's owner" — without forcing a manual second click. If the
      // user does pick a recruiter, we never overwrite their choice.
      onJobChange: function () {
        if (this.form.recruiter_id) return;
        if (!this.form.job_id) return;
        var jobId = parseInt(this.form.job_id, 10);
        var j = this.openJobs.find(function (x) { return x.id === jobId; });
        if (j && j.recruiter_id) this.form.recruiter_id = String(j.recruiter_id);
      },

      onSourceChange: function () {
        if (!this.form.source_id) return;
        var id = parseInt(this.form.source_id, 10);
        var src = this.$store.app.settings.sources.find(function (s) { return s.id === id; });
        if (src) this.form.motion = src.default_motion;
      },

      // Called on email blur — checks for duplicates but doesn't block anything yet
      checkDuplicates: async function () {
        var email = (this.form.email || '').trim().toLowerCase();
        if (!email) { this.duplicates = []; this.duplicatesChecked = ''; this.forceCreate = false; return; }
        if (email === this.duplicatesChecked) return;   // already checked this exact value
        this.duplicatesChecked = email;
        this.forceCreate = false;
        try {
          this.duplicates = await gasCall('findDuplicateCandidatesByEmail', email);
        } catch (err) {
          this.duplicates = [];   // non-fatal — don't block submit on a check failure
        }
      },

      openExistingCandidate: function (id) {
        this.$store.app.closeModal();
        this.$store.app.openPeek(id);
      },

      validate: function () {
        var e = {};
        if (!this.form.first_name.trim()) e.first_name = 'Required.';
        if (!this.form.last_name.trim()) e.last_name = 'Required.';
        if (!this.form.email.trim()) e.email = 'Required.';
        if (!this.form.job_id) e.job_id = 'Pick a job.';
        this.errors = e;
        return Object.keys(e).length === 0;
      },

      submit: async function () {
        if (!this.validate()) return;
        // If we found duplicates and the user hasn't explicitly opted to add anyway,
        // hold the submit — the warning banner will render in the modal body.
        if (this.duplicates.length > 0 && !this.forceCreate) {
          this.$store.app.toastError('Already have someone with that email \u2014 confirm below to add anyway.');
          return;
        }
        this.submitting = true;
        try {
          await gasCall('createCandidate', {
            first_name: this.form.first_name.trim(),
            last_name: this.form.last_name.trim(),
            email: this.form.email.trim(),
            phone: this.form.phone || '',
            job_id: parseInt(this.form.job_id, 10),
            recruiter_id: this.form.recruiter_id ? parseInt(this.form.recruiter_id, 10) : null,
            source_id: this.form.source_id ? parseInt(this.form.source_id, 10) : null,
            region_id: this.form.region_id ? parseInt(this.form.region_id, 10) : null,
            motion: this.form.motion,
            linkedin_url: this.form.linkedin_url || '',
            notes: this.form.notes || '',
          });
          this.$store.app.toastSuccess(
            this.duplicates.length > 0 ? 'Duplicate candidate added.' : 'Candidate added.'
          );
          this.$store.app.closeModal();
          var root = Alpine.$data(document.querySelector('#app'));
          if (root) await root.reloadAll();
        } catch (e) {
          this.$store.app.toastError('Could not add: ' + e.message);
        } finally { this.submitting = false; }
      },
    };
  });

  Alpine.data('jobModal', function () {
    return {
      submitting: false, errors: {},
      form: {
        // 'Remote' is the most common first-pass value per the 2026/04/22
        // design call with Janice — pre-populating saves recruiters the
        // typing while still letting them overwrite for in-office roles.
        title: '', department: '', location: 'Remote', region_id: '',
        status: 'Open', head_count: 1, filled: 0, recruiter_id: '',
        salary_min: '', salary_max: '',
        posted_date: new Date().toISOString().split('T')[0],
        closes_date: '', posting_expires: '', notes: '',
      },

      init: function () {
        if (this.$store.app.modal.type === 'editJob' && this.$store.app.modal.data && this.$store.app.modal.data.job) {
          var j = this.$store.app.modal.data.job;
          // Parse the historical freeform `salary_range` string into the
          // structured min/max inputs the new UI renders. Anything that
          // doesn't parse cleanly leaves both blank — the recruiter can
          // re-enter it without us guessing wrong.
          var salary = window.parseSalary ? window.parseSalary(j.salary_range || '') : { min: null, max: null };
          this.form = {
            title: j.title || '', department: j.department || '',
            location: j.location || '',
            region_id: j.region_id || '', status: j.status || 'Open',
            head_count: j.head_count || 1, filled: j.filled || 0,
            recruiter_id: j.recruiter_id || '',
            salary_min: salary.min != null ? salary.min : '',
            salary_max: salary.max != null ? salary.max : '',
            posted_date: j.posted_date || '',
            closes_date: j.closes_date || '', posting_expires: j.posting_expires || '',
            notes: j.notes || '',
          };
        }
      },

      validate: function () {
        var e = {};
        if (!this.form.title.trim()) e.title = 'Title required.';
        if (this.form.filled > this.form.head_count) {
          e.filled = 'Filled cannot exceed head count.';
        }
        if (this.form.salary_min !== '' && this.form.salary_max !== '' &&
            Number(this.form.salary_min) > Number(this.form.salary_max)) {
          e.salary = 'Salary min must be \u2264 max.';
        }
        this.errors = e;
        return Object.keys(e).length === 0;
      },

      submit: async function () {
        if (!this.validate()) {
          // Surface the first error as a toast so the user notices even
          // if the inline validation message scrolled off-screen.
          var firstErr = Object.values(this.errors)[0];
          if (firstErr) this.$store.app.toastError(firstErr);
          return;
        }
        this.submitting = true;
        try {
          var salaryStorage = window.formatSalaryStorage
            ? window.formatSalaryStorage(this.form.salary_min, this.form.salary_max)
            : '';
          var payload = {
            title: this.form.title.trim(),
            department: this.form.department || '',
            location: this.form.location || '',
            region_id: this.form.region_id ? parseInt(this.form.region_id, 10) : null,
            status: this.form.status,
            head_count: parseInt(this.form.head_count, 10) || 1,
            filled: Math.max(0, parseInt(this.form.filled, 10) || 0),
            recruiter_id: this.form.recruiter_id ? parseInt(this.form.recruiter_id, 10) : null,
            salary_range: salaryStorage,
            posted_date: this.form.posted_date || '',
            closes_date: this.form.closes_date || '',
            posting_expires: this.form.posting_expires || '',
            notes: this.form.notes || '',
          };
          if (this.$store.app.modal.type === 'editJob') {
            await gasCall('updateJobOpening', this.$store.app.modal.data.job.id, payload);
            this.$store.app.toastSuccess('Job updated.');
          } else {
            await gasCall('createJobOpening', payload);
            this.$store.app.toastSuccess('Job created.');
          }
          this.$store.app.closeModal();
          var root = Alpine.$data(document.querySelector('#app'));
          if (root) {
            root.jobs = await gasCall('getJobOpenings');
            await root.loadCandidates();
          }
        } catch (e) {
          this.$store.app.toastError('Save failed: ' + e.message);
        } finally { this.submitting = false; }
      },
    };
  });

});
</script>
