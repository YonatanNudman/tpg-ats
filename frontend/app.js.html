<script>
/* =============================================================
   TPG ATS — App JS
   Single Alpine.js component tree, all state centralized.
   Fixes applied from audit:
     C1 — getCurrentUserEmail name matches the backend
     C2 — cross-section refresh via in-store mutations, not DOM events
     C3 — "__unassigned__" sentinel for null-recruiter filter
     C4 — delete flow uses modal.data directly (no rogue `this`)
     C5 — settings save reloads from server to pick up real IDs
     H2/H3 — peek panel uses real x-model on all selects
     H6 — analytics re-fetch on filter change
     H7 — single getAllHistory call in backend
   Plus: 15s sync fingerprint poll for multi-user coordination.
   ============================================================= */

// ── Client-side error visibility ─────────────────────────────
// Without this, JS errors and unhandled promise rejections are silent
// in production — the app sits frozen and nobody knows why. The handler
// below shows a toast when Alpine is ready and a degraded banner when
// it isn't (e.g. error during Alpine init itself). All errors also
// log to the GAS execution log via the lightweight logClientError
// endpoint so post-incident triage doesn't require shipping debug
// builds.
function _showFatalBanner(msg) {
  // Used only when the Alpine toast store isn't available yet. Idempotent
  // — second call updates the existing banner instead of stacking.
  var id = '__tpg_fatal_banner';
  var el = document.getElementById(id);
  if (!el) {
    el = document.createElement('div');
    el.id = id;
    el.style.cssText = [
      'position:fixed', 'top:0', 'left:0', 'right:0',
      'background:#E14B4B', 'color:white',
      'padding:10px 16px', 'font:13px/1.4 system-ui,sans-serif',
      'z-index:99999', 'box-shadow:0 2px 6px rgba(0,0,0,0.15)',
    ].join(';');
    document.body.appendChild(el);
  }
  el.textContent = 'Something went wrong: ' + msg + ' (Cmd+R to reload)';
}

function _reportClientError(kind, err) {
  var msg = (err && (err.message || err.toString())) || String(err) || 'Unknown error';
  var stack = (err && err.stack) || '';
  // Try to surface visually — Alpine first, fallback to fatal banner.
  try {
    var store = (typeof Alpine !== 'undefined' && Alpine.store) ? Alpine.store('app') : null;
    if (store && typeof store.toastError === 'function') {
      store.toastError(kind + ': ' + msg);
    } else {
      _showFatalBanner(msg);
    }
  } catch (_) { _showFatalBanner(msg); }
  // Always log to console so devs can grab the stack from DevTools.
  console.error('[' + kind + ']', err);
  // Best-effort server log. We do NOT await — error reporting must never
  // throw or block the original error path.
  try {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withFailureHandler(function () { /* swallow — can't error on the error path */ })
        .logClientError({
          kind: kind,
          message: msg,
          stack: stack.slice(0, 2000),
          url: (typeof location !== 'undefined' && location.href) || '',
          ua: (typeof navigator !== 'undefined' && navigator.userAgent) || '',
          ts: new Date().toISOString(),
        });
    }
  } catch (_) { /* swallow */ }
}

window.addEventListener('error', function (e) {
  _reportClientError('JS error', e.error || e.message);
});
window.addEventListener('unhandledrejection', function (e) {
  _reportClientError('Unhandled promise', e.reason);
});

// ── Promise wrapper for google.script.run ───────────────────
function gasCall(fnName, ...args) {
  return new Promise(function (resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function (err) {
        // Note: caller errors typically surface via the per-action toast
        // (e.g. "Save failed: …"). _reportClientError is for the cases
        // where the rejection bubbles all the way up to unhandledrejection.
        reject(new Error(err.message || String(err)));
      });
    runner[fnName].apply(runner, args);
  });
}

// ── Global helpers (used in HTML via x-text, x-html, @) ─────
window.fmtDate = function (d) {
  if (!d) return '—';
  var dt = new Date(d);
  if (isNaN(dt.getTime())) return d;
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};
window.initials = function (name) {
  if (!name) return '?';
  return name.split(/\s+/).filter(Boolean).map(function (p) { return p[0]; }).slice(0, 2).join('').toUpperCase();
};
window.stageChipStyle = function (color) {
  var c = color || '#6c757d';
  var r = parseInt(c.slice(1, 3), 16), g = parseInt(c.slice(3, 5), 16), b = parseInt(c.slice(5, 7), 16);
  return 'background:rgba(' + r + ',' + g + ',' + b + ',0.15);color:' + c + ';';
};
window.motionClass = function (m) { return m === 'Outbound' ? 'outbound' : 'inbound'; };

/**
 * Human-readable "time ago" for activity feed timestamps.
 * Keeps to common buckets that recruiters eyeball quickly:
 *   <60s       → "just now"
 *   <60m       → "42m ago"
 *   <24h       → "5h ago"
 *   <30d       → "3d ago"
 *   else       → absolute date "Apr 12"
 */
window.relativeTime = function (iso) {
  if (!iso) return '';
  var then = new Date(iso).getTime();
  if (isNaN(then)) return '';
  var diff = Date.now() - then;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  if (diff < 30 * 86400000) return Math.floor(diff / 86400000) + 'd ago';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};

/**
 * CSV export helper — joined names (not IDs), RFC-4180 quoted, UTF-8 BOM
 * so Excel opens it correctly with unicode characters.
 */
function toCsvCell(v) {
  if (v == null) return '';
  var s = String(v);
  if (s.indexOf(',') > -1 || s.indexOf('"') > -1 || s.indexOf('\n') > -1) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}
window.exportCandidatesToCsv = function (candidates, filename) {
  if (!candidates || candidates.length === 0) {
    alert('No candidates to export.');
    return;
  }
  // Recruiter-friendly column order: identity → role → pipeline → context → dates
  var cols = [
    ['First Name',       function (c) { return c.first_name; }],
    ['Last Name',        function (c) { return c.last_name; }],
    ['Email',            function (c) { return c.email; }],
    ['Phone',            function (c) { return c.phone; }],
    ['Job',              function (c) { return c.job_title || ''; }],
    ['Stage',            function (c) { return c.stage_name || ''; }],
    ['Status',           function (c) { return c.status; }],
    ['Recruiter',        function (c) { return c.recruiter_name || ''; }],
    ['Source',           function (c) { return c.source_name || ''; }],
    ['Motion',           function (c) { return c.motion || ''; }],
    ['Region',           function (c) { return c.region_name || ''; }],
    ['Rating',           function (c) { return c.rating || 0; }],
    ['Days in Stage',    function (c) { return c.days_in_stage || 0; }],
    ['Days Applied',     function (c) { return c.days_since_applied || 0; }],
    ['Date Applied',     function (c) { return c.date_applied || ''; }],
    ['Last Stage Update', function (c) { return c.date_last_stage_update || ''; }],
    ['Refuse Reason',    function (c) { return c.refuse_reason_name || ''; }],
    ['LinkedIn',         function (c) { return c.linkedin_url || ''; }],
    ['Resume',           function (c) { return c.resume_url || ''; }],
    ['Notes',            function (c) { return (c.notes || '').replace(/\r?\n/g, ' · '); }],
    ['Created By',       function (c) { return c.created_by || ''; }],
  ];
  var header = cols.map(function (c) { return c[0]; }).join(',');
  var rows   = candidates.map(function (cand) {
    return cols.map(function (c) { return toCsvCell(c[1](cand)); }).join(',');
  });
  var csv = header + '\n' + rows.join('\n');

  // Prepend UTF-8 BOM so Excel opens it correctly
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = filename || ('tpg-ats-candidates-' + new Date().toISOString().split('T')[0] + '.csv');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
};

/**
 * Format a US phone number as the user types.
 *   "4155551234"        → "(415) 555-1234"
 *   "14155551234"       → "+1 (415) 555-1234"
 *   "+14155551234"      → "+1 (415) 555-1234"
 *   "415"               → "(415"           (live intermediate state)
 *   non-US-looking     → passes through with minor cleanup
 *
 * Behavior is "permissive but opinionated":
 * strips bad chars, leaves sensible partial formatting while the user
 * is still typing, never rejects input. Storage uses the formatted
 * display string — we don't try to convert to E.164 since recruiters
 * often paste international numbers that wouldn't round-trip cleanly
 * without a real library.
 */
window.formatPhone = function (raw) {
  if (!raw) return '';
  // Keep leading + if present, strip everything else except digits
  var leadingPlus = String(raw).trim().indexOf('+') === 0;
  var digits = String(raw).replace(/[^\d]/g, '');
  if (!digits) return leadingPlus ? '+' : '';

  // US 10-digit: (XXX) XXX-XXXX
  if (!leadingPlus && digits.length <= 10) {
    if (digits.length <= 3) return '(' + digits;
    if (digits.length <= 6) return '(' + digits.slice(0,3) + ') ' + digits.slice(3);
    return '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6,10);
  }
  // US 11-digit (with country code): +1 (XXX) XXX-XXXX
  if (!leadingPlus && digits.length === 11 && digits[0] === '1') {
    return '+1 (' + digits.slice(1,4) + ') ' + digits.slice(4,7) + '-' + digits.slice(7,11);
  }
  // Explicit +country: "+CC NNNNNN..." (best-effort 1-3 digit country split)
  if (leadingPlus) {
    // Simple heuristic: +1 is the common one; otherwise use first 2
    var cc = (digits[0] === '1') ? 1 : 2;
    var country = digits.slice(0, cc);
    var rest = digits.slice(cc);
    if (rest.length === 0) return '+' + country;
    if (rest.length <= 3) return '+' + country + ' ' + rest;
    if (rest.length <= 6) return '+' + country + ' ' + rest.slice(0,3) + '-' + rest.slice(3);
    if (rest.length <= 10) return '+' + country + ' ' + rest.slice(0,3) + '-' + rest.slice(3,6) + '-' + rest.slice(6);
    // Longer — just space every 3
    return '+' + country + ' ' + rest.match(/.{1,3}/g).join(' ');
  }
  // Longer-than-11 without a + — just leave it alone
  return digits;
};


// ── History / URL state (deep-linking + browser back button) ─────────
// GAS Web Apps run inside an iframe where only google.script.history
// can actually update the parent frame's URL. We wrap it so the rest
// of the app can keep using a simple pushHistory / popHistory API.
//
// Encoding: the whole app state lives in a single "state" object that
// gets serialized to URL params by google.script.history. We track an
// internal stack so closing a modal/peek correctly reverts to the
// previous state rather than navigating off the web app entirely.
var _historyStack = [];
function _gasHistory() {
  return (typeof google !== 'undefined' && google.script && google.script.history) || null;
}
function pushHistory(partial) {
  var h = _gasHistory();
  if (!h) return;                     // not in GAS iframe (local dev / tests)
  var newState = Object.assign({}, currentState(), partial || {});
  _historyStack.push(newState);
  try { h.push(newState, null, serializeState(newState)); }
  catch (e) { /* silently non-fatal */ }
}
function popHistory() {
  var h = _gasHistory();
  if (!h) return;
  _historyStack.pop();
  // Replace current entry with the previous state's URL so we don't
  // accumulate empty frames when the user closes nested overlays.
  var prev = _historyStack[_historyStack.length - 1] || {};
  try { h.replace(prev, null, serializeState(prev)); }
  catch (e) { /* non-fatal */ }
}
function currentState() {
  var store = typeof Alpine !== 'undefined' && Alpine.store ? Alpine.store('app') : null;
  if (!store) return {};
  var s = {};
  if (store.peek && store.peek.candidateId) s.candidate = store.peek.candidateId;
  if (store.modal && store.modal.open)      s.modal     = store.modal.type;
  return s;
}
function serializeState(state) {
  var out = {};
  if (state.candidate) out.candidate = String(state.candidate);
  if (state.modal)     out.modal     = String(state.modal);
  return out;
}
// Apply URL params on initial load (runs AFTER Alpine store is initialized)
function applyInitialUrlState(params) {
  if (!params) return;
  if (params.candidate) {
    var id = parseInt(params.candidate, 10);
    if (!isNaN(id)) Alpine.store('app').openPeek(id, { suppressHistory: true });
  }
}

function presetRange(preset) {
  var now = new Date();
  var end = now.toISOString().split('T')[0];
  var start;
  switch (preset) {
    case '30d':  start = new Date(now - 30 * 86400000).toISOString().split('T')[0]; break;
    case '6m':   start = new Date(now.getFullYear(), now.getMonth() - 6, now.getDate()).toISOString().split('T')[0]; break;
    case '1y':   start = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate()).toISOString().split('T')[0]; break;
    case 'all':  start = '2020-01-01'; end = '2099-12-31'; break;
    case '90d':
    default:     start = new Date(now - 90 * 86400000).toISOString().split('T')[0];
  }
  return { start: start, end: end };
}

// ── Alpine setup ────────────────────────────────────────────
document.addEventListener('alpine:init', function () {

  // Global store (peek panel, toasts, settings cache, modal)
  Alpine.store('app', {
    userEmail: '',
    toasts: [],
    _toastId: 0,

    peek:     { open: false, candidateId: null, candidate: null, history: [], loading: false },
    modal:    { open: false, type: null, data: null },
    settings: { stages: [], sources: [], regions: [], recruiters: [], refuseReasons: [] },
    settingsOpen: false,

    // Toast — "opts" can include:
    //   actionLabel  — text for the inline action button
    //   onAction     — fn called when the user clicks the action button.
    //                  If provided, onDismiss is called instead when the
    //                  toast times out (used for undo flows)
    //   onDismiss    — fn called when the toast auto-dismisses without
    //                  the user clicking the action
    //   duration     — ms until auto-dismiss (default 4000)
    toast: function (msg, type, opts) {
      var id = ++this._toastId;
      var icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
      var o = opts || {};
      var t = {
        id: id,
        message: msg,
        type: type || 'success',
        icon: icons[type || 'success'],
        actionLabel: o.actionLabel || null,
        onAction: o.onAction || null,
        onDismiss: o.onDismiss || null,
        _dismissed: false,
      };
      this.toasts.push(t);
      var self = this;
      var duration = o.duration || 4000;
      t._timer = setTimeout(function () {
        if (t._dismissed) return;
        t._dismissed = true;
        self.toasts = self.toasts.filter(function (x) { return x.id !== id; });
        if (t.onDismiss) { try { t.onDismiss(); } catch (e) { /* non-fatal */ } }
      }, duration);
    },
    dismissToast: function (id) {
      var t = this.toasts.find(function (x) { return x.id === id; });
      if (!t || t._dismissed) return;
      t._dismissed = true;
      clearTimeout(t._timer);
      this.toasts = this.toasts.filter(function (x) { return x.id !== id; });
    },
    invokeToastAction: function (id) {
      var t = this.toasts.find(function (x) { return x.id === id; });
      if (!t || t._dismissed) return;
      t._dismissed = true;
      clearTimeout(t._timer);
      this.toasts = this.toasts.filter(function (x) { return x.id !== id; });
      if (t.onAction) { try { t.onAction(); } catch (e) { /* non-fatal */ } }
    },
    toastSuccess: function (m, opts) { this.toast(m, 'success', opts); },
    toastError:   function (m, opts) { this.toast(m, 'error',   opts); },
    toastInfo:    function (m, opts) { this.toast(m, 'info',    opts); },

    // Peek — opt { suppressHistory: true } skips pushing a new history frame
    // (used when restoring from a URL on initial load, or reacting to popstate)
    openPeek: async function (id, opt) {
      this.peek.open = true; this.peek.candidateId = id;
      this.peek.candidate = null; this.peek.history = []; this.peek.loading = true;
      if (!opt || !opt.suppressHistory) pushHistory({ candidate: id });
      try {
        var r = await gasCall('getCandidateDetail', id);
        this.peek.candidate = r.candidate;
        this.peek.history = r.history;
      } catch (e) {
        this.toastError('Could not load candidate: ' + e.message);
        this.peek.open = false;
      } finally { this.peek.loading = false; }
    },
    closePeek: function (opt) {
      this.peek.open = false; this.peek.candidateId = null;
      this.peek.candidate = null; this.peek.history = [];
      if (!opt || !opt.suppressHistory) popHistory();
    },

    // Modal
    openModal: function (type, data) {
      this.modal.type = type; this.modal.data = data || null; this.modal.open = true;
      pushHistory({ modal: type });
    },
    closeModal: function (opt) {
      this.modal.open = false; this.modal.type = null; this.modal.data = null;
      if (!opt || !opt.suppressHistory) popHistory();
    },
  });

  // ── Main ATS app component ──────────────────────────────────
  Alpine.data('atsApp', function () {
    var syncTimer = null;
    var lastSyncSig = '';
    var funnelChart = null, sourceChart = null, trendChart = null;

    return {
      userEmail: '',
      loading: true,
      syncing: false,
      syncStale: false,
      drill: null,                // currently only 'stale' (banner toggle)
      showJobs: true,
      showAnalytics: false,       // collapsed by default — funnel-primary view surfaces the important stuff above
      showActivity: false,     // collapsed by default so the fold stays analytics-first
      activity: [],            // array of HistoryRow, newest first
      activityLoading: false,

      allCandidates: [],
      jobs: [],
      settings: { stages: [], sources: [], regions: [], recruiters: [], refuseReasons: [] },

      filters: {
        preset: '90d',
        startDate: presetRange('90d').start,
        endDate: presetRange('90d').end,
        jobId: '', sourceId: '', motion: '', regionId: '', recruiterId: '',
        status: 'Active', search: '',
      },

      // ── Per-section filter overrides ──────────────────────
      // Each dashboard section has its own filter row whose values
      // override the global filter bar above for that section only.
      // Blank/empty value = inherit the global filter; non-empty
      // overrides it. Keeps the page-wide filter bar as the default
      // intent while still letting a specific dashboard scope itself
      // (e.g. global "Last 90 Days" but Recruiter Hires = "Last 30 Days").
      funnelFilters:    { jobId: '', sourceId: '', recruiterId: '', preset: '', startDate: '', endDate: '' },
      recruiterFilters: { jobId: '', sourceId: '', hiresPreset: '', hiresStartDate: '', hiresEndDate: '' },
      sourceFilters:    { jobId: '', recruiterId: '', preset: '', startDate: '', endDate: '' },

      // ── Funnel-as-primary state ──────────────────────────
      // Stage IDs currently expanded inline (one per stage; we track an
      // array so multiple can be open simultaneously — useful for cross-
      // stage comparison when triaging).
      expandedStages: [],

      // Per-section loading flags. Toggled by reloadRecruiterPerf /
      // reloadSourceEffectiveness so the user gets visible feedback that
      // the filter change is in flight (otherwise the table just silently
      // re-renders ~500ms later, which feels broken).
      recruiterLoading: false,
      sourceLoading:    false,

      analytics: {
        funnelConversion: [], timeToHireTrend: [], stageVelocity: [],
      },
      // Promoted dashboards — populated from getDashboardData on initial
      // load, then refreshed via dedicated per-section endpoints whenever
      // their section filters change (saves recomputing the whole bundle).
      recruiterPerformance: [],
      sourceEffectiveness:  [],
      slaBreaches:      [],
      staleCandidates:  [],     // pipeline health alerts (2×+ past SLA or >14d no-SLA)

      // ── Computed ─────────────────────────────────────────
      // Currently consumed only by the topbar Export-CSV button. Everything
      // else (the Pipeline Funnel section and its stage expansions) goes
      // through the funnel-specific predicate below, which adds the
      // section-filter override layer and uses timestamp comparison for
      // dates instead of fragile lexicographic strings.
      //
      // Sort intentionally omitted — there's no list view to drive a sort
      // order from anymore. Export keeps the natural order returned by the
      // backend, which is already date_applied desc by virtue of how
      // candidates are appended.
      get filteredCandidates() {
        var f = this.filters;
        return this.allCandidates.filter(function (c) {
          if (f.status && c.status !== f.status) return false;
          if (f.jobId && c.job_id != f.jobId) return false;
          if (f.sourceId && c.source_id != f.sourceId) return false;
          if (f.motion && c.motion !== f.motion) return false;
          if (f.regionId && c.region_id != f.regionId) return false;
          if (f.recruiterId === '__unassigned__') {
            if (c.recruiter_id !== null && c.recruiter_id !== undefined && c.recruiter_id !== '') return false;
          } else if (f.recruiterId) {
            if (c.recruiter_id != f.recruiterId) return false;
          }
          if (f.search) {
            var q = f.search.toLowerCase();
            var hay = ((c.first_name || '') + ' ' + (c.last_name || '') + ' ' + (c.email || '')).toLowerCase();
            if (hay.indexOf(q) === -1) return false;
          }
          if (c.date_applied) {
            // CALENDAR DATE compare (not timestamp). When Sheets coerces a
            // date cell to a native Date in the spreadsheet's locale, the
            // backend's parseStr emits a full ISO like "2026-04-22T04:00:00.000Z"
            // (midnight Eastern = 4am UTC). A timestamp comparison against
            // f.endDate "2026-04-22" (= midnight UTC) would drop today's
            // candidates from a Last-90-Days filter. Slicing to YYYY-MM-DD
            // on both sides treats the period as "calendar days inclusive",
            // which matches what the user actually means.
            var d = String(c.date_applied).slice(0, 10);
            if (f.startDate && d < String(f.startDate).slice(0, 10)) return false;
            if (f.endDate   && d > String(f.endDate).slice(0, 10))   return false;
          }
          return true;
        });
      },

      // (List/Kanban view + pagination removed — funnel-primary layout doesn't
      //  need pagedCandidates, totalPages, kanbanStages, or candidatesByStage.
      //  Inline candidate lists per stage live in funnelCandidatesForStage.)

      // ── Per-section state persistence ─────────────────────
      // Section filters and which funnel stages are expanded are restored
      // on page load so a recruiter who set "scope to my pipeline +
      // expand Pre-screen" doesn't have to redo that on every refresh.
      // Persisted per-browser, NOT per-user — fine for this interim
      // tool's deployment model where each recruiter has their own
      // workstation and account. Storage failures (private mode, quota)
      // are silently swallowed: missing persistence is annoying, but
      // throwing on every filter change would be worse.
      _SECTION_STATE_KEY: 'tpg-ats.section-state.v1',

      _persistSectionState: function () {
        try {
          var snapshot = {
            funnelFilters:    this.funnelFilters,
            recruiterFilters: this.recruiterFilters,
            sourceFilters:    this.sourceFilters,
            expandedStages:   this.expandedStages,
          };
          localStorage.setItem(this._SECTION_STATE_KEY, JSON.stringify(snapshot));
        } catch (e) { /* quota / private mode — non-fatal */ }
      },

      _restoreSectionState: function () {
        try {
          var raw = localStorage.getItem(this._SECTION_STATE_KEY);
          if (!raw) return;
          var snap = JSON.parse(raw);
          if (snap && typeof snap === 'object') {
            // Defensive merge — never overwrite a field with undefined,
            // and discard schema mismatches by only copying known keys.
            if (snap.funnelFilters)    Object.assign(this.funnelFilters,    snap.funnelFilters);
            if (snap.recruiterFilters) Object.assign(this.recruiterFilters, snap.recruiterFilters);
            if (snap.sourceFilters)    Object.assign(this.sourceFilters,    snap.sourceFilters);
            if (Array.isArray(snap.expandedStages)) this.expandedStages = snap.expandedStages.slice();
          }
        } catch (e) { /* malformed JSON or storage error — start clean */ }
      },

      // ── Lifecycle ────────────────────────────────────────
      init: async function () {
        var self = this;

        // Restore persisted section state BEFORE the first network round
        // trip so the funnel renders with the right filter scope on the
        // initial paint, not after a re-render.
        this._restoreSectionState();

        try {
          this.userEmail = await gasCall('getCurrentUserEmail');
          Alpine.store('app').userEmail = this.userEmail;
        } catch (e) { /* non-fatal */ }

        await this.reloadAll();
        this.startSyncPolling();

        // Persist on funnel-stage expansion so a recruiter mid-triage
        // can refresh and pick up where they left off. Filter changes
        // already persist via the reload* functions above.
        this.$watch('expandedStages', function () { self._persistSectionState(); });
        // Funnel filters are applied client-side (no network call), so
        // they don't go through reload* — watch them too.
        this.$watch('funnelFilters', function () { self._persistSectionState(); }, { deep: true });

        // Register browser back/forward handler — closes topmost overlay
        // rather than navigating off the web app entirely. Pairs with
        // pushHistory/popHistory on every openPeek/openModal call.
        var h = _gasHistory();
        if (h) {
          h.setChangeHandler(function (e) {
            var params = (e && e.state) || (e && e.location && e.location.parameter) || {};
            var target = { candidate: params.candidate || null, modal: params.modal || null };
            var store = Alpine.store('app');
            // Close what's open if it doesn't match the new URL
            if (store.modal.open && String(params.modal || '') !== String(store.modal.type))
              store.closeModal({ suppressHistory: true });
            if (store.peek.open && String(params.candidate || '') !== String(store.peek.candidateId))
              store.closePeek({ suppressHistory: true });
            // Open what the URL says should be open (if not already)
            if (target.candidate && !store.peek.open)
              store.openPeek(parseInt(target.candidate, 10), { suppressHistory: true });
          });
        }

        // Apply initial URL params (deep link support)
        if (h) {
          try {
            // google.script.url.getLocation runs asynchronously via callback
            if (google.script.url && google.script.url.getLocation) {
              google.script.url.getLocation(function (loc) {
                applyInitialUrlState(loc && loc.parameter);
              });
            }
          } catch (e) { /* non-fatal */ }
        }
      },

      reloadAll: async function () {
        this.loading = true;
        try {
          // Parallelize all four fetches — none of them depend on local
          // `settings`, they each call gasCall which talks to the server.
          await Promise.all([
            this.loadSettings(),
            this.loadCandidates(),
            this.loadJobs(),
            this.loadAnalytics(),
          ]);
          this.$nextTick(this.renderCharts.bind(this));
        } finally {
          this.loading = false;
        }
      },

      /**
       * Background refetch that does NOT flip `loading`. Used by
       * manualRefresh (so the user's clicked-on table doesn't disappear
       * behind a skeleton) and checkSync (so the 15s poll's reload is
       * invisible to anyone mid-scroll). The only visible feedback is
       * the spinning topbar icon driven by `syncing`.
       *
       * Settings ARE refetched here even though they change rarely,
       * because the fingerprint diff that triggered checkSync may have
       * been a settings change (teammate added a stage). Skipping it
       * would leave the UI rendering stale dropdown options.
       */
      silentReload: async function () {
        await Promise.all([
          this.loadSettings(),
          this.loadCandidates(),
          this.loadJobs(),
          this.loadAnalytics(),
        ]);
        this.$nextTick(this.renderCharts.bind(this));
      },

      loadSettings: async function () {
        var s = await gasCall('getSettings');
        // Mutate in place so all bound templates stay reactive across
        // re-loads (initial load + every 20s sync tick). Replacing the
        // whole object would detach reactivity from every dependent
        // template (dropdowns, Kanban columns, filters).
        var local = this.settings, shared = Alpine.store('app').settings;
        local.stages   = shared.stages   = s.stages;
        local.sources  = shared.sources  = s.sources;
        local.regions  = shared.regions  = s.regions;
        local.recruiters    = shared.recruiters    = s.recruiters;
        local.refuseReasons = shared.refuseReasons = s.refuseReasons;
      },

      loadCandidates: async function () {
        this.allCandidates = await gasCall('getCandidates', {});
      },

      loadJobs: async function () {
        this.jobs = await gasCall('getJobOpenings');
      },

      loadAnalytics: async function () {
        var a = await gasCall('getDashboardData', this.buildDashboardFilters());
        // Funnel-primary layout: top-level promoted dashboards have their
        // own state slots so per-section refetches can update them
        // independently. Funnel itself is derived client-side from
        // allCandidates (see pipelineFunnelData getter), so we DON'T
        // store a.pipelineSnapshot.
        this.recruiterPerformance = a.recruiterPerformance;
        this.sourceEffectiveness  = a.sourceEffectiveness;
        // Collapsible bottom-of-page analytics — historical context only.
        this.analytics = {
          funnelConversion: a.funnelConversion,
          timeToHireTrend:  a.timeToHireTrend,
          stageVelocity:    a.stageVelocity,
        };
        this.slaBreaches     = a.slaBreaches;
        this.staleCandidates = a.staleCandidates || [];
      },

      buildDashboardFilters: function () {
        var f = this.filters;
        return {
          jobId: f.jobId || null,
          sourceId: f.sourceId || null,
          motion: f.motion || null,
          regionId: f.regionId || null,
          recruiterId: (f.recruiterId && f.recruiterId !== '__unassigned__') ? f.recruiterId : null,
          status: f.status || null,
          startDate: f.startDate,
          endDate: f.endDate,
        };
      },

      // ── Per-section filter merging ────────────────────────
      // Effective filters for a section = (section overrides) || (global).
      // Pass through global motion/region/status untouched (those aren't
      // per-section configurable). The funnel section auto-scopes to
      // status='Active' separately (see pipelineFunnelData).
      mergeSectionFilters: function (section) {
        var g = this.filters;
        return {
          jobId:       (section.jobId       || g.jobId)       || null,
          sourceId:    (section.sourceId    || g.sourceId)    || null,
          recruiterId: this._effectiveRecruiterId(section.recruiterId, g.recruiterId),
          motion:      g.motion   || null,
          regionId:    g.regionId || null,
          status:      g.status   || null,
          startDate:   section.startDate || g.startDate,
          endDate:     section.endDate   || g.endDate,
        };
      },

      _effectiveRecruiterId: function (sectionVal, globalVal) {
        // '__unassigned__' is a sentinel — preserve it through the merge.
        if (sectionVal === '__unassigned__') return '__unassigned__';
        if (sectionVal) return sectionVal;
        if (globalVal === '__unassigned__') return '__unassigned__';
        return globalVal || null;
      },

      // Per-section "Period" preset → date range translation.
      onSectionPresetChange: function (section) {
        var preset, range;
        if (section === 'funnel') {
          preset = this.funnelFilters.preset;
          range  = preset ? presetRange(preset) : { start: '', end: '' };
          this.funnelFilters.startDate = range.start;
          this.funnelFilters.endDate   = range.end;
        } else if (section === 'recruiterHires') {
          preset = this.recruiterFilters.hiresPreset;
          range  = preset ? presetRange(preset) : { start: '', end: '' };
          this.recruiterFilters.hiresStartDate = range.start;
          this.recruiterFilters.hiresEndDate   = range.end;
        } else if (section === 'source') {
          preset = this.sourceFilters.preset;
          range  = preset ? presetRange(preset) : { start: '', end: '' };
          this.sourceFilters.startDate = range.start;
          this.sourceFilters.endDate   = range.end;
        }
      },

      resetSectionFilters: function (section) {
        if (section === 'funnel') {
          this.funnelFilters = { jobId: '', sourceId: '', recruiterId: '', preset: '', startDate: '', endDate: '' };
          // Symmetric inverse of filterFunnelByRecruiter — entering a recruiter
          // scope auto-expands every stage so the drill-in is one click; leaving
          // the scope collapses them back so the funnel returns to its compact
          // baseline. Without this, "Clear scope" would only undo half of what
          // the recruiter-row click did, leaving the user to manually collapse
          // each stage to get back to the default view.
          this.expandedStages = [];
          this._persistSectionState();
        } else if (section === 'recruiter') {
          this.recruiterFilters = { jobId: '', sourceId: '', hiresPreset: '', hiresStartDate: '', hiresEndDate: '' };
          this.reloadRecruiterPerf();   // persists on success
        } else if (section === 'source') {
          this.sourceFilters = { jobId: '', recruiterId: '', preset: '', startDate: '', endDate: '' };
          this.reloadSourceEffectiveness();   // persists on success
        }
      },

      // ── Scoped banner: human label for the current funnel scope ──
      // Returns a short string describing which OVERRIDE is active on the
      // funnel section (i.e. set on funnelFilters specifically, not just
      // inherited from the global filter bar). Used by the banner above
      // the funnel rows to make implicit scoping explicit.
      funnelScopeLabel: function () {
        var f = this.funnelFilters;
        var parts = [];
        if (f.recruiterId === '__unassigned__') {
          parts.push('Unassigned candidates');
        } else if (f.recruiterId) {
          var r = this.settings.recruiters.find(function (x) { return String(x.id) === String(f.recruiterId); });
          if (r) parts.push(r.name + "'s pipeline");
        }
        if (f.jobId) {
          var j = this.jobs.find(function (x) { return String(x.id) === String(f.jobId); });
          if (j) parts.push(j.title);
        }
        if (f.sourceId) {
          var s = this.settings.sources.find(function (x) { return String(x.id) === String(f.sourceId); });
          if (s) parts.push(s.name);
        }
        if (f.preset) parts.push(f.preset);
        return parts.length > 0 ? parts.join(' · ') : '';
      },

      // ── Pipeline Funnel (client-side compute) ─────────────
      // Derived from local allCandidates + funnelFilters merged over global.
      // Always scopes to status='Active' since the funnel by definition
      // shows currently-in-pipeline counts. Bar widths are proportional
      // to the largest stage so the visualization works with any data shape.
      //
      // The predicate is extracted into _funnelMatch so the bar counts
      // (this getter) and the inline candidate lists (funnelCandidatesForStage
      // below) cannot drift apart. Previously the two had subtly different
      // filter logic — pipelineFunnelData applied a date filter that the
      // expanded list ignored, producing the visible bug "stage shows
      // count 0 but the expanded panel lists candidates".
      _funnelMatch: function (c, f) {
        if (c.status !== 'Active') return false;
        if (f.jobId    && c.job_id    != f.jobId)    return false;
        if (f.sourceId && c.source_id != f.sourceId) return false;
        if (f.recruiterId === '__unassigned__') {
          if (c.recruiter_id != null && c.recruiter_id !== '') return false;
        } else if (f.recruiterId) {
          if (c.recruiter_id != f.recruiterId) return false;
        }
        // Timestamp-based date comparison so a Sheets-returned Date object
        // (stringified by the backend's parseStr fallback) doesn't break
        // the filter. parseStr now normalizes to ISO, but defense in depth.
        // Calendar-date compare — see filteredCandidates above for the full
        // rationale. Same fix; same one-liner pattern so both code paths
        // can't drift apart on date semantics.
        if (c.date_applied && (f.startDate || f.endDate)) {
          var d = String(c.date_applied).slice(0, 10);
          if (f.startDate && d < String(f.startDate).slice(0, 10)) return false;
          if (f.endDate   && d > String(f.endDate).slice(0, 10))   return false;
        }
        return true;
      },

      get pipelineFunnelData() {
        var f = this.mergeSectionFilters(this.funnelFilters);
        var self = this;
        var inScope = this.allCandidates.filter(function (c) {
          return self._funnelMatch(c, f);
        });
        var counts = {};
        for (var i = 0; i < inScope.length; i++) {
          var sid = inScope[i].stage_id;
          counts[sid] = (counts[sid] || 0) + 1;
        }
        return this.settings.stages
          .filter(function (s) { return s.is_enabled && !s.is_rejected; })
          .sort(function (a, b) { return a.sequence - b.sequence; })
          .map(function (s) {
            return {
              stage_id: s.id,
              stage_name: s.name,
              stage_color: s.color,
              candidate_count: counts[s.id] || 0,
            };
          });
      },

      funnelTotalActive: function () {
        return this.pipelineFunnelData.reduce(function (sum, s) { return sum + s.candidate_count; }, 0);
      },

      funnelBarWidth: function (stage) {
        var counts = this.pipelineFunnelData.map(function (s) { return s.candidate_count; });
        var max = Math.max.apply(null, counts);
        if (max <= 0) return 0;
        return Math.round((stage.candidate_count / max) * 100);
      },

      toggleFunnelStage: function (stageId) {
        var idx = this.expandedStages.indexOf(stageId);
        if (idx >= 0) this.expandedStages.splice(idx, 1);
        else          this.expandedStages.push(stageId);
      },

      funnelCandidatesForStage: function (stageId) {
        var f = this.mergeSectionFilters(this.funnelFilters);
        var self = this;
        return this.allCandidates
          .filter(function (c) {
            if (c.stage_id !== stageId) return false;
            return self._funnelMatch(c, f);
          })
          .sort(function (a, b) { return (a.last_name || '').localeCompare(b.last_name || ''); });
      },

      // ── Cross-section linking ─────────────────────────────
      // Click a recruiter row in the perf table → scope the funnel
      // section above to that recruiter so the user sees only that
      // recruiter's pipeline. Scrolls funnel into view for the link
      // to feel like a navigation, not a silent state change.
      filterFunnelByRecruiter: function (recruiterId) {
        this.funnelFilters.recruiterId = String(recruiterId);
        // Auto-expand all stages so the user immediately sees the recruiter's
        // candidate distribution without having to click each stage open.
        this.expandedStages = this.pipelineFunnelData.map(function (s) { return s.stage_id; });
        var el = document.querySelector('.funnel-card');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      },

      // ── Per-section refetches (server-side) ───────────────
      // Both flip the per-section loading flag while the request is in
      // flight so the section can render a spinner / skeleton without
      // touching the page-wide `loading` state. Persisted filter state
      // is saved AFTER a successful refetch so a failed call doesn't
      // pollute storage with a state that can't be reproduced.
      reloadRecruiterPerf: async function () {
        var main  = this.mergeSectionFilters(this.recruiterFilters);
        var hires = null;
        if (this.recruiterFilters.hiresPreset) {
          hires = Object.assign({}, main, {
            startDate: this.recruiterFilters.hiresStartDate,
            endDate:   this.recruiterFilters.hiresEndDate,
          });
        }
        this.recruiterLoading = true;
        try {
          this.recruiterPerformance = await gasCall('getRecruiterPerformance', main, hires);
          this._persistSectionState();
        } catch (e) {
          Alpine.store('app').toastError('Recruiter perf reload failed: ' + e.message);
        } finally {
          this.recruiterLoading = false;
        }
      },

      reloadSourceEffectiveness: async function () {
        var f = this.mergeSectionFilters(this.sourceFilters);
        this.sourceLoading = true;
        try {
          this.sourceEffectiveness = await gasCall('getSourceEffectiveness', f);
          this.$nextTick(this.renderSourceChart.bind(this));
          this._persistSectionState();
        } catch (e) {
          Alpine.store('app').toastError('Source ROI reload failed: ' + e.message);
        } finally {
          this.sourceLoading = false;
        }
      },

      // ── Filter actions ───────────────────────────────────
      onPresetChange: function () {
        var r = presetRange(this.filters.preset);
        this.filters.startDate = r.start;
        this.filters.endDate = r.end;
        this.applyFilters();
      },

      applyFilters: function () {
        // Funnel data is derived client-side from allCandidates so it
        // updates reactively as `filters` mutate. Only the server-side
        // dashboards (Recruiter Performance, Sourcing ROI, historical
        // analytics) need a refetch when global filters change.
        this.loadAnalytics().then(function () { this.renderCharts(); }.bind(this));
      },

      resetFilters: function () {
        var r = presetRange('all');
        this.filters = {
          preset: 'all', startDate: r.start, endDate: r.end,
          jobId: '', sourceId: '', motion: '', regionId: '', recruiterId: '',
          status: '', search: '',
        };
        this.applyFilters();
      },

      // (sortBy / sortIcon / scrollTop removed — no list view to sort or jump to.)
      toggleDrill: function (key) { this.drill = this.drill === key ? null : key; },

      // Sticky-nav jump. Smooth-scrolls so the section title clears the
      // sticky topbar (~56px) + the nav rail (~44px) above it. window.scrollTo
      // with `top` calculated from getBoundingClientRect handles this in one
      // call without needing CSS scroll-margin-top on every section.
      scrollToSection: function (id) {
        var el = document.getElementById(id);
        if (!el) return;
        var rect = el.getBoundingClientRect();
        var topbar = document.querySelector('.topbar');
        var nav = document.querySelector('.section-nav');
        var offset =
          (topbar ? topbar.getBoundingClientRect().height : 0) +
          (nav    ? nav.getBoundingClientRect().height    : 0) +
          8;
        window.scrollTo({ top: rect.top + window.scrollY - offset, behavior: 'smooth' });
      },

      // Lazy-load activity feed on first expand (saves a sheet scan on page
      // load for users who don't open it). Reloaded on every open — tiny
      // payload, avoids stale "2 hours ago" labels when the section has
      // been left open.
      toggleActivityFeed: async function () {
        this.showActivity = !this.showActivity;
        if (!this.showActivity) return;
        this.activityLoading = true;
        try {
          // stage_to_color is enriched client-side from settings.stages
          var rows = await gasCall('getRecentActivity', 50);
          var stageMap = {};
          this.settings.stages.forEach(function (s) { stageMap[s.id] = s.color; });
          this.activity = rows.map(function (r) {
            return Object.assign({}, r, { stage_to_color: stageMap[r.stage_to_id] || '#6c757d' });
          });
        } catch (e) {
          Alpine.store('app').toastError('Could not load activity: ' + e.message);
        } finally {
          this.activityLoading = false;
        }
      },

      // ── Inline candidate field update ────────────────────
      // Sends date_last_stage_update as the optimistic-lock version so a
      // teammate's intervening edit produces a CONFLICT error instead of
      // silently overwriting their work. On conflict we keep the local
      // optimistic value (so the user can copy it before reloading) but
      // surface a Reload action via the toast.
      updateCandidateField: async function (c, field, value) {
        var prev = c[field];
        c[field] = value;   // optimistic

        var self = this;
        try {
          if (field === 'stage_id') {
            await gasCall('updateCandidateStage', c.id, value, c.date_last_stage_update);
            await this.refreshCandidate(c.id);
          } else {
            var updates = {};
            updates[field] = value;
            await gasCall('updateCandidate', c.id, updates, c.date_last_stage_update);
            await this.refreshCandidate(c.id);
          }
          Alpine.store('app').toastSuccess('Saved.');
        } catch (e) {
          c[field] = prev;   // rollback
          if (self._isConflict(e)) {
            Alpine.store('app').toastError(
              'Conflict — someone else updated this candidate.',
              {
                actionLabel: 'Reload',
                duration: 8000,
                onAction: function () { self.refreshCandidate(c.id); },
              }
            );
          } else {
            Alpine.store('app').toastError('Save failed: ' + e.message);
          }
        }
      },

      // Conflict errors come back as plain Error objects whose message is
      // prefixed by the server. Detect by prefix so we can surface a
      // different toast (Reload action) instead of the generic "save failed".
      _isConflict: function (err) {
        return !!(err && err.message && err.message.indexOf('CONFLICT: ') === 0);
      },

      refreshCandidate: async function (id) {
        try {
          var r = await gasCall('getCandidateDetail', id);
          var idx = this.allCandidates.findIndex(function (x) { return x.id === id; });
          if (idx >= 0) this.allCandidates[idx] = r.candidate;
          // Keep peek in sync if open
          if (Alpine.store('app').peek.open && Alpine.store('app').peek.candidateId === id) {
            Alpine.store('app').peek.candidate = r.candidate;
            Alpine.store('app').peek.history = r.history;
          }
        } catch (e) { /* silent */ }
      },

      // ── Inline job field update ──────────────────────────
      updateJobField: async function (j, field, value) {
        var prev = j[field];
        j[field] = value;
        try {
          var updates = {}; updates[field] = value;
          await gasCall('updateJobOpening', j.id, updates);
          Alpine.store('app').toastSuccess('Job updated.');
          // Refresh job list for recruiter_name denorm
          this.jobs = await gasCall('getJobOpenings');
        } catch (e) {
          j[field] = prev;
          Alpine.store('app').toastError('Save failed: ' + e.message);
        }
      },

      // Undoable job delete — same optimistic-UI + 5s undo pattern as candidate delete.
      // Server-side guard (can't delete jobs with existing candidates) still applies.
      deleteJob: function (j) {
        if (!confirm('Delete "' + j.title + '"?\n\nHit Undo on the toast within 5s to cancel. Jobs with existing candidates cannot be deleted.')) return;
        var self = this;
        var idx = this.jobs.findIndex(function (x) { return x.id === j.id; });
        if (idx < 0) return;
        var snapshot = this.jobs[idx];
        this.jobs.splice(idx, 1);
        var undone = false;
        Alpine.store('app').toastInfo('Deleted "' + j.title + '"', {
          actionLabel: 'Undo',
          duration: 5000,
          onAction: function () {
            undone = true;
            self.jobs.splice(idx, 0, snapshot);
          },
          onDismiss: async function () {
            if (undone) return;
            try {
              await gasCall('deleteJobOpening', j.id);
            } catch (e) {
              self.jobs.splice(idx, 0, snapshot);
              Alpine.store('app').toastError(e.message);
            }
          },
        });
      },

      // ── Modals ────────────────────────────────────────────
      openModal: function (type, data) { Alpine.store('app').openModal(type, data); },
      openSettings: function () { Alpine.store('app').settingsOpen = true; },
      openPeek: function (id) { Alpine.store('app').openPeek(id); },

      // ── Expiry helpers ────────────────────────────────────
      isExpired: function (d) { return d && new Date(d).getTime() < Date.now(); },
      isExpiringSoon: function (d) {
        if (!d) return false;
        var t = new Date(d).getTime();
        return t >= Date.now() && t <= Date.now() + 7 * 86400000;
      },

      // (Kanban drag handlers removed — funnel-primary layout has no Kanban
      //  view. The HTML-rendered funnel doesn't currently support drag-to-
      //  reorder; stage changes happen via the inline dropdown in the peek
      //  panel. Re-introduce SortableJS here if drag-to-stage is desired
      //  on the funnel rows themselves.)

      // ── Chart rendering ──────────────────────────────────
      // Source donut renders inside the always-visible Sourcing ROI section,
      // so it MUST run regardless of showAnalytics. The funnel/trend/stage
      // charts only matter when the collapsible Analytics card is open.
      renderCharts: function () {
        this.renderSourceChart();   // Sourcing ROI (always visible)
        if (!this.showAnalytics) return;
        this.renderFunnelChart();
        this.renderTrendChart();
      },

      // (renderPipelineChart removed — Pipeline Snapshot bar chart is
      //  superseded by the Pipeline Funnel section's HTML-rendered bars
      //  with click-to-expand candidate lists. The chart's #pipelineChart
      //  canvas no longer exists in the DOM.)

      renderFunnelChart: function () {
        var el = document.getElementById('funnelChart');
        if (!el) return;
        if (funnelChart) funnelChart.destroy();
        var f = this.analytics.funnelConversion;
        funnelChart = new Chart(el, {
          type: 'bar',
          data: {
            labels: f.map(function (x) { return x.stage_name; }),
            datasets: [{
              data: f.map(function (x) { return x.conversion_rate; }),
              backgroundColor: 'rgba(242,131,31,0.75)',
              borderColor: '#F2831F', borderWidth: 1, borderRadius: 4,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: function (c) { return c.raw + '%'; } } },
            },
            scales: {
              y: { min: 0, max: 100, ticks: { callback: function (v) { return v + '%'; }, font: { size: 11 } } },
              x: { ticks: { font: { size: 11 } } },
            },
          },
        });
      },

      renderSourceChart: function () {
        var el = document.getElementById('sourceDonutChart');
        if (!el) return;
        if (sourceChart) sourceChart.destroy();
        // Promoted out of the collapsed analytics object — sourceEffectiveness
        // is now a top-level field updated by reloadSourceEffectiveness when
        // the Sourcing ROI section's filters change.
        var s = this.sourceEffectiveness;
        // TPG orange leads, then diverse accents for additional sources
        var colors = ['#F2831F','#239ED8','#3AA76D','#8E5DC9','#E14B4B','#1A1A2E'];
        sourceChart = new Chart(el, {
          type: 'doughnut',
          data: {
            labels: s.map(function (x) { return x.source_name; }),
            datasets: [{
              data: s.map(function (x) { return x.total_candidates; }),
              backgroundColor: s.map(function (_, i) { return colors[i % colors.length]; }),
              borderColor: '#fff', borderWidth: 2,
            }],
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }, cutout: '60%' },
        });
      },

      renderTrendChart: function () {
        var el = document.getElementById('trendChart');
        if (!el) return;
        if (trendChart) trendChart.destroy();
        var t = this.analytics.timeToHireTrend;
        trendChart = new Chart(el, {
          type: 'line',
          data: {
            labels: t.map(function (x) { return x.month_label; }),
            datasets: [{
              data: t.map(function (x) { return x.avg_days_to_hire; }),
              borderColor: '#F2831F', backgroundColor: 'rgba(242,131,31,0.1)',
              fill: true, tension: 0.35, pointRadius: 4,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { min: 0, ticks: { font: { size: 11 } } }, x: { ticks: { font: { size: 11 } } } },
          },
        });
      },

      // ── Multi-user sync polling ──────────────────────────
      // 20s interval = 180 polls/hour/user. Comfortable headroom under
      // GAS Workspace's 6-hour/day script runtime quota for the expected
      // 5-10 recruiters. Polling pauses automatically when tab is hidden
      // (document.hidden) or when the user has a peek panel open.
      startSyncPolling: function () {
        var self = this;
        syncTimer = setInterval(function () { self.checkSync(); }, 20000);
      },

      // Manual refresh — wired to the 🔄 button in the topbar.
      // Uses silentReload so the table/Kanban stays visible during refetch
      // (the spinning icon is the only feedback). Previously this called
      // reloadAll which set loading=true → the skeleton flashed in for
      // ~300-800ms, which felt like a regression on a *user-initiated*
      // refresh where they're already looking at content.
      manualRefresh: async function () {
        if (this.syncing) return;
        this.syncing = true;
        try {
          await this.silentReload();
          Alpine.store('app').toastSuccess('Refreshed.');
        } catch (e) {
          Alpine.store('app').toastError('Refresh failed: ' + e.message);
        } finally {
          this.syncing = false;
        }
      },

      checkSync: async function () {
        var self = this;
        if (document.hidden) return;         // skip if tab inactive
        if (Alpine.store('app').peek.open) return; // don't disrupt active editing
        try {
          self.syncing = true;
          var fp = await gasCall('getSyncFingerprint');
          if (lastSyncSig && fp.sig !== lastSyncSig) {
            // Snapshot scroll BEFORE the silent reload so we can restore
            // it after Alpine re-renders. Charts re-init can shift layout
            // by a few px and the table re-render briefly recomputes
            // heights — without restoring, the user mid-scroll gets
            // yanked to a slightly different position. Subtle but
            // perceptible jank that breaks the "live" feel.
            var scrollY = window.scrollY;
            self.syncStale = true;
            await self.silentReload();
            self.$nextTick(function () { window.scrollTo({ top: scrollY }); });
            Alpine.store('app').toastSuccess('Updated with teammate changes.');
            self.syncStale = false;
          }
          lastSyncSig = fp.sig;
        } catch (e) {
          /* network blip — ignore */
        } finally {
          self.syncing = false;
        }
      },
    };
  });

  // ── Peek Panel component ─────────────────────────────────
  Alpine.data('peekComponent', function () {
    var presenceTimer = null;
    return {
      editStageId: 0, editRecruiterId: '', editSourceId: '', editRegionId: '',
      editMotion: 'Inbound', editKanban: 'Normal', editPostHire: '', editNotes: '',
      otherViewers: [],   // [{ email, secondsAgo }]

      /**
       * Deterministic avatar color from an email — used to color the
       * presence avatars in a stable way. Same email = same color every
       * time, no server round-trip needed, feels like a consistent identity.
       */
      presenceColor: function (email) {
        if (!email) return '#8A90A2';
        var hash = 0;
        for (var i = 0; i < email.length; i++) {
          hash = ((hash << 5) - hash) + email.charCodeAt(i);
          hash |= 0;
        }
        var palette = [
          '#594AE2', '#F2831F', '#239ED8', '#3AA76D',
          '#E14B4B', '#8E5DC9', '#D17907', '#1A8FB3',
        ];
        return palette[Math.abs(hash) % palette.length];
      },

      /** Tick — pings the server we're here, then reads other viewers. */
      _presenceTick: async function () {
        var id = this.$store.app.peek.candidateId;
        if (!id) return;
        try {
          await gasCall('touchPresence', id);
          var viewers = await gasCall('getPresence', id);
          this.otherViewers = viewers || [];
        } catch (e) { /* network flake — non-fatal */ }
      },

      init: function () {
        var self = this;

        function syncFromCandidate(c) {
          if (!c) return;
          self.editStageId    = c.stage_id;
          self.editRecruiterId = c.recruiter_id == null ? '' : String(c.recruiter_id);
          self.editSourceId   = c.source_id == null ? '' : String(c.source_id);
          self.editRegionId   = c.region_id == null ? '' : String(c.region_id);
          self.editMotion     = c.motion || 'Inbound';
          self.editKanban     = c.kanban_state || 'Normal';
          self.editPostHire   = c.post_hire_status || '';
          self.editNotes      = c.notes || '';
        }

        // Always set up the watcher first — when openPeek() is in flight,
        // peek.candidate is null at mount time, so a guarded init that bailed
        // here used to skip setting up the watch entirely. Result: editStageId
        // stayed at 0, the <select x-model="editStageId"> rendered "Applied"
        // (the first option), and Advance/Save persisted the wrong stage.
        this.$watch('$store.app.peek.candidate', syncFromCandidate);

        // Cover the case where candidate is already loaded by mount (e.g. open
        // a second candidate while peek is still mounted from the first one).
        syncFromCandidate(this.$store.app.peek.candidate);

        // Kick off presence tracking — ping every 15s, immediately on open.
        // When peek unmounts (candidateId goes null), the interval is cleared.
        var self = this;
        function startPresence() {
          if (presenceTimer) clearInterval(presenceTimer);
          self._presenceTick();
          presenceTimer = setInterval(function () { self._presenceTick(); }, 15000);
        }
        this.$watch('$store.app.peek.candidateId', function (id) {
          if (id) startPresence();
          else if (presenceTimer) { clearInterval(presenceTimer); presenceTimer = null; self.otherViewers = []; }
        });
        if (this.$store.app.peek.candidateId) startPresence();
      },

      peekName: function () {
        var c = this.$store.app.peek.candidate;
        return c ? (c.first_name || '') + ' ' + (c.last_name || '') : '';
      },

      saveStage: async function () {
        var id = this.$store.app.peek.candidateId;
        var newStage = parseInt(this.editStageId, 10);
        var expected = this.$store.app.peek.candidate
          ? this.$store.app.peek.candidate.date_last_stage_update
          : null;
        try {
          await gasCall('updateCandidateStage', id, newStage, expected);
          var r = await gasCall('getCandidateDetail', id);
          this.$store.app.peek.candidate = r.candidate;
          this.$store.app.peek.history = r.history;
          var root = Alpine.$data(document.querySelector('#app'));
          if (root && root.refreshCandidate) await root.refreshCandidate(id);
          this.$store.app.toastSuccess('Stage updated.');
        } catch (e) {
          this._handleSaveError(e, 'Stage update failed: ', id);
        }
      },

      // Shared error handler for peek panel saves. Surfaces conflict
      // errors with a Reload action (matches updateCandidateField in the
      // root component) and falls through to a generic toast otherwise.
      _handleSaveError: function (err, prefix, candidateId) {
        var self = this;
        var isConflict = err && err.message && err.message.indexOf('CONFLICT: ') === 0;
        if (isConflict) {
          this.$store.app.toastError(
            'Conflict — someone else updated this candidate.',
            {
              actionLabel: 'Reload',
              duration: 8000,
              onAction: function () {
                gasCall('getCandidateDetail', candidateId).then(function (r) {
                  self.$store.app.peek.candidate = r.candidate;
                  self.$store.app.peek.history = r.history;
                });
              },
            }
          );
        } else {
          this.$store.app.toastError(prefix + (err.message || String(err)));
        }
      },

      advanceStage: async function () {
        var stages = this.$store.app.settings.stages
          .filter(function (s) { return s.is_enabled && !s.is_rejected; })
          .sort(function (a, b) { return a.sequence - b.sequence; });
        var idx = stages.findIndex(function (s) { return s.id === parseInt(this.editStageId, 10); }.bind(this));
        if (idx < stages.length - 1) {
          this.editStageId = stages[idx + 1].id;
          await this.saveStage();
        }
      },

      saveField: async function (field, value) {
        var id = this.$store.app.peek.candidateId;
        var expected = this.$store.app.peek.candidate
          ? this.$store.app.peek.candidate.date_last_stage_update
          : null;
        try {
          var updates = {}; updates[field] = value;
          await gasCall('updateCandidate', id, updates, expected);
          var r = await gasCall('getCandidateDetail', id);
          this.$store.app.peek.candidate = r.candidate;
          var root = Alpine.$data(document.querySelector('#app'));
          if (root && root.refreshCandidate) await root.refreshCandidate(id);
          this.$store.app.toastSuccess('Saved.');
        } catch (e) {
          this._handleSaveError(e, 'Save failed: ', id);
        }
      },

      /**
       * Extract @first-name mentions from a block of text.
       * Lowercased + deduped. We match "@" followed by letters only,
       * bounded by a word boundary. "@brad," → ["brad"]; "email@x" not matched.
       */
      _extractMentions: function (text) {
        if (!text) return [];
        var out = {};
        var re = /(?:^|[^A-Za-z0-9_@.])@([A-Za-z][A-Za-z0-9_-]{0,30})/g;
        var m;
        while ((m = re.exec(text)) !== null) out[m[1].toLowerCase()] = true;
        return Object.keys(out);
      },

      /**
       * Resolve extracted @names to the active recruiter list.
       * Returns only names that have a matching recruiter — used
       * for the "Mentions: Brad, Alice" hint line under the notes.
       */
      resolvedMentions: function () {
        var names = this._extractMentions(this.editNotes);
        if (names.length === 0) return [];
        var recruiters = this.$store.app.settings.recruiters || [];
        return names
          .map(function (n) {
            var match = recruiters.find(function (r) {
              return r.is_active && r.name && r.name.toLowerCase().split(/\s+/)[0] === n;
            });
            return match ? match.name.split(/\s+/)[0] : null;
          })
          .filter(Boolean);
      },

      saveNotes: async function () {
        var current = this.$store.app.peek.candidate.notes || '';
        if (this.editNotes === current) return;
        var previousMentions = this._extractMentions(current);
        var newMentions = this._extractMentions(this.editNotes);
        var added = newMentions.filter(function (m) { return previousMentions.indexOf(m) < 0; });
        await this.saveField('notes', this.editNotes);

        // Fire mention notifications for newly-added @names only.
        // Self-mentions + unresolved names are dropped server-side.
        if (added.length > 0) {
          try {
            var result = await gasCall('notifyMentions', {
              candidateId: this.$store.app.peek.candidateId,
              mentions: added,
              noteExcerpt: this.editNotes.slice(0, 400),
              webAppUrl: window.location.href.split('?')[0],
            });
            if (result && result.sent > 0) {
              this.$store.app.toastSuccess(
                'Notified ' + result.sent + ' teammate' + (result.sent === 1 ? '' : 's') + '.'
              );
            }
          } catch (e) { /* mail failures shouldn't block note save */ }
        }
      },

      // Opens the reject modal — actual reject logic lives in the rejectModal
      // component so the UI is a proper form (dropdown + optional note)
      // instead of a native browser prompt().
      confirmReject: function () {
        this.$store.app.openModal('confirmReject', {
          candidateId: this.$store.app.peek.candidateId,
          candidateName: this.peekName(),
        });
      },

      /**
       * Undoable delete — optimistic UI + 5s escape hatch.
       *
       * Deletion is delayed 5 seconds on the client. During that window
       * the backend is untouched; a toast with an "Undo" button is the
       * only record of the pending delete. If Undo is clicked, the
       * candidate pops back into the list. If the timer expires (or the
       * tab closes), the server delete fires.
       *
       * Upside: no schema change, no soft-delete status column.
       * Downside: closing the tab before 5s elapses with a Pending delete
       * preserves the candidate (safe fallback).
       */
      confirmDelete: function () {
        var name = this.peekName();
        var id = this.$store.app.peek.candidateId;
        var root = Alpine.$data(document.querySelector('#app'));
        if (!root) return;

        // Capture the candidate object + its position in the list so Undo can restore
        var idx = root.allCandidates.findIndex(function (c) { return c.id === id; });
        if (idx < 0) return;
        var snapshot = root.allCandidates[idx];

        // Optimistic remove from the UI
        root.allCandidates.splice(idx, 1);
        this.$store.app.closePeek();

        // Undo-able toast. onDismiss (5s timer expired) fires the real server delete.
        var undone = false;
        this.$store.app.toastInfo('Deleted ' + name, {
          actionLabel: 'Undo',
          duration: 5000,
          onAction: function () {
            undone = true;
            // Restore in place
            root.allCandidates.splice(idx, 0, snapshot);
          },
          onDismiss: async function () {
            if (undone) return;
            try {
              await gasCall('deleteCandidate', id);
            } catch (e) {
              // Server delete failed after user thought they'd confirmed —
              // put the row back and surface the error
              root.allCandidates.splice(idx, 0, snapshot);
              Alpine.store('app').toastError('Delete failed: ' + e.message);
            }
          },
        });
      },
    };
  });

  // ── Settings panel component ─────────────────────────────
  Alpine.data('settingsComponent', function () {
    function clone(a) { return JSON.parse(JSON.stringify(a)); }
    return {
      tab: 'recruiters',
      saving: false,
      stages: [], sources: [], regions: [], recruiters: [], refuseReasons: [],

      init: function () {
        this.reload('stages'); this.reload('sources'); this.reload('regions');
        this.reload('recruiters'); this.reload('refuseReasons');
      },

      reload: function (kind) {
        var map = {
          stages: 'stages', sources: 'sources', regions: 'regions',
          recruiters: 'recruiters', refuseReasons: 'refuseReasons',
        };
        this[map[kind]] = clone(this.$store.app.settings[map[kind]] || []);
      },

      removeRow: function (kind, idx) { this[kind].splice(idx, 1); },

      addStage: function () {
        var maxSeq = this.stages.reduce(function (m, s) { return Math.max(m, s.sequence || 0); }, 0);
        this.stages.push({ id: 0, name: '', sequence: maxSeq + 100, color: '#607d8b', is_hired: false, is_rejected: false, is_offer: false, target_hours: null, is_enabled: true });
      },
      addRecruiter: function () { this.recruiters.push({ id: 0, name: '', email: '', is_active: true }); },
      addSource: function () { this.sources.push({ id: 0, name: '', medium: '', default_motion: 'Inbound', is_enabled: true }); },
      addRegion: function () { this.regions.push({ id: 0, name: '', is_enabled: true }); },
      addReason: function () { this.refuseReasons.push({ id: 0, name: '', is_enabled: true }); },

      save: async function (kind) {
        var self = this;
        var map = {
          stages: { local: 'stages', gas: 'saveStages' },
          sources: { local: 'sources', gas: 'saveSources' },
          regions: { local: 'regions', gas: 'saveRegions' },
          recruiters: { local: 'recruiters', gas: 'saveRecruiters' },
          refuseReasons: { local: 'refuseReasons', gas: 'saveRefuseReasons' },
        };
        var conf = map[kind];

        var rows = this[conf.local].map(function (r) {
          var copy = {};
          for (var k in r) copy[k] = r[k];
          if (copy.id == null || copy.id <= 0) copy.id = 0;
          return copy;
        });

        if (kind === 'stages') {
          // Validate flag uniqueness
          var errs = [];
          if (rows.filter(function (r) { return r.is_hired; }).length > 1) errs.push('Only one Hired stage allowed.');
          if (rows.filter(function (r) { return r.is_rejected; }).length > 1) errs.push('Only one Rejected stage allowed.');
          if (rows.filter(function (r) { return r.is_offer; }).length > 1) errs.push('Only one Offer stage allowed.');
          if (rows.some(function (r) { return !r.name.trim(); })) errs.push('All stages need names.');
          if (errs.length) { this.$store.app.toastError(errs.join(' ')); return; }
          rows.forEach(function (s, i) { s.sequence = (i + 1) * 100; });
        }

        this.saving = true;
        try {
          await gasCall(conf.gas, rows);
          // Reload from server so local copy has real IDs (fixes C5)
          var fresh = await gasCall('getSettings');
          // IMPORTANT: MUTATE the store's settings object in place instead of
          // replacing it. Alpine's reactivity tracks the original proxy; a
          // bulk-replace (= { ... }) detaches dependent templates (the Add Job
          // modal's recruiter dropdown, the topbar Recruiter filter, the
          // Kanban stage columns) and they keep rendering the old values.
          var s = this.$store.app.settings;
          s.stages        = fresh.stages;
          s.sources       = fresh.sources;
          s.regions       = fresh.regions;
          s.recruiters    = fresh.recruiters;
          s.refuseReasons = fresh.refuseReasons;
          this.reload(kind);
          // Notify main app — also mutate its local `settings` in place
          // so its own bindings (topbar filter, Kanban stage columns)
          // refresh without re-initialization.
          var root = Alpine.$data(document.querySelector('#app'));
          if (root) {
            root.settings.stages        = fresh.stages;
            root.settings.sources       = fresh.sources;
            root.settings.regions       = fresh.regions;
            root.settings.recruiters    = fresh.recruiters;
            root.settings.refuseReasons = fresh.refuseReasons;
            root.loadCandidates();
          }
          this.$store.app.toastSuccess('Saved.');
        } catch (e) {
          this.$store.app.toastError('Save failed: ' + e.message);
        } finally {
          this.saving = false;
        }
      },
    };
  });

});
</script>
