<script>
/* =============================================================
   TPG ATS — App JS
   Single Alpine.js component tree, all state centralized.
   Fixes applied from audit:
     C1 — getCurrentUserEmail name matches the backend
     C2 — cross-section refresh via in-store mutations, not DOM events
     C3 — "__unassigned__" sentinel for null-recruiter filter
     C4 — delete flow uses modal.data directly (no rogue `this`)
     C5 — settings save reloads from server to pick up real IDs
     H2/H3 — peek panel uses real x-model on all selects
     H6 — analytics re-fetch on filter change
     H7 — single getAllHistory call in backend
   Plus: 15s sync fingerprint poll for multi-user coordination.
   ============================================================= */

// ── Client-side error visibility ─────────────────────────────
// Without this, JS errors and unhandled promise rejections are silent
// in production — the app sits frozen and nobody knows why. The handler
// below shows a toast when Alpine is ready and a degraded banner when
// it isn't (e.g. error during Alpine init itself). All errors also
// log to the GAS execution log via the lightweight logClientError
// endpoint so post-incident triage doesn't require shipping debug
// builds.
function _showFatalBanner(msg) {
  // Used only when the Alpine toast store isn't available yet. Idempotent
  // — second call updates the existing banner instead of stacking.
  var id = '__tpg_fatal_banner';
  var el = document.getElementById(id);
  if (!el) {
    el = document.createElement('div');
    el.id = id;
    el.style.cssText = [
      'position:fixed', 'top:0', 'left:0', 'right:0',
      'background:#E14B4B', 'color:white',
      'padding:10px 16px', 'font:13px/1.4 system-ui,sans-serif',
      'z-index:99999', 'box-shadow:0 2px 6px rgba(0,0,0,0.15)',
    ].join(';');
    document.body.appendChild(el);
  }
  el.textContent = 'Something went wrong: ' + msg + ' (Cmd+R to reload)';
}

function _reportClientError(kind, err) {
  var msg = (err && (err.message || err.toString())) || String(err) || 'Unknown error';
  var stack = (err && err.stack) || '';
  // Try to surface visually — Alpine first, fallback to fatal banner.
  try {
    var store = (typeof Alpine !== 'undefined' && Alpine.store) ? Alpine.store('app') : null;
    if (store && typeof store.toastError === 'function') {
      store.toastError(kind + ': ' + msg);
    } else {
      _showFatalBanner(msg);
    }
  } catch (_) { _showFatalBanner(msg); }
  // Always log to console so devs can grab the stack from DevTools.
  console.error('[' + kind + ']', err);
  // Best-effort server log. We do NOT await — error reporting must never
  // throw or block the original error path.
  try {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withFailureHandler(function () { /* swallow — can't error on the error path */ })
        .logClientError({
          kind: kind,
          message: msg,
          stack: stack.slice(0, 2000),
          url: (typeof location !== 'undefined' && location.href) || '',
          ua: (typeof navigator !== 'undefined' && navigator.userAgent) || '',
          ts: new Date().toISOString(),
        });
    }
  } catch (_) { /* swallow */ }
}

window.addEventListener('error', function (e) {
  _reportClientError('JS error', e.error || e.message);
});
window.addEventListener('unhandledrejection', function (e) {
  _reportClientError('Unhandled promise', e.reason);
});

// ── Promise wrapper for google.script.run ───────────────────
// Rolling buffer of the most recent gasCall invocations. Populated by
// the gasCall wrapper below and read by the ?debug=1 panel so we can
// see "what just talked to the server" without scattering instrumentation
// through every handler. Capped to the last 50 entries so memory stays
// bounded even on long-lived sessions.
window.__gasCallLog = window.__gasCallLog || [];
function _logGasCall(entry) {
  window.__gasCallLog.push(entry);
  if (window.__gasCallLog.length > 50) {
    window.__gasCallLog.shift();
  }
}

function gasCall(fnName, ...args) {
  var startedAt = Date.now();
  return new Promise(function (resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(function (result) {
        _logGasCall({
          fn: fnName, ms: Date.now() - startedAt,
          ok: true, ts: new Date(startedAt).toISOString(),
        });
        resolve(result);
      })
      .withFailureHandler(function (err) {
        // Note: caller errors typically surface via the per-action toast
        // (e.g. "Save failed: …"). _reportClientError is for the cases
        // where the rejection bubbles all the way up to unhandledrejection.
        _logGasCall({
          fn: fnName, ms: Date.now() - startedAt,
          ok: false, error: err.message || String(err),
          ts: new Date(startedAt).toISOString(),
        });
        reject(new Error(err.message || String(err)));
      });
    runner[fnName].apply(runner, args);
  });
}

function userFacingError(err, fallback, hint) {
  var msg = (err && err.message) ? String(err.message) : String(err || '');
  if (!msg) msg = fallback || 'Request failed.';
  if (hint) return msg + ' ' + hint;
  return msg;
}

function hasAssignedId(val) {
  if (val === null || val === undefined || val === '') return false;
  return Number(val) !== 0;
}

// ── Global helpers (used in HTML via x-text, x-html, @) ─────
window.fmtDate = function (d) {
  if (!d) return '—';
  var dt = new Date(d);
  if (isNaN(dt.getTime())) return d;
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};
window.initials = function (name) {
  if (!name) return '?';
  return name.split(/\s+/).filter(Boolean).map(function (p) { return p[0]; }).slice(0, 2).join('').toUpperCase();
};
window.emailDisplayName = function (email) {
  if (!email) return 'Unknown user';
  var local = String(email).split('@')[0] || '';
  var spaced = local
    .replace(/[._-]+/g, ' ')
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .trim();
  if (!spaced) return email;
  return spaced
    .split(/\s+/)
    .filter(Boolean)
    .map(function (part) {
      return part.charAt(0).toUpperCase() + part.slice(1);
    })
    .join(' ');
};
// Deterministic palette color from an email so the same person always
// gets the same avatar tint across sessions and across surfaces (peek
// panel presence, topbar app presence). Avoids a server round-trip
// for what is purely a visual identity cue. Hoisted to window so both
// the topbar (atsApp scope) and the peek panel (peekComponent scope)
// can call it without code duplication.
window.presenceColor = function (email) {
  if (!email) return '#8A90A2';
  var hash = 0;
  for (var i = 0; i < email.length; i++) {
    hash = ((hash << 5) - hash) + email.charCodeAt(i);
    hash |= 0;
  }
  var palette = [
    '#594AE2', '#F2831F', '#239ED8', '#3AA76D',
    '#E14B4B', '#8E5DC9', '#D17907', '#1A8FB3',
  ];
  return palette[Math.abs(hash) % palette.length];
};
window.stageChipStyle = function (color) {
  var c = color || '#6c757d';
  var r = parseInt(c.slice(1, 3), 16), g = parseInt(c.slice(3, 5), 16), b = parseInt(c.slice(5, 7), 16);
  return 'background:rgba(' + r + ',' + g + ',' + b + ',0.15);color:' + c + ';';
};
window.motionClass = function (m) { return m === 'Outbound' ? 'outbound' : 'inbound'; };

/**
 * Human-readable "time ago" for activity feed timestamps.
 * Keeps to common buckets that recruiters eyeball quickly:
 *   <60s       → "just now"
 *   <60m       → "42m ago"
 *   <24h       → "5h ago"
 *   <30d       → "3d ago"
 *   else       → absolute date "Apr 12"
 */
window.relativeTime = function (iso) {
  if (!iso) return '';
  var then = new Date(iso).getTime();
  if (isNaN(then)) return '';
  var diff = Date.now() - then;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  if (diff < 30 * 86400000) return Math.floor(diff / 86400000) + 'd ago';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};

/**
 * CSV export helper — joined names (not IDs), RFC-4180 quoted, UTF-8 BOM
 * so Excel opens it correctly with unicode characters.
 */
function toCsvCell(v) {
  if (v == null) return '';
  var s = String(v);
  if (s.indexOf(',') > -1 || s.indexOf('"') > -1 || s.indexOf('\n') > -1) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}
window.exportCandidatesToCsv = function (candidates, filename) {
  if (!candidates || candidates.length === 0) {
    alert('No candidates to export.');
    return;
  }
  // Recruiter-friendly column order: identity → role → pipeline → context → dates
  var cols = [
    ['First Name',       function (c) { return c.first_name; }],
    ['Last Name',        function (c) { return c.last_name; }],
    ['Email',            function (c) { return c.email; }],
    ['Phone',            function (c) { return c.phone; }],
    ['Job',              function (c) { return c.job_title || ''; }],
    ['Stage',            function (c) { return c.stage_name || ''; }],
    ['Status',           function (c) { return c.status; }],
    ['Recruiter',        function (c) { return c.recruiter_name || ''; }],
    ['Source',           function (c) { return c.source_name || ''; }],
    ['Motion',           function (c) { return c.motion || ''; }],
    ['Region',           function (c) { return c.region_name || ''; }],
    ['Rating',           function (c) { return c.rating || 0; }],
    ['Days in Stage',    function (c) { return c.days_in_stage || 0; }],
    ['Days Applied',     function (c) { return c.days_since_applied || 0; }],
    ['Date Applied',     function (c) { return c.date_applied || ''; }],
    ['Last Stage Update', function (c) { return c.date_last_stage_update || ''; }],
    ['Refuse Reason',    function (c) { return c.refuse_reason_name || ''; }],
    ['LinkedIn',         function (c) { return c.linkedin_url || ''; }],
    ['Resume',           function (c) { return c.resume_url || ''; }],
    ['Notes',            function (c) { return (c.notes || '').replace(/\r?\n/g, ' · '); }],
    ['Created By',       function (c) { return c.created_by || ''; }],
  ];
  var header = cols.map(function (c) { return c[0]; }).join(',');
  var rows   = candidates.map(function (cand) {
    return cols.map(function (c) { return toCsvCell(c[1](cand)); }).join(',');
  });
  var csv = header + '\n' + rows.join('\n');

  // Prepend UTF-8 BOM so Excel opens it correctly
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = filename || ('tpg-ats-candidates-' + new Date().toISOString().split('T')[0] + '.csv');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
};

/**
 * Format a US phone number as the user types.
 *   "4155551234"        → "(415) 555-1234"
 *   "14155551234"       → "+1 (415) 555-1234"
 *   "+14155551234"      → "+1 (415) 555-1234"
 *   "415"               → "(415"           (live intermediate state)
 *   non-US-looking     → passes through with minor cleanup
 *
 * Behavior is "permissive but opinionated":
 * strips bad chars, leaves sensible partial formatting while the user
 * is still typing, never rejects input. Storage uses the formatted
 * display string — we don't try to convert to E.164 since recruiters
 * often paste international numbers that wouldn't round-trip cleanly
 * without a real library.
 */
window.formatPhone = function (raw) {
  if (!raw) return '';
  // Keep leading + if present, strip everything else except digits
  var leadingPlus = String(raw).trim().indexOf('+') === 0;
  var digits = String(raw).replace(/[^\d]/g, '');
  if (!digits) return leadingPlus ? '+' : '';

  // US 10-digit: (XXX) XXX-XXXX
  if (!leadingPlus && digits.length <= 10) {
    if (digits.length <= 3) return '(' + digits;
    if (digits.length <= 6) return '(' + digits.slice(0,3) + ') ' + digits.slice(3);
    return '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6,10);
  }
  // US 11-digit (with country code): +1 (XXX) XXX-XXXX
  if (!leadingPlus && digits.length === 11 && digits[0] === '1') {
    return '+1 (' + digits.slice(1,4) + ') ' + digits.slice(4,7) + '-' + digits.slice(7,11);
  }
  // Explicit +country: "+CC NNNNNN..." (best-effort 1-3 digit country split)
  if (leadingPlus) {
    // Simple heuristic: +1 is the common one; otherwise use first 2
    var cc = (digits[0] === '1') ? 1 : 2;
    var country = digits.slice(0, cc);
    var rest = digits.slice(cc);
    if (rest.length === 0) return '+' + country;
    if (rest.length <= 3) return '+' + country + ' ' + rest;
    if (rest.length <= 6) return '+' + country + ' ' + rest.slice(0,3) + '-' + rest.slice(3);
    if (rest.length <= 10) return '+' + country + ' ' + rest.slice(0,3) + '-' + rest.slice(3,6) + '-' + rest.slice(6);
    // Longer — just space every 3
    return '+' + country + ' ' + rest.match(/.{1,3}/g).join(' ');
  }
  // Longer-than-11 without a + — just leave it alone
  return digits;
};

// ── Salary range parsing & formatting ────────────────────────────────
// Storage format on the sheet is a single freeform string (`salary_range`)
// to keep the schema stable, but the UI exposes two structured number
// inputs (min, max). These helpers convert between the two so the
// existing data keeps reading cleanly while new entries get a clean
// canonical format ("60000-80000") under the hood.
//
// parseSalary tolerates anything humans might have typed historically:
//   "$60k–$80k", "60,000-80,000", "$60-$80k", "60k+", "80000",
//   "$60,000 – $80,000", and so on.
window.parseSalary = function (str) {
  if (!str) return { min: null, max: null };
  var s = String(str).trim();
  // Pull every run of digits, optionally followed by 'k' or 'K'. This
  // discards $, commas, dashes, en-dashes, em-dashes, "USD", "+", etc.
  var matches = s.match(/(\d[\d,]*)\s*([kK])?/g) || [];
  var nums = matches.map(function (m) {
    var n = parseInt(String(m).replace(/[^\d]/g, ''), 10);
    if (isNaN(n)) return null;
    // "60k" → 60000; bare "60" assumed to also mean 60000 if it's
    // less than 1000 (recruiters routinely type compensation in
    // thousands without the k suffix).
    if (/[kK]/.test(m)) return n * 1000;
    if (n < 1000) return n * 1000;
    return n;
  }).filter(function (n) { return n != null && n > 0; });

  if (nums.length === 0) return { min: null, max: null };
  if (nums.length === 1) return { min: nums[0], max: null };
  return { min: Math.min(nums[0], nums[1]), max: Math.max(nums[0], nums[1]) };
};

// Canonical storage form. Min-only saves as "60000"; both saves as
// "60000-80000". Empty/null produces "" so the column stays clean.
window.formatSalaryStorage = function (min, max) {
  var hasMin = min != null && min !== '' && !isNaN(min);
  var hasMax = max != null && max !== '' && !isNaN(max);
  if (!hasMin && !hasMax) return '';
  if (hasMin && hasMax) return String(min) + '-' + String(max);
  if (hasMin)            return String(min);
  return String(max);
};

// Display form for the job card / details panel. "$60K – $80K" reads
// fastest in dense lists; falls back to the raw storage string when
// it doesn't parse cleanly so legacy freeform entries still render.
window.formatSalaryDisplay = function (str) {
  if (!str) return '';
  var p = window.parseSalary(str);
  if (p.min == null && p.max == null) return String(str);
  function k(n) { return '$' + Math.round(n / 1000) + 'K'; }
  if (p.min != null && p.max != null) return k(p.min) + ' \u2013 ' + k(p.max);
  if (p.min != null)                   return k(p.min) + '+';
  return 'up to ' + k(p.max);
};


// ── History / URL state (deep-linking + browser back button) ─────────
// GAS Web Apps run inside an iframe where only google.script.history
// can actually update the parent frame's URL. We wrap it so the rest
// of the app can keep using a simple pushHistory / popHistory API.
//
// Encoding: the whole app state lives in a single "state" object that
// gets serialized to URL params by google.script.history. We track an
// internal stack so closing a modal/peek correctly reverts to the
// previous state rather than navigating off the web app entirely.
var _historyStack = [];
function _gasHistory() {
  return (typeof google !== 'undefined' && google.script && google.script.history) || null;
}
function pushHistory(partial) {
  var h = _gasHistory();
  if (!h) return;                     // not in GAS iframe (local dev / tests)
  var newState = Object.assign({}, currentState(), partial || {});
  _historyStack.push(newState);
  try { h.push(newState, null, serializeState(newState)); }
  catch (e) { /* silently non-fatal */ }
}
function popHistory() {
  var h = _gasHistory();
  if (!h) return;
  _historyStack.pop();
  // Replace current entry with the previous state's URL so we don't
  // accumulate empty frames when the user closes nested overlays.
  var prev = _historyStack[_historyStack.length - 1] || {};
  try { h.replace(prev, null, serializeState(prev)); }
  catch (e) { /* non-fatal */ }
}
function currentState() {
  var store = typeof Alpine !== 'undefined' && Alpine.store ? Alpine.store('app') : null;
  if (!store) return {};
  var s = {};
  if (store.peek && store.peek.candidateId) s.candidate = store.peek.candidateId;
  if (store.modal && store.modal.open)      s.modal     = store.modal.type;
  return s;
}
function serializeState(state) {
  var out = {};
  if (state.candidate) out.candidate = String(state.candidate);
  if (state.modal)     out.modal     = String(state.modal);
  return out;
}
// Apply URL params on initial load (runs AFTER Alpine store is initialized)
function applyInitialUrlState(params) {
  if (!params) return;
  if (params.candidate) {
    var id = parseInt(params.candidate, 10);
    if (!isNaN(id)) Alpine.store('app').openPeek(id, { suppressHistory: true });
  }
}

function presetRange(preset) {
  var now = new Date();
  var end = now.toISOString().split('T')[0];
  var start;
  switch (preset) {
    case '7d':   start = new Date(now - 7 * 86400000).toISOString().split('T')[0]; break;
    case '30d':  start = new Date(now - 30 * 86400000).toISOString().split('T')[0]; break;
    case '6m':   start = new Date(now.getFullYear(), now.getMonth() - 6, now.getDate()).toISOString().split('T')[0]; break;
    case '1y':   start = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate()).toISOString().split('T')[0]; break;
    case 'all':  start = '2020-01-01'; end = '2099-12-31'; break;
    case '90d':
    default:     start = new Date(now - 90 * 86400000).toISOString().split('T')[0];
  }
  return { start: start, end: end };
}

// Sentinel preset value that means "the user wants to type their own
// dates" — picked up by every preset dropdown in the app. We DO NOT
// overwrite startDate/endDate when this is selected; the custom date
// inputs become the source of truth instead. Centralized so the
// dropdown options and the conditional reveal both reference the
// same string.
var CUSTOM_PRESET = 'custom';

// ── Alpine setup ────────────────────────────────────────────
document.addEventListener('alpine:init', function () {

  // Global store (peek panel, toasts, settings cache, modal)
  Alpine.store('app', {
    userEmail: '',
    toasts: [],
    _toastId: 0,

    peek:     { open: false, candidateId: null, candidate: null, history: [], loading: false, historyLoading: false },
    modal:    { open: false, type: null, data: null },
    settings: { stages: [], sources: [], regions: [], recruiters: [], refuseReasons: [], waterfallBenchmarks: [] },
    // Mirrored from atsApp.jobs by loadJobs() so the peek panel
    // (a separate Alpine component scope) can render the Job dropdown
    // without reaching up to the root component for every render.
    jobs:     [],
    settingsOpen: false,
    settingsDirty: false,
    // Deep-link sinks: waterfall Goal-cell click writes these to pre-select
    // the Goals tab + flash a specific stage row. Cleared by the settings
    // component after it honors them.
    settingsTab: null,
    settingsFlashStage: null,
    settingsGoalJobId: null,
    // Legacy slot — no longer read, but kept to avoid breaking snapshots
    // that might still set it. Safe to remove after one deploy cycle.
    settingsBenchmarkTier: null,

    // Toast — "opts" can include:
    //   actionLabel  — text for the inline action button
    //   onAction     — fn called when the user clicks the action button.
    //                  If provided, onDismiss is called instead when the
    //                  toast times out (used for undo flows)
    //   onDismiss    — fn called when the toast auto-dismisses without
    //                  the user clicking the action
    //   duration     — ms until auto-dismiss (default 4000)
    toast: function (msg, type, opts) {
      var id = ++this._toastId;
      var icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
      var o = opts || {};
      var t = {
        id: id,
        message: msg,
        type: type || 'success',
        icon: icons[type || 'success'],
        actionLabel: o.actionLabel || null,
        onAction: o.onAction || null,
        onDismiss: o.onDismiss || null,
        _dismissed: false,
      };
      this.toasts.push(t);
      var self = this;
      var duration = o.duration || 4000;
      t._timer = setTimeout(function () {
        if (t._dismissed) return;
        t._dismissed = true;
        self.toasts = self.toasts.filter(function (x) { return x.id !== id; });
        if (t.onDismiss) { try { t.onDismiss(); } catch (e) { /* non-fatal */ } }
      }, duration);
    },
    dismissToast: function (id) {
      var t = this.toasts.find(function (x) { return x.id === id; });
      if (!t || t._dismissed) return;
      t._dismissed = true;
      clearTimeout(t._timer);
      this.toasts = this.toasts.filter(function (x) { return x.id !== id; });
    },
    invokeToastAction: function (id) {
      var t = this.toasts.find(function (x) { return x.id === id; });
      if (!t || t._dismissed) return;
      t._dismissed = true;
      clearTimeout(t._timer);
      this.toasts = this.toasts.filter(function (x) { return x.id !== id; });
      if (t.onAction) { try { t.onAction(); } catch (e) { /* non-fatal */ } }
    },
    toastSuccess: function (m, opts) { this.toast(m, 'success', opts); },
    toastError:   function (m, opts) {
      // Error toasts get the raw message attached so the "Copy error"
      // affordance can include the exact text (without truncation /
      // i18n) in the clipboard payload. Lets users paste a useful
      // bug report instead of describing the error from memory.
      var enriched = Object.assign({ rawError: m, copyable: true, duration: 7000 }, opts || {});
      this.toast(m, 'error', enriched);
    },
    toastInfo:    function (m, opts) { this.toast(m, 'info', opts); },

    // Build a clipboard payload with everything support would want:
    // raw error, current URL, deployed user, viewport, browser, time.
    // Triggered by the inline "Copy error" link on error toasts.
    copyErrorToClipboard: function (toastId) {
      var t = this.toasts.find(function (x) { return x.id === toastId; });
      if (!t) return;
      var payload = [
        '== TPG ATS error report ==',
        'When:    ' + new Date().toISOString(),
        'User:    ' + (this.userEmail || 'unknown'),
        'URL:     ' + window.location.href,
        'UA:      ' + navigator.userAgent,
        'Message: ' + (t.rawError || t.message),
      ].join('\n');
      var done = false;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(payload).then(function () {});
          done = true;
        }
      } catch (_e) { /* fall through */ }
      if (!done) {
        // Fallback for older browsers / iframe restrictions.
        try {
          var ta = document.createElement('textarea');
          ta.value = payload;
          ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          done = true;
        } catch (_e) { /* give up — can't copy in this env */ }
      }
      if (done) {
        this.toast('Error details copied to clipboard.', 'success', { duration: 2000 });
      } else {
        this.toast('Could not copy. Open dev tools or screenshot.', 'error', { duration: 4000 });
      }
    },

    // Peek — opt { suppressHistory: true } skips pushing a new history frame
    // (used when restoring from a URL on initial load, or reacting to popstate)
    //
    // Two-phase render: the candidate object is already in allCandidates with
    // every joined field (stage_name, recruiter_name, job title, motion, etc.)
    // because the table just rendered it, so we can paint the entire panel
    // chrome instantly from local state. Only the history strip needs the
    // server. Saves the 300-1500ms blank-panel feel on every row click —
    // the most-frequent interaction in the app.
    openPeek: async function (id, opt) {
      this.peek.open = true; this.peek.candidateId = id;
      // Seed from local allCandidates so the panel renders in <16ms.
      // Falls through to null (with the spinner) only when the candidate
      // isn't in the current view (URL deep-link, search miss, etc.).
      var rootEl = document.querySelector('#app');
      var rootData = rootEl ? Alpine.$data(rootEl) : null;
      var local = rootData && rootData.allCandidates
        ? rootData.allCandidates.find(function (x) { return x.id === id; })
        : null;
      this.peek.candidate = local || null;
      this.peek.history = [];
      this.peek.loading = !local;        // only spin when we had nothing to show
      this.peek.historyLoading = true;   // strip-level skeleton while history loads
      if (!opt || !opt.suppressHistory) pushHistory({ candidate: id });
      try {
        var r = await gasCall('getCandidateDetail', id);
        this.peek.candidate = r.candidate;
        this.peek.history = r.history;
      } catch (e) {
        this.toastError('Could not load candidate: ' + e.message);
        // Only close the panel if we never managed to render anything.
        // If we already showed the local snapshot, leave it up — the user
        // can still see the candidate; just the history failed to refresh.
        if (!local) this.peek.open = false;
      } finally {
        this.peek.loading = false;
        this.peek.historyLoading = false;
      }
    },
    closePeek: function (opt) {
      this.peek.open = false; this.peek.candidateId = null;
      this.peek.candidate = null; this.peek.history = [];
      this.peek.loading = false; this.peek.historyLoading = false;
      if (!opt || !opt.suppressHistory) popHistory();
    },

    // Modal
    openModal: function (type, data) {
      this.modal.type = type; this.modal.data = data || null; this.modal.open = true;
      pushHistory({ modal: type });
    },
    closeModal: function (opt) {
      // If a confirm() Promise is pending and the modal is being closed
      // by a path other than the confirm buttons themselves (URL state,
      // SDK call, etc.), resolve it as "cancel" so the awaiter doesn't
      // hang forever. Idempotent — _confirmResolve no-ops without state.
      if (this.modal.type === 'confirm') this._confirmResolve(false, { skipClose: true });
      this.modal.open = false; this.modal.type = null; this.modal.data = null;
      if (!opt || !opt.suppressHistory) popHistory();
    },

    // ── Branded async confirm() — replaces native window.confirm ──────
    // Returns Promise<boolean>. Native confirm shows a scary
    // "An embedded page at n-xxx.googleusercontent.com says…" header
    // because GAS web apps run inside an iframe; the browser refuses to
    // let us suppress that affordance. This in-app modal looks like the
    // rest of the app and uses clear, action-specific button labels
    // instead of generic "OK" / "Cancel."
    //
    // Usage:
    //   var ok = await Alpine.store('app').confirm({
    //     title: 'Discard unsaved changes?',
    //     message: 'You have unsaved Settings changes…',
    //     confirmLabel: 'Discard changes',
    //     cancelLabel:  'Keep editing',
    //     danger: true,    // makes confirm button red instead of blue
    //   });
    //   if (!ok) return;
    confirm: function (opts) {
      var self = this;
      return new Promise(function (resolve) {
        // If a previous confirm is somehow still pending, dismiss it as
        // cancelled before opening this one. Prevents two stacked dialogs
        // and a leaked Promise resolver from a prior call.
        if (self._confirmResolver) {
          var prev = self._confirmResolver;
          self._confirmResolver = null;
          try { prev(false); } catch (_e) { /* noop */ }
        }
        self._confirmResolver = resolve;
        self.openModal('confirm', {
          title:        opts.title        || 'Confirm',
          message:      opts.message      || '',
          confirmLabel: opts.confirmLabel || 'Confirm',
          cancelLabel:  opts.cancelLabel  || 'Cancel',
          danger:       !!opts.danger,
        });
      });
    },

    // Called by the confirm modal's buttons. Resolves the pending Promise
    // and closes the modal in one step. skipClose=true is used by the
    // closeModal() defensive path above to avoid recursion.
    _confirmResolver: null,
    _confirmResolve: function (value, opt) {
      if (this._confirmResolver) {
        var fn = this._confirmResolver;
        this._confirmResolver = null;
        try { fn(value); } catch (_e) { /* noop */ }
      }
      if (!opt || !opt.skipClose) this.closeModal();
    },

    requestCloseSettings: async function () {
      if (this.settingsDirty) {
        var ok = await this.confirm({
          title:        'Discard unsaved changes?',
          message:      'You have unsaved Settings changes that will be lost if you close now.',
          confirmLabel: 'Discard changes',
          cancelLabel:  'Keep editing',
          danger:       true,
        });
        if (!ok) return false;
      }
      this.settingsDirty = false;
      this.settingsOpen = false;
      return true;
    },
  });

  // ── Reusable multi-select component ─────────────────────────
  //
  // Chip-style trigger + checkbox popover. The caller owns the selection
  // state and passes it in via `get` / `set` closures so reactivity flows
  // naturally through the parent scope (Alpine doesn't have v-model-like
  // two-way bindings across component boundaries, so closures are cleaner
  // than passing in string paths + $data reflection).
  //
  // Options come in as `{id, name}` objects; the component prepends
  // `__unassigned__` / `__assigned__` sentinels when configured. Empty
  // selection === "all" everywhere downstream.
  Alpine.data('mselect', function (config) {
    return {
      open: false,
      query: '',
      label:           (config && config.label) || 'Filter',
      allowUnassigned: !!(config && config.allowUnassigned),
      allowAssigned:   !!(config && config.allowAssigned),
      searchable:      !(config && config.searchable === false),
      // Read-only fallback when options is static.
      _optsFn:    (config && typeof config.options === 'function') ? config.options : function () { return (config && config.options) || []; },
      _getFn:     (config && typeof config.get === 'function')     ? config.get     : function () { return []; },
      _setFn:     (config && typeof config.set === 'function')     ? config.set     : function () {},
      selected: function () {
        var v = this._getFn();
        return Array.isArray(v) ? v : [];
      },
      isChecked: function (id) {
        var sel = this.selected();
        for (var i = 0; i < sel.length; i++) if (sel[i] === id) return true;
        return false;
      },
      toggle: function (id) {
        var sel = this.selected().slice();
        var idx = -1;
        for (var i = 0; i < sel.length; i++) if (sel[i] === id) { idx = i; break; }
        if (idx >= 0) sel.splice(idx, 1);
        else          sel.push(id);
        this._setFn(sel);
      },
      clearAll: function () { this._setFn([]); },
      allOptions: function () {
        var base = (this._optsFn() || []).map(function (o) {
          return { id: o.id, name: o.name || o.title || String(o.id), italic: false };
        });
        var extras = [];
        if (this.allowAssigned)   extras.push({ id: '__assigned__',   name: 'Assigned',   italic: true });
        if (this.allowUnassigned) extras.push({ id: '__unassigned__', name: 'Unassigned', italic: true });
        return extras.concat(base);
      },
      visibleOptions: function () {
        var q = (this.query || '').trim().toLowerCase();
        var opts = this.allOptions();
        if (!q) return opts;
        return opts.filter(function (o) { return (o.name || '').toLowerCase().indexOf(q) !== -1; });
      },
      triggerText: function () {
        var sel = this.selected();
        if (sel.length === 0) return 'All';
        if (sel.length === 1) {
          var opts = this.allOptions();
          for (var i = 0; i < opts.length; i++) {
            if (opts[i].id === sel[0]) return opts[i].name;
          }
          return String(sel[0]);
        }
        return sel.length + ' selected';
      },
      toggleOpen: function () {
        var self = this;
        this.open = !this.open;
        if (this.open && this.searchable) {
          this.$nextTick(function () {
            var el = self.$refs && self.$refs.mselectSearch;
            if (el) el.focus();
          });
        }
      },
    };
  });

  // ── Main ATS app component ──────────────────────────────────
  // ── Tiny LRU cache (shared across section reloaders) ────────
  //
  // Keys filter objects → API results so re-applying a recently used
  // filter is instant. Capacity is small (5-10) because the working set
  // is small (a recruiter toggles a handful of filters repeatedly while
  // triaging). Evicts least-recently-used on overflow via Map ordering
  // (a Map's iteration order IS insertion order; touching a key means
  // delete + re-set so it moves to the end = "most recent").
  //
  // Caches are invalidated en masse by _clearSectionCaches() (bound to
  // sync-fingerprint change detection) so stale entries can't outlive
  // real data changes. A touched entry doesn't TTL individually — the
  // only correctness signal is the fingerprint.
  function makeLRU(capacity) {
    var max = capacity || 8;
    var map = new Map();
    return {
      get: function (key) {
        if (!map.has(key)) return undefined;
        var val = map.get(key);
        // Re-insert to move to most-recent end of Map's iteration order.
        map.delete(key); map.set(key, val);
        return val;
      },
      set: function (key, val) {
        if (map.has(key)) map.delete(key);
        else if (map.size >= max) map.delete(map.keys().next().value);
        map.set(key, val);
      },
      clear: function () { map.clear(); },
      size:  function () { return map.size; },
    };
  }

  Alpine.data('atsApp', function () {
    var syncTimer = null;
    var lastSyncSig = '';
    var funnelChart = null, sourceChart = null, trendChart = null;
    var lastFunnelChartSig = '';
    var lastSourceChartSig = '';
    var lastTrendChartSig = '';
    // Per-section response caches. Keyed by JSON.stringify(filters).
    // Shared across the 3 server-driven reloaders; reset when the sync
    // fingerprint reports a data change. See _clearSectionCaches().
    var waterfallCache   = makeLRU(10);
    var sourceCache      = makeLRU(10);
    var analyticsCache   = makeLRU(10);

    return {
      userEmail: '',
      loading: true,
      syncing: false,
      syncStale: false,
      drill: null,                // currently only 'stale' (banner toggle)
      showJobs: true,
      showAnalytics: false,       // collapsed by default — funnel-primary view surfaces the important stuff above
      analyticsView: 'historical',
      activityPanelOpen: false,
      // The three primary dashboards default to expanded (they're the
      // value the page exists to show), but recruiters can collapse any
      // of them when they want to focus on one. State persists via
      // localStorage in _persistSectionState / _restoreSectionState.
      showFunnel: true,
      showWaterfall: true,
      activity: [],            // array of HistoryRow, newest first
      activityLoading: false,

      allCandidates: [],
      _candidatesVersion: 0,   // increments on any candidate list mutation
      _stagesVersion: 0,       // increments when settings.stages refreshes
      _funnelCacheSig: '',
      _funnelCacheData: null,
      jobs: [],
      settings: { stages: [], sources: [], regions: [], recruiters: [], refuseReasons: [], waterfallBenchmarks: [] },
      _globalAnalyticsReloadTimer: null,
      _globalAnalyticsReloadSeq: 0,
      _chartRenderTimer: null,
      _chartRenderRaf: null,
      globalAnalyticsLoading: false,
      inlineSavingCount: 0,
      syncBackoffMs: 20000,
      syncBackoffMaxMs: 120000,
      syncErrorStreak: 0,
      presenceBackoffMs: 30000,
      presenceBackoffMaxMs: 120000,
      _presenceTimer: null,

      // ── Per-section filters ────────────────────────────────
      // The global filter bar was removed in the Apr 2026 redesign — each
      // section now owns its own filters end-to-end. Empty array on an
      // axis = "all"; non-empty = "match any of these values" (the same
      // semantic enforced server-side in Analytics.ts).
      //
      // Sentinels allowed in arrays: "__unassigned__" on every axis,
      // "__assigned__" on recruiter, "Inbound"/"Outbound" on motion.
      //
      // Period + date range stay single-valued (dates don't multi-select
      // meaningfully). Each section picks its own initial preset; the
      // default is "All Time" (empty dates) except where a specific
      // window makes more sense (e.g. Recruiter Hires defaults to 30d).
      funnelFilters: {
        preset: 'all', startDate: '', endDate: '',
        jobIds: [], sourceIds: [], recruiterIds: [], motions: [], regionIds: [],
      },
      sourceFilters: {
        preset: 'all', startDate: '', endDate: '',
        jobIds: [], recruiterIds: [], motions: [], regionIds: [],
      },
      analyticsFilters: {
        preset: '90d',
        startDate: presetRange('90d').start,
        endDate:   presetRange('90d').end,
        jobIds: [], sourceIds: [], recruiterIds: [], motions: [], regionIds: [],
      },

      // Search lives in the topbar as a navigator, not a filter. Typing
      // into it opens a suggestion dropdown; picking a suggestion opens
      // the peek panel. Keeping it as a distinct piece of state from the
      // section scopes makes it impossible for "search" to silently
      // narrow a dashboard the user isn't looking at.
      searchQuery: '',
      searchOpen:  false,
      searchResults: [],

      // Waterfall (cohort) — independent of the snapshot funnel above.
      // Default to All Time — strict cohort means a shorter window only
      // counts candidates who entered DURING that window, so the funnel
      // stays self-consistent (no rollover ambiguity). Empty dates +
      // preset='all' means "everyone ever".
      waterfallFilters: {
        startDate: '',
        endDate:   '',
        preset:    'all',
        // Multi-select axes. Empty = all. Per-job benchmark overrides
        // only kick in when exactly one concrete job id is selected —
        // the cohort is no longer attributable to a single override row
        // once two jobs are mixed, so the server falls back to defaults.
        jobIds: [], sourceIds: [], recruiterIds: [], motions: [], regionIds: [],
      },
      waterfallData:    null,
      waterfallLoading: false,
      // Separate from waterfallLoading so the UI can keep showing
      // previous waterfallData during a refetch instead of blanking.
      // See reloadWaterfall — waterfallLoading only flips true when
      // there's nothing to show yet; waterfallRevalidating flips for
      // any in-flight fetch.
      waterfallRevalidating: false,
      // Stage_id of the currently-expanded drilldown row. null = no row.
      waterfallExpanded: null,
      // (The summary / by-recruiter view toggle was removed in Apr 2026 —
      // the per-recruiter matrix now always renders below the waterfall
      // rows, since it's the strict superset of the old Summary view.)

      // ── Funnel-as-primary state ──────────────────────────
      // Stage IDs currently expanded inline (one per stage; we track an
      // array so multiple can be open simultaneously — useful for cross-
      // stage comparison when triaging).
      expandedStages: [],

      // ── Bulk selection state ─────────────────────────────
      // Plain array (not Set) for Alpine reactivity. Selected candidate
      // ids drive the floating action bar at the bottom of the funnel.
      // bulkBusy gates the action bar while a bulk operation is in
      // flight so the user can't double-fire (and the UI shows a
      // "Working…" state instead of looking unresponsive).
      selectedIds:        [],
      bulkBusy:           false,
      bulkActionStageId:  '',   // dropdown value for "Move to…" in action bar
      bulkActionRecruiterId: '',

      // ── App-wide presence (Google-Sheets-style avatar stack in the topbar) ──
      // Pinged every 30s while the tab is open. Self is included so the
      // topbar can render the user's own avatar leftmost; the avatar
      // stack helper filters self into a different visual treatment.
      appViewers: [],   // [{ email, secondsAgo, isSelf }]

      // ── Debug panel state (?debug=1) ──────────────────────
      // Toggled on by `?debug=1` in the URL or by the keyboard
      // shortcut (none in v1 — kept intentional so users don't trigger
      // it by accident). Holds the most recent getDebugInfo() response
      // so the panel can render without an extra round-trip per
      // expand/collapse.
      debugOpen:    false,
      debugInfo:    null,
      debugLoading: false,
      // Rolling buffer of recent gasCall() invocations — populated by
      // the gasCall wrapper (see top of this file) so the debug panel
      // can show "what just talked to the server" with no instrumentation
      // changes scattered through the codebase.
      gasCallLog:   [],

      // Per-section loading flags. Toggled by reloadSourceEffectiveness
      // so the user gets visible feedback that the filter change is in
      // flight (otherwise the table just silently re-renders ~500ms
      // later, which feels broken).
      sourceLoading:    false,
      analyticsHistoricalLoading: false,

      analytics: {
        funnelConversion: [], timeToHireTrend: [], stageVelocity: [],
        rejectionReasons: [],
      },
      // Promoted dashboards — populated from getDashboardData on initial
      // load, then refreshed via dedicated per-section endpoints whenever
      // their section filters change (saves recomputing the whole bundle).
      // (Recruiter Performance table removed in Apr 2026 — the waterfall
      // by-recruiter matrix superseded it.)
      sourceEffectiveness:  [],
      slaBreaches:      [],
      staleCandidates:  [],     // pipeline health alerts (2×+ past SLA or >14d no-SLA)

      // ── Computed ─────────────────────────────────────────
      // Currently consumed only by the topbar Export-CSV button. Everything
      // else (the Pipeline Funnel section and its stage expansions) goes
      // through the funnel-specific predicate below, which adds the
      // section-filter override layer and uses timestamp comparison for
      // dates instead of fragile lexicographic strings.
      //
      // Sort intentionally omitted — there's no list view to drive a sort
      // order from anymore. Export keeps the natural order returned by the
      // backend, which is already date_applied desc by virtue of how
      // candidates are appended.
      // After the global filter bar was removed, `filteredCandidates`
      // drives a single surface: the topbar Export button. It exports
      // candidates that match the Funnel section's current scope — the
      // most natural "what I'm looking at right now" semantic. Active-
      // status only, because that's the funnel's baseline filter (the
      // Rejected bucket is a separate synthetic row).
      get filteredCandidates() {
        var self = this;
        return this.allCandidates.filter(function (c) {
          return self._funnelMatch(c, self.funnelFilters);
        });
      },

      // (List/Kanban view + pagination removed — funnel-primary layout doesn't
      //  need pagedCandidates, totalPages, kanbanStages, or candidatesByStage.
      //  Inline candidate lists per stage live in funnelCandidatesForStage.)

      // ── Per-section state persistence ─────────────────────
      // Section filters and which funnel stages are expanded are restored
      // on page load so a recruiter who set "scope to my pipeline +
      // expand Pre-screen" doesn't have to redo that on every refresh.
      // Persisted per-browser, NOT per-user — fine for this interim
      // tool's deployment model where each recruiter has their own
      // workstation and account. Storage failures (private mode, quota)
      // are silently swallowed: missing persistence is annoying, but
      // throwing on every filter change would be worse.
      // Bumped to v2 in the Apr 2026 multi-select redesign. Old v1 state
      // had single-value filters (`jobId: ''`) rather than arrays; rather
      // than migrate stored state in-place (risk: mixing shapes half-way),
      // bump the key so every browser starts fresh with the new shape.
      _SECTION_STATE_KEY: 'tpg-ats.section-state.v2',
      _persistTimer: null,

      // Wipes every per-section response cache. Called from the sync
      // poll whenever getSyncFingerprint reports a real data change,
      // so cached waterfall/source/analytics results can't outlive the
      // server-side state they were computed from. Cheap — just resets
      // three small Maps.
      _clearSectionCaches: function () {
        waterfallCache.clear();
        sourceCache.clear();
        analyticsCache.clear();
      },

      // Debounced + idle-scheduled so rapid dropdown changes (or typing
      // into custom date inputs that fire a deep watcher per keystroke)
      // don't synchronously hit localStorage. localStorage writes can
      // take 1-5ms each and block the main thread; coalescing them is
      // the difference between a snappy dropdown and a draggy one.
      _persistSectionState: function () {
        var self = this;
        if (this._persistTimer) clearTimeout(this._persistTimer);
        this._persistTimer = setTimeout(function () {
          var write = function () {
            try {
              var snapshot = {
                funnelFilters:    self.funnelFilters,
                sourceFilters:    self.sourceFilters,
                analyticsFilters: self.analyticsFilters,
                waterfallFilters: self.waterfallFilters,
                expandedStages:   self.expandedStages,
                showFunnel:     self.showFunnel,
                showWaterfall:  self.showWaterfall,
                analyticsView:  self.analyticsView,
              };
              localStorage.setItem(self._SECTION_STATE_KEY, JSON.stringify(snapshot));
            } catch (e) { /* quota / private mode — non-fatal */ }
          };
          if (typeof requestIdleCallback === 'function') requestIdleCallback(write);
          else write();
        }, 250);
      },

      // Only array-shaped, array-sanitized keys flow from storage into
      // live state. Anything legacy (singular `jobId`, stale `xdrOnly`)
      // gets dropped silently so a browser still holding v1-ish state
      // doesn't poison the v2 filters.
      _restoreArrayFilters: function (target, snap, arrayKeys, scalarKeys) {
        if (!snap || typeof snap !== 'object') return;
        arrayKeys.forEach(function (k) {
          if (Array.isArray(snap[k])) target[k] = snap[k].slice();
        });
        scalarKeys.forEach(function (k) {
          if (typeof snap[k] === 'string') target[k] = snap[k];
        });
      },
      _restoreSectionState: function () {
        try {
          var raw = localStorage.getItem(this._SECTION_STATE_KEY);
          if (!raw) return;
          var snap = JSON.parse(raw);
          if (!snap || typeof snap !== 'object') return;
          var ARR = ['jobIds', 'sourceIds', 'recruiterIds', 'motions', 'regionIds'];
          if (snap.funnelFilters) {
            this._restoreArrayFilters(this.funnelFilters, snap.funnelFilters,
              ARR, ['preset', 'startDate', 'endDate']);
          }
          // (snap.recruiterFilters intentionally ignored — Recruiter Performance
          // section and its filters were removed in Apr 2026. Older snapshots
          // still carrying the key simply drop on load.)
          if (snap.sourceFilters) {
            this._restoreArrayFilters(this.sourceFilters, snap.sourceFilters,
              ['jobIds', 'recruiterIds', 'motions', 'regionIds'],
              ['preset', 'startDate', 'endDate']);
          }
          if (snap.analyticsFilters) {
            this._restoreArrayFilters(this.analyticsFilters, snap.analyticsFilters,
              ARR, ['preset', 'startDate', 'endDate']);
          }
          if (snap.waterfallFilters) {
            this._restoreArrayFilters(this.waterfallFilters, snap.waterfallFilters,
              ARR, ['preset', 'startDate', 'endDate']);
          }
          if (Array.isArray(snap.expandedStages)) this.expandedStages = snap.expandedStages.slice();
          if (typeof snap.showFunnel     === 'boolean') this.showFunnel     = snap.showFunnel;
          if (typeof snap.showWaterfall  === 'boolean') this.showWaterfall  = snap.showWaterfall;
          if (snap.analyticsView === 'historical' || snap.analyticsView === 'source') {
            this.analyticsView = snap.analyticsView;
          }
        } catch (e) { /* malformed JSON or storage error — start clean */ }
      },

      // ── Debug panel (?debug=1) ───────────────────────────
      // Loads the diagnostic info bundle and toggles the floating
      // panel. Refreshes on every open so the data is current; the
      // gasCall log is read straight from window.__gasCallLog
      // (populated by the gasCall wrapper itself).
      openDebug: async function () {
        this.debugOpen = true;
        await this.refreshDebug();
      },
      closeDebug: function () { this.debugOpen = false; },
      refreshDebug: async function () {
        this.debugLoading = true;
        try {
          this.debugInfo = await gasCall('getDebugInfo');
          this.gasCallLog = (window.__gasCallLog || []).slice().reverse();   // newest first
        } catch (e) {
          this.toastError('Debug info failed: ' + (e.message || String(e)));
        } finally {
          this.debugLoading = false;
        }
      },

      // ── Lifecycle ────────────────────────────────────────
      init: async function () {
        var self = this;

        // Restore persisted section state BEFORE the first network round
        // trip so the funnel renders with the right filter scope on the
        // initial paint, not after a re-render.
        this._restoreSectionState();

        // ?debug=1 deep-link → auto-open the debug panel after the
        // first reload so the data is populated. Also accept ?debug=true
        // for forgiving URL-handcrafting.
        //
        // GAS runs the app inside an iframe; `window.location.search`
        // is the iframe URL, NOT the user-facing URL where the param
        // lives. google.script.url.getLocation is the only reliable
        // way to read parent-frame query parameters from inside the
        // sandboxed iframe.
        try {
          if (google && google.script && google.script.url && google.script.url.getLocation) {

              var p = loc && loc.parameter;
              if (p && (p.debug === '1' || p.debug === 'true')) self.openDebug();
            });
          }

        try {
          this.userEmail = await gasCall('getCurrentUserEmail');
          Alpine.store('app').userEmail = this.userEmail;
        } catch (e) { /* non-fatal */ }

        await this.reloadAll();
        this.startSyncPolling();

        // Persist on funnel-stage expansion so a recruiter mid-triage
        // can refresh and pick up where they left off. Filter changes
        // already persist via the reload* functions above.
        this.$watch('expandedStages', function () { self._persistSectionState(); });
        // Funnel filters are applied client-side (no network call), so
        // they don't go through reload* — watch them too.
        this.$watch('funnelFilters', function () {
          self._persistSectionState();
          self.pruneSelectionToVisible();
        }, { deep: true });
        // Persist collapse state for the three primary dashboards so
        // a refresh restores the user's preferred section visibility.
        this.$watch('showFunnel',     function () { self._persistSectionState(); });
        this.$watch('analyticsView', function (view) {
          self._persistSectionState();
          if (view === 'source') {
            self.reloadSourceEffectiveness();
          }
          if (self.showAnalytics) self.scheduleChartRender();
        });
        // Defer chart work until the section is actually visible.
        this.$watch('showAnalytics', function (open) {
          if (open) {
            if (self.analyticsView === 'source') self.reloadSourceEffectiveness();
            self.scheduleChartRender();
          }

        // "abandon what I just started" that recruiters expect to work.
        // Scoped to selection so we don't fight other Esc handlers (e.g.,
        // peek panel close uses its own).
        document.addEventListener('keydown', function (e) {

              && !Alpine.store('app').peek.open
              && !Alpine.store('app').modal.open) {

          }

        // Previously: checkSync and _appPresenceTick guarded with
        // `if (document.hidden) return`, but the setTimeout itself kept
        // firing every 20-30s even on backgrounded tabs — wakes the
        // event loop, runs the no-op, reschedules. Multiplied across
        // every recruiter's "I'll come back later" tab, this also wastes
        // GAS daily-execution-time quota for no benefit.
        //
        // Now: we hard-clear the timers on hidden and re-arm + tick once
        // immediately when visible. The immediate tick gives the user a
        // fresh view in <1s instead of "wait up to 20s after refocusing"
        // for the first sync to land.
        document.addEventListener('visibilitychange', function () {
          if (document.hidden) {
            if (syncTimer) { clearTimeout(syncTimer); syncTimer = null; }
            if (self._presenceTimer) { clearTimeout(self._presenceTimer); self._presenceTimer = null; }
            return;
          }

          self.checkSync().catch(function () {});
          self._appPresenceTick().catch(function () {});
          self.startSyncPolling();

        // Register browser back/forward handler — closes topmost overlay
        // rather than navigating off the web app entirely. Pairs with
        // pushHistory/popHistory on every openPeek/openModal call.
        var h = _gasHistory();
        if (h) {
          h.setChangeHandler(function (e) {
            var params = (e && e.state) || (e && e.location && e.location.parameter) || {};
            var target = { candidate: params.candidate || null, modal: params.modal || null };
            var store = Alpine.store('app');
            // Close what's open if it doesn't match the new URL
            if (store.modal.open && String(params.modal || '') !== String(store.modal.type))
              store.closeModal({ suppressHistory: true });
            if (store.peek.open && String(params.candidate || '') !== String(store.peek.candidateId))
              store.closePeek({ suppressHistory: true });
            // Open what the URL says should be open (if not already)
            if (target.candidate && !store.peek.open)
              store.openPeek(parseInt(target.candidate, 10), { suppressHistory: true });

        if (h) {
          try {
            // google.script.url.getLocation runs asynchronously via callback
            if (google.script.url && google.script.url.getLocation) {
              google.script.url.getLocation(function (loc) {
                applyInitialUrlState(loc && loc.parameter);
              });
            }
          } catch (e) { /* non-fatal */ }

      reloadAll: async function () {
        this.loading = true;

          // Critical-path fetches only. Recent Rejections is loaded lazily
          // when the user expands that section (or via the post-reject
          // toast) — keeps initial load + every silent sync tick light.
          await Promise.all([
            this.loadSettings(),
            this.loadCandidates(),
            this.loadJobs(),
            this.loadAnalytics(),
          ]);
          this.scheduleChartRender();
          // Waterfall is server-side (needs allHistory). Kick it off once
          // initial candidates are loaded — fire-and-forget, the section
          // shows "Computing cohort…" until the RPC resolves.
          this.reloadWaterfall();

       * Background refetch that does NOT flip `loading`. Used by
       * manualRefresh (so the user's clicked-on table doesn't disappear

       * invisible to anyone mid-scroll). The only visible feedback is
       * the spinning topbar icon driven by `syncing`.

       * because the fingerprint diff that triggered checkSync may have
       * been a settings change (teammate added a stage). Skipping it
       * would leave the UI rendering stale dropdown options.

          this.loadCandidates(),
          this.loadJobs(),

      // After the global filter bar was removed, each section is its own

      buildDashboardFilters: function () {

      // ── Per-section filter merging ────────────────────────
      // No global bar anymore, so this is a pass-through that just
      // shape-normalizes the section's own filters for downstream code.
      // Kept as a helper so every call site routes through one place —
      // makes it easy to add cross-section logic later (e.g. a future
      // "apply to all" button) without hunting down call sites.
      mergeSectionFilters: function (section) {

          jobIds:       (section.jobIds       || []).slice(),
          sourceIds:    (section.sourceIds    || []).slice(),
          recruiterIds: (section.recruiterIds || []).slice(),

      // Per-section "Period" preset → date range translation.

      // inline date inputs in the UI become the source of truth) but
      // pre-populate them from the most-recent meaningful range so the
      // user starts with sensible numbers to tweak instead of empty
      // fields that would resolve to "All time" until they pick.
      onSectionPresetChange: function (section) {
        var preset, range;
        if (section === 'funnel') {
          preset = this.funnelFilters.preset;
          if (preset === 'custom') {
            if (!this.funnelFilters.startDate || !this.funnelFilters.endDate) {
              range = presetRange('30d');
              this.funnelFilters.startDate = this.funnelFilters.startDate || range.start;
              this.funnelFilters.endDate   = this.funnelFilters.endDate   || range.end;
            }
          } else {
            range = preset ? presetRange(preset) : { start: '', end: '' };
            this.funnelFilters.startDate = range.start;
            this.funnelFilters.endDate   = range.end;
          }
        } else if (section === 'source') {
          preset = this.sourceFilters.preset;
          if (preset === 'custom') {
            if (!this.sourceFilters.startDate || !this.sourceFilters.endDate) {
              range = presetRange('30d');
              this.sourceFilters.startDate = this.sourceFilters.startDate || range.start;
              this.sourceFilters.endDate   = this.sourceFilters.endDate   || range.end;
            }
          } else {
            range = preset ? presetRange(preset) : { start: '', end: '' };
            this.sourceFilters.startDate = range.start;
            this.sourceFilters.endDate   = range.end;
          }
        } else if (section === 'analytics') {
          preset = this.analyticsFilters.preset;
          if (preset === 'custom') {
            if (!this.analyticsFilters.startDate || !this.analyticsFilters.endDate) {
              range = presetRange('30d');
              this.analyticsFilters.startDate = this.analyticsFilters.startDate || range.start;
              this.analyticsFilters.endDate   = this.analyticsFilters.endDate   || range.end;
            }
          } else {
            range = preset ? presetRange(preset) : { start: '', end: '' };
            this.analyticsFilters.startDate = range.start;
            this.analyticsFilters.endDate   = range.end;

          preset = this.waterfallFilters.preset;

            this.waterfallFilters.endDate   = '';
          } else {
            range = presetRange(preset);
            this.waterfallFilters.startDate = range.start;
            this.waterfallFilters.endDate   = range.end;

          this.reloadWaterfall();

      },

      // Custom date input change handlers. Triggered by either the
      // "from" or "to" date input directly so the filter applies as
      // soon as the user picks a date — no "Apply" button to hunt for.
      // Defensive: if both dates are present and start > end, swap
      // them so we don't silently produce an empty result set the
      // user can't explain.
      onSectionCustomDateChange: function (section) {
        var f, sKey, eKey;
        if (section === 'funnel') {
          f = this.funnelFilters; sKey = 'startDate'; eKey = 'endDate';
        } else if (section === 'source') {
          f = this.sourceFilters; sKey = 'startDate'; eKey = 'endDate';
        } else if (section === 'analytics') {
          f = this.analyticsFilters; sKey = 'startDate'; eKey = 'endDate';
        } else {
          return;
        }
        if (f[sKey] && f[eKey] && f[sKey] > f[eKey]) {
          var tmp = f[sKey]; f[sKey] = f[eKey]; f[eKey] = tmp;
          Alpine.store('app').toastInfo('Date range was swapped to keep From ≤ To.');
        }
        this._persistSectionState();
        this.pruneSelectionToVisible();
        if (section === 'source')         this.reloadSourceEffectiveness();
        else if (section === 'analytics') this.reloadAnalyticsHistorical();
        // Funnel is client-side derived from allCandidates so no refetch
        // needed — the reactive getter picks up the new dates automatically.
      },

      resetSectionFilters: function (section) {
        if (section === 'funnel') {
          this.funnelFilters = {
            preset: 'all', startDate: '', endDate: '',
            jobIds: [], sourceIds: [], recruiterIds: [], motions: [], regionIds: [],
          };
          // Symmetric inverse of filterFunnelByRecruiter — entering a recruiter
          // scope auto-expands every stage so the drill-in is one click; leaving
          // the scope collapses them back so the funnel returns to its compact
          // baseline.
          this.expandedStages = [];
          this.pruneSelectionToVisible();
          this._persistSectionState();
        } else if (section === 'source') {
          this.sourceFilters = {
            preset: 'all', startDate: '', endDate: '',
            jobIds: [], recruiterIds: [], motions: [], regionIds: [],
          };
          this.reloadSourceEffectiveness();   // persists on success
        } else if (section === 'analytics') {
          var ar = presetRange('90d');
          this.analyticsFilters = {
            preset: '90d', startDate: ar.start, endDate: ar.end,
            jobIds: [], sourceIds: [], recruiterIds: [], motions: [], regionIds: [],
          };
          this.reloadAnalyticsHistorical();   // persists on success
        }
      },

      // ── Scoped banner: human label for the current funnel scope ──
      // Returns a short string describing which OVERRIDE is active on the
      // funnel section (i.e. set on funnelFilters specifically, not just
      // inherited from the global filter bar). Used by the banner above
      // the funnel rows to make implicit scoping explicit.
      // Human label for the selection on an axis: "Sharon", "Sharon + Joe",
      // "3 recruiters", "Unassigned". Used by the per-section scope
      // banners to summarize what's picked without listing every value.
      _axisLabel: function (arr, lookup, singleLabel) {
        if (!arr || arr.length === 0) return '';
        if (arr.length === 1) {
          var v = arr[0];
          if (v === '__unassigned__') return 'Unassigned';
          if (v === '__assigned__')   return 'Assigned';
          var hit = lookup(v);
          return hit || String(v);
        }
        if (arr.length === 2) {
          var a = this._axisLabel([arr[0]], lookup);
          var b = this._axisLabel([arr[1]], lookup);
          return a + ' + ' + b;
        }
        return arr.length + ' ' + (singleLabel || 'selected');
      },
      _jobLabel:       function (id) { var j = this.jobs.find(function (x) { return x.id == id; }); return j ? j.title : ''; },
      _sourceLabel:    function (id) { var s = this.settings.sources.find(function (x) { return x.id == id; });    return s ? s.name : ''; },
      _recruiterLabel: function (id) { var r = this.settings.recruiters.find(function (x) { return x.id == id; }); return r ? r.name : ''; },
      _regionLabel:    function (id) { var r = this.settings.regions.find(function (x) { return x.id == id; });    return r ? r.name : ''; },

      funnelScopeLabel: function () {
        var f = this.funnelFilters, parts = [];
        var self = this;
        var rec = this._axisLabel(f.recruiterIds, function (id) { return self._recruiterLabel(id); }, 'recruiters');
        if (rec) parts.push(rec === 'Unassigned' ? 'Unassigned candidates' : rec === 'Assigned' ? 'Assigned candidates' : rec + "'s pipeline");
        var job = this._axisLabel(f.jobIds, function (id) { return self._jobLabel(id); }, 'jobs');
        if (job) parts.push(job);
        var src = this._axisLabel(f.sourceIds, function (id) { return self._sourceLabel(id); }, 'sources');
        if (src) parts.push(src);
        var reg = this._axisLabel(f.regionIds, function (id) { return self._regionLabel(id); }, 'regions');
        if (reg) parts.push(reg);
        if (f.motions && f.motions.length > 0) parts.push(f.motions.join(' + '));
        if (f.preset && f.preset !== 'all') parts.push(f.preset);

      sourceScopeLabel: function () {
