        var self = this;
        var job = this._axisLabel(f.jobIds, function (id) { return self._jobLabel(id); }, 'jobs');
        if (job) parts.push(job);
        var rec = this._axisLabel(f.recruiterIds, function (id) { return self._recruiterLabel(id); }, 'recruiters');
        if (rec) parts.push(rec);
        if (f.preset && f.preset !== 'all') parts.push(f.preset);
        return parts.join(' · ');
      },
      analyticsScopeLabel: function () {
        var f = this.analyticsFilters, parts = [];
        var self = this;
        var job = this._axisLabel(f.jobIds, function (id) { return self._jobLabel(id); }, 'jobs');
        if (job) parts.push(job);
        var src = this._axisLabel(f.sourceIds, function (id) { return self._sourceLabel(id); }, 'sources');
        if (src) parts.push(src);
        var rec = this._axisLabel(f.recruiterIds, function (id) { return self._recruiterLabel(id); }, 'recruiters');
        if (rec) parts.push(rec);
        if (f.preset && f.preset !== 'all') parts.push(f.preset);
        return parts.join(' · ');
      },

      // ── Pipeline Funnel (client-side compute) ─────────────
      // Derived from local allCandidates + funnelFilters merged over global.
      // Always scopes to status='Active' since the funnel by definition
      // shows currently-in-pipeline counts. Bar widths are proportional
      // to the largest stage so the visualization works with any data shape.
      //
      // The predicate is extracted into _funnelMatch so the bar counts
      // (this getter) and the inline candidate lists (funnelCandidatesForStage
      // below) cannot drift apart. Previously the two had subtly different
      // filter logic — pipelineFunnelData applied a date filter that the
      // expanded list ignored, producing the visible bug "stage shows
      // count 0 but the expanded panel lists candidates".
      // Same scope predicate as _funnelMatch but ignores the implicit
      // status='Active' check. Used for the synthetic Rejected bucket
      // at the bottom of the funnel so rejections honor job/source/
      // recruiter/date filters without being filtered out for not
      // being Active.
      // ── Axis matching helpers ────────────────────────────
      // Mirror the server-side logic in Analytics.ts but operate on the
      // flat array shape the client produces. Empty array = no filter on
      // this axis (pass). Non-empty = match any listed value.
      //
      // Comparisons use `==` instead of `===` because filter arrays can
      // contain mixed types — a job dropdown writes `1` (number) when
      // set from the jobs list but localStorage round-trips `"1"`
      // (string). Loose equality handles both without the full normalize.
      _axisMatchId: function (arr, candidateId) {
        if (!arr || arr.length === 0) return true;
        var unassigned = !hasAssignedId(candidateId);
        for (var i = 0; i < arr.length; i++) {
          var v = arr[i];
          if (v === '__unassigned__') { if (unassigned) return true; continue; }
          if (!unassigned && candidateId == v) return true;
        }
        return false;
      },
      _axisMatchRecruiter: function (arr, recruiterId) {
        if (!arr || arr.length === 0) return true;
        var unassigned = !hasAssignedId(recruiterId);
        for (var i = 0; i < arr.length; i++) {
          var v = arr[i];
          if (v === '__unassigned__') { if (unassigned) return true; continue; }
          if (v === '__assigned__')   { if (!unassigned) return true; continue; }
          if (!unassigned && recruiterId == v) return true;
        }
        return false;
      },
      _axisMatchMotion: function (arr, motion) {
        if (!arr || arr.length === 0) return true;
        var isSet = motion === 'Inbound' || motion === 'Outbound';
        for (var i = 0; i < arr.length; i++) {
          var v = arr[i];
          if (v === '__unassigned__') { if (!isSet) return true; continue; }
          if (v === motion) return true;
        }
        return false;
      },
      // Predicate shared between _funnelMatch (active only) and the
      // rejected-bucket synthetic row. Returns true iff the candidate
      // clears every scope axis the filter object declares.
      _matchScope: function (c, f) {
        if (!this._axisMatchId(f.jobIds, c.job_id))             return false;
        if (!this._axisMatchId(f.sourceIds, c.source_id))       return false;
        if (!this._axisMatchRecruiter(f.recruiterIds, c.recruiter_id)) return false;
        if (!this._axisMatchId(f.regionIds, c.region_id))       return false;
        if (!this._axisMatchMotion(f.motions, c.motion))        return false;
        return true;
      },

      _funnelMatchExcludingStatus: function (c, f) {
        if (!this._matchScope(c, f)) return false;
        // For rejections, scope by date_last_stage_update (when they were
        // rejected) instead of date_applied — recruiters thinking
        // "rejections this month" mean "rejected this month", not
        // "applied this month and later rejected".
        var rejDate = c.date_last_stage_update || c.date_applied;
        if (rejDate && (f.startDate || f.endDate)) {
          var d = String(rejDate).slice(0, 10);
          if (f.startDate && d < String(f.startDate).slice(0, 10)) return false;
          if (f.endDate   && d > String(f.endDate).slice(0, 10))   return false;
        }
        return true;
      },

      _funnelMatch: function (c, f) {
        // Previously this filtered to status === 'Active', which meant
        // Hired candidates (status = 'Hired') never appeared in ANY
        // column — so the Hired column always read 0 while the Waterfall
        // Report's Hired bucket showed the real count. Users saw two
        // inconsistent "hired" counts and reasonably concluded the views
        // were out of sync. Include Hired here; exclude only Rejected
        // (the Rejected stage itself isn't rendered).
        if (c.status === 'Rejected') return false;
        if (!this._matchScope(c, f)) return false;
        // Calendar-date compare — see filteredCandidates for the full
        // rationale. Same fix; same one-liner pattern so both code paths
        // can't drift apart on date semantics.
        if (c.date_applied && (f.startDate || f.endDate)) {
          var d = String(c.date_applied).slice(0, 10);
          if (f.startDate && d < String(f.startDate).slice(0, 10)) return false;
          if (f.endDate   && d > String(f.endDate).slice(0, 10))   return false;
        }
        return true;
      },

      // Signature keys into the funnel cache so the expensive per-candidate
      // scan only re-runs when something in the filter actually changed.
      // Array axes get `.join(',')` so two filters with the same selected
      // ids in different Alpine proxy instances still hash the same.
      _funnelSignature: function (f) {
        return [
          this._candidatesVersion,
          this._stagesVersion,
          (f.jobIds       || []).slice().sort().join(','),
          (f.sourceIds    || []).slice().sort().join(','),
          (f.recruiterIds || []).slice().sort().join(','),
          (f.motions      || []).slice().sort().join(','),
          (f.regionIds    || []).slice().sort().join(','),
          f.startDate || '',
          f.endDate   || '',
        ].join('|');
      },

      _buildFunnelCache: function () {
        var f = this.mergeSectionFilters(this.funnelFilters);
        var sig = this._funnelSignature(f);
        if (sig === this._funnelCacheSig && this._funnelCacheData) {
          return this._funnelCacheData;
        }

        // Active candidates feed the active stage rows. Rejected candidates
        // also bucket into a synthetic "rejected" row at the bottom of the
        // funnel — same job/source/recruiter/date scope, but ignoring the
        // implicit Active status filter so rejected candidates from the
        // selected period stay visible. Without this, recruiters report
        // candidates "disappearing" with no terminal landing place.
        var stageCandidates = {};
        var rejectedCandidates = [];
        var rejectedFilters = Object.assign({}, f);
        delete rejectedFilters.status;
        // Build a map of rejected stage_ids so we can classify a candidate
        // as "rejected" by EITHER status OR stage. Data coming from bulk
        // imports (Sharon's / Simona's trackers) has many rows where the
        // stage was manually set to Rejected but the status field was left
        // as "Active" — those candidates were silently getting added to
        // stageCandidates[rejectedStageId], counted in inScopeTotal, but
        // never displayed (since the Rejected stage is filtered out of the
        // rendered stageRows). Visible: 123; badge: 153 = 30 hidden.
        var rejectedStageIds = {};
        (this.settings.stages || []).forEach(function (s) {
          if (s.is_rejected) rejectedStageIds[s.id] = true;
        });
        for (var i = 0; i < this.allCandidates.length; i++) {
          var c = this.allCandidates[i];
          var isRejected = c.status === 'Rejected' || rejectedStageIds[c.stage_id];
          if (isRejected) {
            if (this._funnelMatchExcludingStatus(c, rejectedFilters)) {
              rejectedCandidates.push(c);
            }
            continue;
          }
          if (!this._funnelMatch(c, f)) continue;
          var sid = c.stage_id;
          if (!stageCandidates[sid]) stageCandidates[sid] = [];
          stageCandidates[sid].push(c);
        }
        rejectedCandidates.sort(function (a, b) {
          return (b.date_last_stage_update || '').localeCompare(a.date_last_stage_update || '');
        });
        var inScopeTotal = 0;
        for (var sk in stageCandidates) inScopeTotal += stageCandidates[sk].length;

        var stageRows = this.settings.stages
          .filter(function (s) { return s.is_enabled && !s.is_rejected; })
          .sort(function (a, b) { return a.sequence - b.sequence; })
          .map(function (s) {
            var rows = stageCandidates[s.id] || [];
            rows.sort(function (a, b) { return (a.last_name || '').localeCompare(b.last_name || ''); });
            return {
              stage_id: s.id,
              stage_name: s.name,
              stage_color: s.color,
              candidate_count: rows.length,
              is_rejected_bucket: false,
              is_orphan: false,
            };
          });

        // ── Orphan-stage rows ──────────────────────────────────
        // Any candidate whose stage_id doesn't land in one of the rendered
        // rows above is otherwise invisible. That used to show up as a
        // silent "N with missing pipeline stage" footer — unclickable,
        // unactionable, confusing. Instead, emit a dedicated row for
        // every distinct orphan stage_id so every human in the system is
        // visible somewhere in the funnel. Two kinds of orphans:
        //   (a) candidate points at a stage that exists in settings but
        //       is disabled — render with the stage's real name + color
        //       and a "disabled" badge so the user knows to re-enable or
        //       reassign.
        //   (b) candidate points at a stage_id that's not in settings at
        //       all (legacy data) — render as "Unknown stage #<id>" so
        //       the user sees something specific enough to investigate.
        var renderedIds = {};
        stageRows.forEach(function (r) { renderedIds[r.stage_id] = true; });
        var stagesById = {};
        (this.settings.stages || []).forEach(function (s) { stagesById[s.id] = s; });
        var orphanRows = [];
        Object.keys(stageCandidates).forEach(function (sid) {
          if (renderedIds[sid]) return;
          var s = stagesById[sid];
          // Skip rejected-stage ids — those candidates already flowed into
          // rejectedCandidates and will render in the Rejected bucket row.
          if (s && s.is_rejected) return;
          var rws = stageCandidates[sid] || [];
          if (rws.length === 0) return;
          rws.sort(function (a, b) { return (a.last_name || '').localeCompare(b.last_name || ''); });
          orphanRows.push({
            stage_id: isNaN(Number(sid)) ? sid : Number(sid),
            stage_name: s ? s.name : ('Unknown stage #' + sid),
            stage_color: s ? s.color : '#9A9DA6',
            candidate_count: rws.length,
            is_rejected_bucket: false,
            is_orphan: true,
            orphan_reason: s
              ? 'Stage "' + s.name + '" is currently disabled in Settings \u2192 Pipeline Stages. Re-enable it or reassign these candidates to an active stage.'
              : 'These candidates point at a stage_id that no longer exists in Settings. Open each one and reassign them to a live stage.',
            // sequence used to sort orphans; disabled stages respect the
            // order they were in when active, unknown stages trail at end.
            _sequence: s ? s.sequence : 9999,
          });
        });
        orphanRows.sort(function (a, b) { return a._sequence - b._sequence; });
        // Prepend orphan rows so users see Applied/Reviewed at the top of
        // the funnel where they'd expect them, not at the end.
        stageRows = orphanRows.concat(stageRows);

        // Synthetic Rejected row pinned to the bottom of the funnel.
        // Reuses stage_id = -1 as a sentinel so funnelCandidatesForStage
        // and the inline drilldown can look it up the same way they do
        // for real stages (no special-case rendering branch needed).
        var rejectedStage = this.settings.stages.find(function (s) { return s.is_rejected; });
        var REJECTED_BUCKET_ID = -1;
        stageCandidates[REJECTED_BUCKET_ID] = rejectedCandidates;
        stageRows.push({
          stage_id: REJECTED_BUCKET_ID,
          stage_name: 'Rejected',
          stage_color: (rejectedStage && rejectedStage.color) || '#E14B4B',
          candidate_count: rejectedCandidates.length,
          is_rejected_bucket: true,
          is_orphan: false,
        });

        // Funnel rows are a pure snapshot now — no step-% column. A prior
        // iteration showed "share of previous stage's current headcount"
        // which was mathematically meaningless (mixing cohorts of
        // candidates from different weeks/months produced nonsense like
        // "683%"). Real cohort conversion rates live in the Waterfall
        // Report section, which walks `history` against xDR benchmarks.

        this._funnelCacheSig = sig;
        this._funnelCacheData = {
          rows: stageRows,
          total: inScopeTotal,
          stageCandidates: stageCandidates,
        };
        return this._funnelCacheData;
      },

      get pipelineFunnelData() {
        return this._buildFunnelCache().rows;
      },

      funnelTotalActive: function () {
        return this._buildFunnelCache().total;
      },

      // Total including the synthetic Rejected bucket — sum derived
      // DIRECTLY from the rows the UI is about to render. That makes the
      // badge mathematically identical to "add up the numbers you can
      // see." Any candidate whose stage_id is orphan/disabled/unknown
      // (data corruption) drops out of stageRows and therefore drops out
      // of this total too — which is the correct behavior: if we don't
      // display them, we don't count them.
      funnelTotalEverywhere: function () {
        var rows = this._buildFunnelCache().rows || [];
        var n = 0;
        for (var i = 0; i < rows.length; i++) {
          n += (rows[i].candidate_count || 0);
        }
        return n;
      },

      // Count candidates whose stage_id doesn't map to any rendered row
      // (data corruption: candidate points at a disabled/deleted stage).
      // Exposed so the UI can surface a visible "N candidates with
      // unknown stage" warning instead of silently swallowing them.
      funnelTotalOrphaned: function () {
        var data = this._buildFunnelCache();
        var rows = data.rows || [];
        var knownIds = {};
        for (var i = 0; i < rows.length; i++) knownIds[rows[i].stage_id] = true;
        var orphaned = 0;
        var buckets = data.stageCandidates || {};
        for (var k in buckets) {
          if (!Object.prototype.hasOwnProperty.call(buckets, k)) continue;
          if (!knownIds[k] && String(k) !== '-1') {
            orphaned += (buckets[k] || []).length;
          }
        }
        return orphaned;
      },

      funnelBarWidth: function (stage) {
        // % of total active pipeline (each stage's count / sum of all stage counts).
        // The Rejected bucket is intentionally excluded from funnelTotalActive()
        // so it doesn't inflate "share of active pipeline" for real stages.
        // That means a large rejected count would produce a >100% bar if we
        // used the active total as the denominator — so expand the denominator
        // for the rejected bucket specifically to keep its bar <=100%.
        var total = this.funnelTotalActive();
        if (stage.is_rejected_bucket) {
          total = Math.max(total, stage.candidate_count);
        }
        if (total <= 0) return 0;
        return Math.round((stage.candidate_count / total) * 100);
      },

      toggleFunnelStage: function (stageId) {
        var idx = this.expandedStages.indexOf(stageId);
        if (idx >= 0) this.expandedStages.splice(idx, 1);
        else          this.expandedStages.push(stageId);
      },

      funnelCandidatesForStage: function (stageId) {
        return this._buildFunnelCache().stageCandidates[stageId] || [];
      },

      // ── Inline funnel actions ─────────────────────────────
      // The Move › button on each funnel candidate row needs to know
      // (a) whether there IS a next stage and (b) what to label it.
      // Both helpers walk the active stage list (enabled, non-rejected,
      // sorted by sequence) so they automatically pick up Settings
      // changes without a redeploy.
      _activeStages: function () {
        return (this.settings.stages || [])
          .filter(function (s) { return s.is_enabled && !s.is_rejected; })
          .sort(function (a, b) { return a.sequence - b.sequence; });
      },
      canAdvance: function (c) {
        if (!c || c.status !== 'Active') return false;
        var stages = this._activeStages();
        var idx = stages.findIndex(function (s) { return s.id === c.stage_id; });
        return idx >= 0 && idx < stages.length - 1;
      },
      nextStageName: function (c) {
        if (!c) return '';
        var stages = this._activeStages();
        var idx = stages.findIndex(function (s) { return s.id === c.stage_id; });
        if (idx < 0 || idx >= stages.length - 1) return '';
        return stages[idx + 1].name;
      },
      // Stages a candidate can be moved TO from the funnel-row dropdown.
      // Excludes the candidate's current stage (no point in offering a
      // no-op) and the Rejected stage (rejection is a separate flow that
      // requires a reason — see the rejectModal).
      moveTargetStages: function (c) {
        if (!c) return [];
        return (this.settings.stages || [])
          .filter(function (s) { return s.is_enabled && !s.is_rejected; })
          .filter(function (s) { return s.id !== c.stage_id; })
          .sort(function (a, b) { return a.sequence - b.sequence; });
      },
      // Move a candidate to an arbitrary target stage (the picker can
      // jump multiple stages, not just next). Same conflict check and
      // optimistic-update pattern as the previous advanceCandidateInline.
      moveCandidateTo: async function (c, stageIdRaw) {
        if (!stageIdRaw) return;
        var stageId = parseInt(stageIdRaw, 10);
        if (isNaN(stageId) || stageId === c.stage_id) return;
        var target = (this.settings.stages || []).find(function (s) { return s.id === stageId; });
        if (!target) return;
        // Optimistic local update so the funnel moves the row immediately
        // without waiting for the ~400–800ms GAS round-trip. Rollback on error.
        var prevStageId = c.stage_id;
        c.stage_id = stageId;
        this._candidatesVersion++;
        this._funnelCacheSig = '';
        var self = this;
        try {
          await gasCall('updateCandidateStage', c.id, stageId, c.date_last_stage_update);
          this.toastSuccess(c.first_name + ' \u2192 ' + target.name);
          // Refresh denormalized fields (date_last_stage_update, stage_name)
          // in the background so the next save has the fresh version token.
          this.refreshCandidate(c.id).catch(function () {});
        } catch (e) {
          c.stage_id = prevStageId;
          this._candidatesVersion++;
          this._funnelCacheSig = '';
          var msg = (e && e.message) || String(e);
          if (msg.indexOf('CONFLICT: ') === 0) {
            this.toastError('Conflict \u2014 someone else updated ' + c.first_name + '.', {
              actionLabel: 'Reload', duration: 8000,
              onAction: function () { self.refreshCandidate(c.id); },
            });
          } else {
            this.toastError('Could not move: ' + msg);
          }
        }
      },
      // Kept for backward compatibility / Advance button in peek panel.
      // The funnel rows now use moveCandidateTo via the picker dropdown
      // so they can jump to any stage rather than only the next one.
      advanceCandidateInline: async function (c) {
        if (!this.canAdvance(c)) return;
        var stages = this._activeStages();
        var idx = stages.findIndex(function (s) { return s.id === c.stage_id; });
        return this.moveCandidateTo(c, stages[idx + 1].id);
      },

      // ── Bulk selection ────────────────────────────────────
      isSelected: function (id) {
        return this.selectedIds.indexOf(id) >= 0;
      },
      toggleSelected: function (id) {
        var idx = this.selectedIds.indexOf(id);
        if (idx >= 0) this.selectedIds.splice(idx, 1);
        else          this.selectedIds.push(id);
      },
      // Select-all-in-stage and inverse. The button label flips between
      // "Select all" and "Deselect all" based on whether every visible
      // candidate in the stage is already selected.
      stageAllSelected: function (stageId) {
        var visible = this.funnelCandidatesForStage(stageId);
        if (visible.length === 0) return false;
        var self = this;
        return visible.every(function (c) { return self.isSelected(c.id); });
      },
      toggleStageSelectAll: function (stageId) {
        var visible = this.funnelCandidatesForStage(stageId);
        var ids = visible.map(function (c) { return c.id; });
        if (this.stageAllSelected(stageId)) {
          // Remove all visible-stage ids from selection
          this.selectedIds = this.selectedIds.filter(function (id) { return ids.indexOf(id) < 0; });
        } else {
          // Add any missing ids
          var have = {};
          this.selectedIds.forEach(function (id) { have[id] = true; });
          ids.forEach(function (id) { if (!have[id]) this.selectedIds.push(id); }.bind(this));
        }
      },
      // Mirrors the per-stage helpers above but scoped to the
      // staleCandidates drill-down ("Candidates needing attention").
      // Same selectedIds array, so candidates picked here flow through
      // to the existing bottom-of-screen bulk action bar with no
      // additional wiring.
      staleAllSelected: function () {
        if (!this.staleCandidates || this.staleCandidates.length === 0) return false;
        var self = this;
        return this.staleCandidates.every(function (s) { return self.isSelected(s.candidate_id); });
      },
      toggleStaleSelectAll: function () {
        var ids = (this.staleCandidates || []).map(function (s) { return s.candidate_id; });
        if (this.staleAllSelected()) {
          this.selectedIds = this.selectedIds.filter(function (id) { return ids.indexOf(id) < 0; });
        } else {
          var have = {};
          this.selectedIds.forEach(function (id) { have[id] = true; });
          var self = this;
          ids.forEach(function (id) { if (!have[id]) self.selectedIds.push(id); });
        }
      },
      clearSelection: function () { this.selectedIds = []; },
      pruneSelectionToVisible: function () {
        if (!this.selectedIds.length) return;
        var visible = {};
        var stages = this.pipelineFunnelData || [];
        for (var i = 0; i < stages.length; i++) {
          var rows = this.funnelCandidatesForStage(stages[i].stage_id);
          for (var j = 0; j < rows.length; j++) visible[rows[j].id] = true;
        }
        var stale = this.staleCandidates || [];
        for (var k = 0; k < stale.length; k++) visible[stale[k].candidate_id] = true;
        this.selectedIds = this.selectedIds.filter(function (id) { return !!visible[id]; });
      },

      // ── Bulk actions (call backend, show summary toast) ─────────
      _summarizeBulkResult: function (verb, result) {
        var ok  = (result && result.successIds || []).length;
        var bad = (result && result.failures   || []).length;
        if (bad === 0) {
          this.toastSuccess(verb + ' ' + ok + ' candidate' + (ok === 1 ? '' : 's') + '.');
        } else if (ok === 0) {
          this.toastError('Could not ' + verb.toLowerCase() + ' any of ' + bad + ' candidates. First error: ' +
            (result.failures[0].message || 'unknown'));
        } else {
          this.toastError(verb + ' ' + ok + ', ' + bad + ' failed. First error: ' +
            (result.failures[0].message || 'unknown'), { duration: 8000 });
        }
      },
      // Patches allCandidates in place for the given ids, applying `patch`
      // (object merge) to each. Bumps the reactivity counter once at the
      // end so dependent computeds (funnel counts, filters) re-evaluate
      // exactly once for the whole batch. Used after bulk operations so
      // we can skip the 300-1500ms full re-fetch — we already know what
      // changed because we sent the IDs ourselves.
      _patchCandidatesById: function (ids, patch) {
        if (!ids || !ids.length) return;
        var byId = {};
        ids.forEach(function (id) { byId[id] = true; });
        for (var i = 0; i < this.allCandidates.length; i++) {
          var c = this.allCandidates[i];
          if (!byId[c.id]) continue;
          var next = {};
          for (var k in c) if (Object.prototype.hasOwnProperty.call(c, k)) next[k] = c[k];
          for (var k2 in patch) if (Object.prototype.hasOwnProperty.call(patch, k2)) next[k2] = patch[k2];
          this.allCandidates[i] = next;
        }
        this._candidatesVersion++;
        this._funnelCacheSig = '';
      },

      bulkAdvance: async function () {
        if (this.bulkBusy) return;
        if (!this.bulkActionStageId) return;
        if (this.selectedIds.length === 0) return;
        var targetId = parseInt(this.bulkActionStageId, 10);
        var ids = this.selectedIds.slice();
        this.bulkBusy = true;
        try {
          var result = await gasCall('bulkAdvanceStage', ids, targetId);
          this._summarizeBulkResult('Moved', result);
          // Local mutation from successIds — saves the 300-1500ms
          // getCandidates re-fetch. settings.stages already has the
          // metadata we need to denormalize stage_name + status.
          var stage = (this.settings.stages || []).find(function (s) { return s.id === targetId; });
          var newStatus = stage && stage.is_hired ? 'Hired'
                        : stage && stage.is_rejected ? 'Rejected'
                        : null;
          var today = new Date().toISOString().slice(0, 10);
          var patch = {
            stage_id:               targetId,
            stage_name:             stage ? stage.name : '',
            date_last_stage_update: today,
          };
          if (newStatus) patch.status = newStatus;
          this._patchCandidatesById(result.successIds || [], patch);
          // Drop successfully-moved candidates from selection so the
          // action bar doesn't keep them around as if still pending.
          var done = {};
          (result.successIds || []).forEach(function (id) { done[id] = true; });
          this.selectedIds = this.selectedIds.filter(function (id) { return !done[id]; });
          this.bulkActionStageId = '';
        } catch (e) {
          this.toastError('Bulk move failed: ' + (e.message || String(e)));
        } finally {
          this.bulkBusy = false;
        }
      },
      bulkAssign: async function () {
        if (this.bulkBusy) return;
        if (this.selectedIds.length === 0) return;
        var rid = this.bulkActionRecruiterId === '' ? null : parseInt(this.bulkActionRecruiterId, 10);
        var ids = this.selectedIds.slice();
        this.bulkBusy = true;
        try {
          var result = await gasCall('bulkAssignRecruiter', ids, rid);
          this._summarizeBulkResult('Assigned', result);
          var recruiter = rid != null
            ? (this.settings.recruiters || []).find(function (r) { return r.id === rid; })
            : null;
          this._patchCandidatesById(result.successIds || [], {
            recruiter_id:   rid,
            recruiter_name: recruiter ? recruiter.name : '',
          });
          this.bulkActionRecruiterId = '';
        } catch (e) {
          this.toastError('Bulk assign failed: ' + (e.message || String(e)));
        } finally {
          this.bulkBusy = false;
        }
      },
      bulkReject: function () {
        // Defer to the existing rejectModal but in bulk mode so the
        // refuse_reason picker is reused. Modal calls bulkRejectCandidates
        // on confirm.
        if (this.bulkBusy) return;
        if (this.selectedIds.length === 0) return;
        var byId = {};
        (this.allCandidates || []).forEach(function (c) { byId[c.id] = c; });
        var selectedNames = this.selectedIds.map(function (id) {
          var c = byId[id];
          return c ? ((c.first_name || '') + ' ' + (c.last_name || '')).trim() : ('Candidate ' + id);
        });
        this.openModal('confirmReject', {
          bulk: true,
          ids: this.selectedIds.slice(),
          names: selectedNames,
        });
      },

      // ── Per-section refetches (server-side) ───────────────
      // Flips the per-section loading flag while the request is in
      // flight so the section can render a spinner / skeleton without
      // touching the page-wide `loading` state. Persisted filter state
      // is saved AFTER a successful refetch so a failed call doesn't
      // pollute storage with a state that can't be reproduced.
      // Debounce + race-safe wrappers so rapid dropdown changes within
      // a section don't queue 4 in-flight requests. Each section has its
      // own seq counter so cross-section changes don't cancel each other.
      // (The old _recruiterReload* counters were removed with the
      // Recruiter Performance section — see Apr 2026 cleanup.)
      _sourceReloadSeq:    0, _sourceReloadTimer:    null,
      _analyticsReloadSeq: 0, _analyticsReloadTimer: null,

      reloadSourceEffectiveness: function () {
        var self = this;
        var seq = ++this._sourceReloadSeq;
        if (this._sourceReloadTimer) clearTimeout(this._sourceReloadTimer);
        var f = self.mergeSectionFilters(self.sourceFilters);
        var cacheKey = JSON.stringify(f);
        // Instant cache hit path — same pattern as reloadWaterfall.
        var cached = sourceCache.get(cacheKey);
        if (cached) {
          self.sourceEffectiveness = cached;
          self.scheduleChartRender();
          self.sourceLoading = false;
          self._persistSectionState();
          return;
        }
        self.sourceLoading = true;
        this._sourceReloadTimer = setTimeout(async function () {
          try {
            var rows = await gasCall('getSourceEffectiveness', f);
            if (seq !== self._sourceReloadSeq) return;
            sourceCache.set(cacheKey, rows);
            self.sourceEffectiveness = rows;
            self.scheduleChartRender();
            self._persistSectionState();
          } catch (e) {
            if (seq !== self._sourceReloadSeq) return;
            Alpine.store('app').toastError('Source ROI reload failed: ' + e.message);
          } finally {
            if (seq === self._sourceReloadSeq) self.sourceLoading = false;
          }
        }, 200);
      },

      // ── Waterfall (cohort) reload ─────────────────────────
      // Independent of reloadFunnel — this one round-trips to the server
      // because we need allHistory, which isn't loaded on the client.
      // Debounced the same way as reloadSourceEffectiveness so dragging
      // the date picker doesn't fire 20 RPCs.
      _waterfallReloadSeq: 0,
      reloadWaterfall: function () {
        var self = this;
        var seq = ++this._waterfallReloadSeq;
        if (this._waterfallReloadTimer) clearTimeout(this._waterfallReloadTimer);
        // All-Time semantics: BOTH startDate and endDate empty = "no
        // window at all" — include every candidate, never exclude for
        // missing date_applied. We only normalize endDate to today when
        // startDate is set (a real window with an open upper bound).
        var f = Object.assign({}, self.waterfallFilters);
        if (f.startDate && !f.endDate) {
          f.endDate = new Date().toISOString().slice(0, 10);
        }
        var cacheKey = JSON.stringify(f);

        // Cache hit → instant render, skip RPC entirely. On miss we fall
        // through to the debounced fetch. The cache key includes every
        // filter dimension, so any change invalidates; see
        // _clearSectionCaches for the sync-driven invalidation path.
        var cached = waterfallCache.get(cacheKey);
        if (cached) {
          self.waterfallData = cached;
          self.waterfallLoading = false;
          self._persistSectionState();
          return;
        }

        // Flip the "revalidating" flag rather than the data-blocking
        // `loading` one: the UI keeps showing the last-known waterfallData
        // while the new one arrives. This is the crucial fix for the
        // "panel goes blank during filter change" pain.
        self.waterfallRevalidating = true;
        // Only true-loading (no data yet) gates the empty loading-state.
        self.waterfallLoading = !self.waterfallData;
        this._waterfallReloadTimer = setTimeout(async function () {
          try {
            var result = await gasCall('getWaterfallMetrics', f);
            if (seq !== self._waterfallReloadSeq) return;
            waterfallCache.set(cacheKey, result);
            self.waterfallData = result;
            self._persistSectionState();
          } catch (e) {
            if (seq !== self._waterfallReloadSeq) return;
            Alpine.store('app').toastError('Waterfall reload failed: ' + e.message);
          } finally {
            if (seq === self._waterfallReloadSeq) {
              self.waterfallLoading = false;
              self.waterfallRevalidating = false;
            }
          }
        }, 250);
      },

      // Per-recruiter breakdown (#14). For each active recruiter, counts
      // how many of their candidates in the cohort reached each stage.
      // Computed client-side from allCandidates (recruiter_id lookup) +
      // waterfallData.rows[].candidate_ids (cohort members per stage).
      get waterfallByRecruiter() {
        if (!this.waterfallData || !this.waterfallData.rows) return [];
        var cands = this.allCandidates || [];
        var candById = {};
        for (var i = 0; i < cands.length; i++) candById[cands[i].id] = cands[i];
        var recs = (this.settings.recruiters || []).filter(function (r) { return r.is_active; });

        // Include "Unassigned" bucket so no cohort candidate is silently dropped.
        var buckets = recs.map(function (r) { return { id: r.id, name: r.name, perStage: [] }; });
        buckets.push({ id: null, name: '— Unassigned —', perStage: [] });

        var self = this;
        this.waterfallData.rows.forEach(function (row, si) {
          var counts = {};  // recruiter_id (or 'null') → count
          (row.candidate_ids || []).forEach(function (cid) {
            var c = candById[cid];
            var rid = (c && c.recruiter_id) ? c.recruiter_id : null;
            var key = rid == null ? 'null' : rid;
            counts[key] = (counts[key] || 0) + 1;
          });
          buckets.forEach(function (b) {
            var key = b.id == null ? 'null' : b.id;
            b.perStage[si] = counts[key] || 0;
          });
        });

        // Drop empty rows — a recruiter with 0 in every stage isn't useful.
        // Keep "Unassigned" only if it has candidates.
        return buckets.filter(function (b) { return b.perStage.some(function (n) { return n > 0; }); });
      },

      resetWaterfallFilters: function () {
        this.waterfallFilters = {
          startDate: '',
          endDate:   '',
          preset:    'all',
          jobIds: [], sourceIds: [], recruiterIds: [], motions: [], regionIds: [],
        };
        this.reloadWaterfall();
      },

      // Bar width: count relative to cohortSize (so the first row is
      // always 100% wide = everyone in the cohort).
      waterfallBarWidth: function (row) {
        if (!this.waterfallData || !this.waterfallData.cohortSize) return 0;
        return Math.round((row.count / this.waterfallData.cohortSize) * 100);
      },

      // Render the benchmark chip text. Returns an HTML string so we can
      // color the arrow separately from the number in a future pass.
      waterfallBenchDisplay: function (row) {
        if (row.bench_pct === null) return '—';
        var arrow;
        if (row.step_pct === null) arrow = '';
        else if (row.step_pct > row.bench_pct) arrow = '▲ ';
        else if (row.step_pct < row.bench_pct) arrow = '▼ ';
        else arrow = '▬ ';
        return arrow + row.bench_pct + '%';
      },

      // Pretty "Apr 1" / "Apr 23" date formatter. Bulletproof against
      // undefined / null / '' / unexpected shapes — always returns a
      // safe string (never the literal word "undefined").
      formatDateShort: function (isoStr) {
        if (isoStr == null || isoStr === '') return '';
        var raw = String(isoStr);
        if (raw === 'undefined' || raw === 'null') return '';
        var s = raw.slice(0, 10);
        var parts = s.split('-');
        if (parts.length !== 3) return s;
        var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var m = parseInt(parts[1], 10) - 1;
        var d = parseInt(parts[2], 10);
        if (isNaN(m) || isNaN(d) || m < 0 || m > 11) return s;
        return monthNames[m] + ' ' + d;
      },

      // Count maps for dropdown badges ("xDR Bay Area (14)"). Scans the
      // full candidate set, not the filtered cohort, so users can see
      // which buckets have candidates BEFORE picking a filter.
      get waterfallCounts() {
        var byJob = {}, byRecruiter = {}, bySource = {};
        var cands = this.allCandidates || [];
        for (var i = 0; i < cands.length; i++) {
          var c = cands[i];
          if (c.job_id)       byJob[c.job_id]             = (byJob[c.job_id]          || 0) + 1;
          if (c.recruiter_id) byRecruiter[c.recruiter_id] = (byRecruiter[c.recruiter_id] || 0) + 1;
          if (c.source_id)    bySource[c.source_id]       = (bySource[c.source_id]       || 0) + 1;
        }
        return { byJob: byJob, byRecruiter: byRecruiter, bySource: bySource };
      },

      // Human cohort-window label: "Apr 1 – today" / "All time" / etc.
      waterfallWindowLabel: function () {
        var f = this.waterfallFilters || {};
        var s = this.formatDateShort(f.startDate);
        var e = this.formatDateShort(f.endDate);
        if (!s && !e) return 'all time';
        if (!s) return 'through ' + e;
        return s + ' – ' + (e || 'today');
      },

      // Which specific job the cohort is currently scoped to, or null for
      // "all jobs." Used in the cohort summary line AND for routing the
      // Goal-chip click into Settings for per-job override editing.
      // With multi-select, a single-job selection keeps the existing
      // "edit this job's goals" flow; any multi-job selection falls back
      // to "no single job" (null) so the override flow doesn't misfire.
      waterfallActiveJob: function () {
        var f = this.waterfallFilters || {};
        var ids = (f.jobIds && f.jobIds.length > 0) ? f.jobIds : (f.jobId ? [f.jobId] : []);
        if (ids.length !== 1) return null;
        var id = ids[0];
        if (id === '__unassigned__') return null;
        return (this.jobs || []).find(function (j) { return j.id == id; }) || null;
      },

      // Tooltip for the Goal cell.
      waterfallStepTitle: function (row) {
        if (!row || row.step_pct == null) return 'Step % is not shown for the first stage.';
        if (row.bench_pct == null) return 'Step %: ' + row.step_pct + '% moved here from the previous stage.';
        var diff = row.step_pct - row.bench_pct;
        if (diff === 0) {
          return 'Step %: ' + row.step_pct + '%. On goal.';
        }
        if (diff > 0) {
          return 'Step %: ' + row.step_pct + '%. ' + diff + ' pts above goal.';
        }
        return 'Step %: ' + row.step_pct + '%. ' + Math.abs(diff) + ' pts below goal.';
      },
      waterfallBenchTitle: function (row) {
        if (!row || row.bench_pct == null) return 'Goal %: no goal set. Click to set one.';
        if (row.step_pct == null) return 'Goal %: ' + row.bench_pct + '%. Click to edit.';
        var diff = row.step_pct - row.bench_pct;
        if (diff === 0) return 'Goal %: ' + row.bench_pct + '%. Actual matches goal. Click to edit.';
        if (diff > 0) return 'Goal %: ' + row.bench_pct + '%. Actual is ' + diff + ' pts above. Click to edit.';
        return 'Goal %: ' + row.bench_pct + '%. Actual is ' + Math.abs(diff) + ' pts below. Click to edit.';
      },

      // Click a Goal cell → open Settings → Waterfall Goals (the matrix
      // editor). Flash the stage's row so the admin sees exactly where
      // to type. One destination regardless of what job is active —
      // simpler to learn than branching on selection state.
      openBenchmarkEditor: function (row) {
        if (!row) return;
        this.openSettings();
        var s = Alpine.store('app');
        s.settingsTab = 'goals';
        s.settingsFlashStage = row.stage_id;
        var activeJob = this.waterfallActiveJob();
        s.settingsGoalJobId = activeJob ? activeJob.id : null;
      },

      // Drill-down: click a waterfall row to see the candidates in that
      // bucket. Toggles closed if already open. Resolves the IDs returned
      // by the backend (row.candidate_ids) against allCandidates on the
      // client — no extra RPC needed.
      toggleWaterfallRow: function (stageId) {
        this.waterfallExpanded = (this.waterfallExpanded === stageId) ? null : stageId;
      },

      waterfallRowCandidates: function (row) {
        if (!row || !row.candidate_ids || !row.candidate_ids.length) return [];
        var idSet = {};
        for (var i = 0; i < row.candidate_ids.length; i++) idSet[row.candidate_ids[i]] = true;
        var joined = (this.allCandidates || []).filter(function (c) { return idSet[c.id]; });
        // Sort by last name for scannability. Preserves reference equality
        // on subsequent renders since filter() returns a new array each time.
        joined.sort(function (a, b) {
          return (a.last_name || '').localeCompare(b.last_name || '') ||
                 (a.first_name || '').localeCompare(b.first_name || '');
        });
        // Cap at 100 so enormous cohorts don't lag the DOM. Shows a "+N more"
        // indicator in the UI when truncated.
        return joined.slice(0, 100);
      },

      // Bottom-of-page Analytics section refetch. Routes through
      // getAnalyticsHistorical, which returns just the three panels
      // (funnelConversion, timeToHireTrend, stageVelocity) so we don't
      // churn the recruiter perf / source ROI / SLA / stale state the
      // user may have separately filtered on.
      reloadAnalyticsHistorical: function () {
        var self = this;
        var seq = ++this._analyticsReloadSeq;
        if (this._analyticsReloadTimer) clearTimeout(this._analyticsReloadTimer);
        var f = self.mergeSectionFilters(self.analyticsFilters);
        var cacheKey = JSON.stringify(f);
        var cached = analyticsCache.get(cacheKey);
        if (cached) {
          self.analytics = {
            funnelConversion: cached.funnelConversion,
            timeToHireTrend:  cached.timeToHireTrend,
            stageVelocity:    cached.stageVelocity,
            rejectionReasons: cached.rejectionReasons || [],
          };
          self.scheduleChartRender();
          self.analyticsHistoricalLoading = false;
          self._persistSectionState();
          return;
        }
        self.analyticsHistoricalLoading = true;
        this._analyticsReloadTimer = setTimeout(async function () {
          try {
            var a = await gasCall('getAnalyticsHistorical', f);
            if (seq !== self._analyticsReloadSeq) return;
            analyticsCache.set(cacheKey, a);
            self.analytics = {
              funnelConversion: a.funnelConversion,
              timeToHireTrend:  a.timeToHireTrend,
              stageVelocity:    a.stageVelocity,
              rejectionReasons: a.rejectionReasons || [],
            };
            self.scheduleChartRender();
            self._persistSectionState();
          } catch (e) {
            if (seq !== self._analyticsReloadSeq) return;
            Alpine.store('app').toastError('Analytics reload failed: ' + e.message);
          } finally {
            if (seq === self._analyticsReloadSeq) self.analyticsHistoricalLoading = false;
          }
        }, 200);
      },

      // Debounced analytics-tab reload. Called by the Analytics section's
      // own filter row on every change so the KPIs / charts refetch with
      // the current scope. Kept in the root so peek+funnel helpers can
      // trigger a historical refresh without caring about the internal
      // RAF debounce machinery.
      applyFilters: function () {
        var self = this;
        var raf = (typeof requestAnimationFrame === 'function')
          ? requestAnimationFrame : function (cb) { setTimeout(cb, 0); };
        raf(function () {
          var seq = ++self._globalAnalyticsReloadSeq;
          self.globalAnalyticsLoading = true;
          if (self._globalAnalyticsReloadTimer) clearTimeout(self._globalAnalyticsReloadTimer);
          self._globalAnalyticsReloadTimer = setTimeout(function () {
            self.loadAnalytics(self.buildDashboardFilters(), seq)
              .then(function () {
                if (seq !== self._globalAnalyticsReloadSeq) return;
                self.scheduleChartRender();
                self.pruneSelectionToVisible();
                self.globalAnalyticsLoading = false;
              })
              .catch(function (e) {
                if (seq !== self._globalAnalyticsReloadSeq) return;
                self.globalAnalyticsLoading = false;
                Alpine.store('app').toastError(userFacingError(e, 'Analytics refresh failed.', 'Try Refresh now.'));
              });
          }, 250);
        });
      },

      // (sortBy / sortIcon / scrollTop removed — no list view to sort or jump to.)
      toggleDrill: function (key) { this.drill = this.drill === key ? null : key; },
      setAnalyticsView: function (view) {
        var next = (view === 'source') ? 'source' : 'historical';
        this.analyticsView = next;
        this.showAnalytics = true;
      },

      // Sticky-nav jump. Smooth-scrolls so the section title clears the
      // sticky topbar (~56px) + the nav rail (~44px) above it. window.scrollTo
      // with `top` calculated from getBoundingClientRect handles this in one
      // call without needing CSS scroll-margin-top on every section.
      scrollToSection: function (id) {
        var el = document.getElementById(id);
        if (!el) return;
        var rect = el.getBoundingClientRect();
        var topbar = document.querySelector('.topbar');
        var nav = document.querySelector('.section-nav');
        var offset =
          (topbar ? topbar.getBoundingClientRect().height : 0) +
          (nav    ? nav.getBoundingClientRect().height    : 0) +
          8;
        window.scrollTo({ top: rect.top + window.scrollY - offset, behavior: 'smooth' });
      },

      // Lazy-load activity feed on first expand (saves a sheet scan on page
      // load for users who don't open it). Reloaded on every open — tiny
      // payload, avoids stale "2 hours ago" labels when the section has
      // been left open.

      // Restore a rejected candidate to the first active stage, with an
      // optional confirm so it can't be triggered by a stray click.
      //
      // Previously this fired three serial calls (updateCandidateStage →
      // updateCandidate → reloadAll), all blocking, which felt like a
      // 2-3 second freeze. Now we run the two writes in parallel and
      // patch local state immediately so the candidate visibly leaves
      // the rejected bucket without waiting for the round-trips. A
      // background refreshCandidate fills in the denormalized fields.
      reactivateCandidate: async function (c) {
        if (!c || !c.id) return;
        var name = ((c.first_name || '') + ' ' + (c.last_name || '')).trim() || 'this candidate';
        var ok = await Alpine.store('app').confirm({
          title:        'Restore from Rejected?',
          message:      name + ' will move back into the pipeline at the first active stage.',
          confirmLabel: 'Restore candidate',
          cancelLabel:  'Cancel',
        });
        if (!ok) return;
        var firstStage = this.settings.stages
          .filter(function (s) { return s.is_enabled && !s.is_rejected; })
          .sort(function (a, b) { return a.sequence - b.sequence; })[0];
        if (!firstStage) {
          Alpine.store('app').toastError('No active pipeline stage configured.');
          return;
        }
        // Optimistic local patch — funnel updates immediately.
        this._patchCandidatesById([c.id], {
          stage_id:               firstStage.id,
          stage_name:             firstStage.name,
          status:                 'Active',
          refuse_reason_id:       null,
          date_last_stage_update: new Date().toISOString().slice(0, 10),
        });
        var self = this;
        try {
          // Parallel writes — both target the same row but the backend
          // serializes them via withLock, so the second one waits ~no
          // extra time vs. the first. Net: ~half the round-trip wait.
          await Promise.all([
            gasCall('updateCandidateStage', c.id, firstStage.id),
            gasCall('updateCandidate', c.id, { refuse_reason_id: null }),
          ]);
          Alpine.store('app').toastSuccess(name + ' restored to ' + firstStage.name + '.');
          // Background hydrate — pulls fresh denormalized fields + history
          // without blocking the toast. The local patch above already
          // shows the candidate in the right place.
          this.refreshCandidate(c.id).catch(function () {});
        } catch (e) {
          // Rollback the optimistic patch if either write failed.
          self._patchCandidatesById([c.id], {
            stage_id:               c.stage_id,
            stage_name:             c.stage_name,
            status:                 c.status,
            refuse_reason_id:       c.refuse_reason_id,
            date_last_stage_update: c.date_last_stage_update,
          });
          Alpine.store('app').toastError(userFacingError(e, 'Restore failed.', 'Try again.'));
        }
      },

      loadActivityFeed: async function () {
        this.activityLoading = true;
        try {
          // stage_to_color is enriched client-side from settings.stages
          var rows = await gasCall('getRecentActivity', 50);
          var stageMap = {};
          this.settings.stages.forEach(function (s) { stageMap[s.id] = s.color; });
          this.activity = rows.map(function (r) {
            return Object.assign({}, r, { stage_to_color: stageMap[r.stage_to_id] || '#6c757d' });
          });
        } catch (e) {
          Alpine.store('app').toastError('Could not load activity: ' + e.message);
        } finally {
          this.activityLoading = false;
        }
      },
      openActivityPanel: async function () {
        this.activityPanelOpen = true;
        await this.loadActivityFeed();
      },
      closeActivityPanel: function () {
        this.activityPanelOpen = false;
      },

      // ── Inline candidate field update ────────────────────
      // Sends date_last_stage_update as the optimistic-lock version so a
      // teammate's intervening edit produces a CONFLICT error instead of
      // silently overwriting their work. On conflict we keep the local
      // optimistic value (so the user can copy it before reloading) but
      // surface a Reload action via the toast.
      updateCandidateField: async function (c, field, value) {
        var prev = c[field];
        c[field] = value;   // optimistic
        this._candidatesVersion++;
        this._funnelCacheSig = '';

        var self = this;
        this.inlineSavingCount++;
        try {
          if (field === 'stage_id') {
            await gasCall('updateCandidateStage', c.id, value, c.date_last_stage_update);
          } else {
            var updates = {};
            updates[field] = value;
            await gasCall('updateCandidate', c.id, updates, c.date_last_stage_update);
          }
          // Background refresh for denormalized fields (stage_name, recruiter_name,
          // source_name, date_last_stage_update version token). Fire-and-forget —
          // the user already sees their change applied locally.
          this.refreshCandidate(c.id).catch(function () {});
          // No success toast for inline field saves: a recruiter moving
          // through 10 candidates in a row was getting a stack of "Saved."
          // toasts that felt noisy. The UI already reflects the change;
          // the .inlineSavingCount pip provides feedback while saving.
        } catch (e) {
          c[field] = prev;   // rollback
          this._candidatesVersion++;
          this._funnelCacheSig = '';
          if (self._isConflict(e)) {
            Alpine.store('app').toastError(
              'Conflict — someone else updated this candidate.',
              {
                actionLabel: 'Review activity',
                duration: 8000,
                onAction: function () {
                  self.openActivityPanel();
                  self.refreshCandidate(c.id);
                },
              }
            );
          } else {
            Alpine.store('app').toastError(userFacingError(e, 'Save failed.', 'Refresh and try again.'));
          }
        } finally {
          this.inlineSavingCount = Math.max(0, this.inlineSavingCount - 1);
        }
      },

      // Conflict errors come back as plain Error objects whose message is
      // prefixed by the server. Detect by prefix so we can surface a
      // different toast (Reload action) instead of the generic "save failed".
      _isConflict: function (err) {
        return !!(err && err.message && err.message.indexOf('CONFLICT: ') === 0);
      },

      refreshCandidate: async function (id) {
        try {
          var r = await gasCall('getCandidateDetail', id);
          var idx = this.allCandidates.findIndex(function (x) { return x.id === id; });
          if (idx >= 0) this.allCandidates[idx] = r.candidate;
          this._candidatesVersion++;
          this._funnelCacheSig = '';
          // Keep peek in sync if open
          if (Alpine.store('app').peek.open && Alpine.store('app').peek.candidateId === id) {
            Alpine.store('app').peek.candidate = r.candidate;
            Alpine.store('app').peek.history = r.history;
          }
        } catch (e) {
          var self = this;
          Alpine.store('app').toastError(
            userFacingError(e, 'Could not refresh candidate.', 'Try again.'),
            { actionLabel: 'Retry', duration: 8000, onAction: function () { self.refreshCandidate(id); } }
          );
        }
      },

      // ── Inline job field update ──────────────────────────
      // Patches the denormalized `recruiter_name` locally from settings
      // when the recruiter changes — saves a getJobOpenings round-trip
      // (~300-1500ms) on every inline edit. settings.recruiters is
      // always loaded by the time the user can interact with a job row.
      updateJobField: async function (j, field, value) {
        var prev = j[field];
        var prevDenorm = field === 'recruiter_id' ? j.recruiter_name : null;
        j[field] = value;
        if (field === 'recruiter_id') {
          var rid = value == null || value === '' ? null : Number(value);
          var r = rid != null
            ? (this.settings.recruiters || []).find(function (x) { return x.id === rid; })
            : null;
          j.recruiter_name = r ? r.name : '';
        }
        this.inlineSavingCount++;
        try {
          var updates = {}; updates[field] = value;
          await gasCall('updateJobOpening', j.id, updates);
          // Toast suppressed — same rationale as updateCandidateField:
          // the inlineSaving pip is enough feedback, and back-to-back
          // edits stack annoying "Job updated." toasts.
        } catch (e) {
          j[field] = prev;
          if (field === 'recruiter_id') j.recruiter_name = prevDenorm || '';
          Alpine.store('app').toastError(userFacingError(e, 'Save failed.', 'Refresh and try again.'));
        } finally {
          this.inlineSavingCount = Math.max(0, this.inlineSavingCount - 1);
        }
      },

      // Undoable job delete — same optimistic-UI + 5s undo pattern as candidate delete.
      // Server-side guard (can't delete jobs with existing candidates) still applies.
      deleteJob: async function (j) {
        var ok = await Alpine.store('app').confirm({
          title:        'Delete this job?',
          message:      '"' + j.title + '" will be removed from the open jobs list.\n\n' +
                        'You\'ll have 8 seconds to undo from the toast. Jobs with existing candidates cannot be deleted.',
          confirmLabel: 'Delete job',
          cancelLabel:  'Keep job',
          danger:       true,
        });
        if (!ok) return;
        var self = this;
        var idx = this.jobs.findIndex(function (x) { return x.id === j.id; });
        if (idx < 0) return;
        var snapshot = this.jobs[idx];
        this.jobs.splice(idx, 1);
        var undone = false;
        Alpine.store('app').toastInfo('Deleted "' + j.title + '"', {
          actionLabel: 'Undo',
          duration: 8000,
          onAction: function () {
            undone = true;
            self.jobs.splice(idx, 0, snapshot);
          },
          onDismiss: async function () {
            if (undone) return;
            try {
              await gasCall('deleteJobOpening', j.id);
            } catch (e) {
              self.jobs.splice(idx, 0, snapshot);
              Alpine.store('app').toastError(e.message);
            }
          },
        });
      },

      // ── Modals ────────────────────────────────────────────
      openModal: function (type, data) { Alpine.store('app').openModal(type, data); },
      openSettings: function () {
        Alpine.store('app').settingsDirty = false;
        Alpine.store('app').settingsOpen = true;
      },
      openPeek: function (id) { Alpine.store('app').openPeek(id); },

      // ── Topbar search (navigator, not filter) ─────────────
      // Typing updates `searchResults` with up to 8 matching candidates.
      // Selecting a result opens the peek panel and clears the search —
      // it's a "find this person and jump to them" affordance, not a
      // scope that narrows any dashboard. Client-side only; matches
      // first+last+email with case-insensitive substring. De-prioritizes
      // rejected candidates so active pipeline shows first.
      runSearch: function () {
        var q = (this.searchQuery || '').trim().toLowerCase();
        if (!q) { this.searchResults = []; this.searchOpen = false; return; }
        var hits = [];
        for (var i = 0; i < this.allCandidates.length && hits.length < 40; i++) {
          var c = this.allCandidates[i];
          var hay = ((c.first_name || '') + ' ' + (c.last_name || '') + ' ' + (c.email || '')).toLowerCase();
          if (hay.indexOf(q) !== -1) hits.push(c);
        }
        hits.sort(function (a, b) {
          var ra = a.status === 'Rejected' ? 1 : 0;
          var rb = b.status === 'Rejected' ? 1 : 0;
          if (ra !== rb) return ra - rb;
          return (a.last_name || '').localeCompare(b.last_name || '');
        });
        this.searchResults = hits.slice(0, 8);
        this.searchOpen = this.searchResults.length > 0;
      },
      clearSearch: function () {
        this.searchQuery = '';
        this.searchResults = [];
        this.searchOpen = false;
      },
      selectSearchResult: function (id) {
        this.clearSearch();
        this.openPeek(id);
      },

      // ── Expiry helpers ────────────────────────────────────
      isExpired: function (d) { return d && new Date(d).getTime() < Date.now(); },
      isExpiringSoon: function (d) {
        if (!d) return false;
        var t = new Date(d).getTime();
        return t >= Date.now() && t <= Date.now() + 7 * 86400000;
      },

      // (Kanban drag handlers removed — funnel-primary layout has no Kanban
      //  view. The HTML-rendered funnel doesn't currently support drag-to-
      //  reorder; stage changes happen via the inline dropdown in the peek
      //  panel. Re-introduce SortableJS here if drag-to-stage is desired
      //  on the funnel rows themselves.)

      // ── Chart rendering ──────────────────────────────────
      // Analytics now has two views:
      //   - historical: funnel/trend/stage tables
      //   - source: sourcing ROI donut + table

      renderCharts: function () {
        if (!this.showAnalytics) return;
        if (this.analyticsView === 'source') {
          this.renderSourceChart();

        }

        this.renderTrendChart();

      //  superseded by the Pipeline Funnel section's HTML-rendered bars
      //  with click-to-expand candidate lists. The chart's #pipelineChart
      //  canvas no longer exists in the DOM.)

      renderFunnelChart: function () {

        }));
        if (funnelChart && sig === lastFunnelChartSig) return;
        lastFunnelChartSig = sig;
        var labels = f.map(function (x) { return x.stage_name; });
        var data   = f.map(function (x) { return x.conversion_rate; });
        // Update in place when the chart already exists — Chart.js morphs
        // bars to their new heights via its animation instead of the
        // destroy + re-create path, which produces a visible flash of an
        // empty canvas (~30-80ms) on every filter change. First render
        // still uses new Chart(); subsequent renders use .update().
        if (funnelChart) {
          funnelChart.data.labels = labels;
          funnelChart.data.datasets[0].data = data;
          funnelChart.update();
          return;
        }
        funnelChart = new Chart(el, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              data: data,
              backgroundColor: 'rgba(242,131,31,0.75)',
              borderColor: '#F2831F', borderWidth: 1, borderRadius: 4,

          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: function (c) { return c.raw + '%'; } } },
            },
            scales: {
              y: { min: 0, max: 100, ticks: { callback: function (v) { return v + '%'; }, font: { size: 11 } } },
              x: { ticks: { font: { size: 11 } } },

          },
        });

      renderSourceChart: function () {
        if (!this.showAnalytics || this.analyticsView !== 'source') return;
        var el = document.getElementById('sourceDonutChart');
        if (!el) return;
        // Promoted out of the collapsed analytics object — sourceEffectiveness
        // is now a top-level field updated by reloadSourceEffectiveness when
        // the Sourcing ROI section's filters change.
        var s = this.sourceEffectiveness;
        var sig = JSON.stringify(s.map(function (x) {
          return [x.source_id, x.source_name, x.total_candidates];
        }));
        if (sourceChart && sig === lastSourceChartSig) return;
        lastSourceChartSig = sig;
        // TPG orange leads, then diverse accents for additional sources
        var colors = ['#F2831F','#239ED8','#3AA76D','#8E5DC9','#E14B4B','#1A1A2E'];
        var labels = s.map(function (x) { return x.source_name; });
        var data   = s.map(function (x) { return x.total_candidates; });
        var bgs    = s.map(function (_, i) { return colors[i % colors.length]; });
        // Update-in-place — crucial for donut where legend flicker on
        // re-create is the jarring bit (donut labels rebuild their row
        // of color dots). `.update()` just morphs slice angles.
        if (sourceChart) {
          sourceChart.data.labels = labels;
          sourceChart.data.datasets[0].data = data;
          sourceChart.data.datasets[0].backgroundColor = bgs;
          sourceChart.update();
