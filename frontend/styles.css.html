.funnel-candidate-row-selected {
  background: rgba(var(--primary-rgb, 89, 74, 226), 0.08);
  box-shadow: inset 3px 0 0 var(--primary, #594AE2);
}
.funnel-candidate-row-selected:hover {
  background: rgba(var(--primary-rgb, 89, 74, 226), 0.12);
}

/* Bulk-select header at the top of an expanded stage. Subtle so it
   doesn't crowd the candidate list, but always present once the stage
   has any rows so users notice the "Select all" affordance the first
   time they expand a stage. */
.funnel-stage-bulk-header {
  display: flex;
  justify-content: flex-start;
  padding: 4px 10px 4px 36px;
  font-size: 11px;
  color: var(--text-muted);
}
.funnel-stage-bulk-label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  user-select: none;
  font-weight: 500;
}
.funnel-stage-bulk-label input[type=checkbox] {
  margin: 0;
  cursor: pointer;
}

.funnel-cand-check {
  display: inline-flex;
  align-items: center;
  cursor: pointer;
  padding: 4px;       /* widen tap target without affecting layout */
  margin: -4px 0;     /* compensate so row height isn't bumped */
}
.funnel-cand-check input[type=checkbox] {
  margin: 0;
  cursor: pointer;
  /* Slightly larger checkbox so the multi-select affordance is
     immediately visible as the row's first interactive element. */
  width: 14px;
  height: 14px;
}

/* ── Bulk action bar (floating) ──────────────────────────────
   Sticks to the bottom of the viewport when ≥1 candidate is selected.
   Fixed positioning so it stays in view as the user scrolls between
   stages making more selections. The slide-up animation gives the
   "something just appeared, look here" cue. */
.bulk-action-bar {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 800;
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  box-shadow: 0 14px 32px rgba(0, 0, 0, 0.18), 0 4px 12px rgba(0, 0, 0, 0.08);
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 480px;
  max-width: calc(100vw - 40px);
  animation: bulkBarSlideUp 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.bulk-action-bar-busy {
  pointer-events: none;
  opacity: 0.85;
}
@keyframes bulkBarSlideUp {
  from { transform: translate(-50%, 20px); opacity: 0; }
  to   { transform: translate(-50%, 0);    opacity: 1; }
}
/* Leading × dismiss button. Big tap target so cancellation is the
   first interactive element in the bar — abandoning a misstart should
   be reachable in one click without having to read the action labels.
   Pairs with the Esc keyboard shortcut and the explicit "Cancel
   selection" button on the right. */
.bulk-cancel-x {
  background: transparent;
  border: none;
  width: 28px; height: 28px;
  border-radius: 6px;
  font-size: 20px;
  line-height: 1;
  color: var(--text-muted);
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s ease, color 0.15s ease;
}
.bulk-cancel-x:hover {
  background: rgba(0, 0, 0, 0.06);
  color: var(--text);
}
.bulk-cancel-x:disabled { opacity: 0.5; cursor: not-allowed; }

.bulk-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
}
.bulk-count strong {
  color: var(--primary);
  font-size: 15px;
  margin-right: 2px;
}
.bulk-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.bulk-action-select {
  min-width: 160px;
  font-size: 12.5px;
  padding: 5px 26px 5px 10px;
}
.bulk-busy-pip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
}
.bulk-busy-pip .material-icons {
  font-size: 14px !important;
  animation: peekStatusSpin 1.2s linear infinite;
}

/* On narrow viewports (mobile, peek panel taking 480px) the bar wraps
   into a stacked layout so the actions don't overflow. */
@media (max-width: 720px) {
  .bulk-action-bar {
    flex-direction: column;
    min-width: 0;
    width: calc(100vw - 24px);
    bottom: 8px;
  }
  .bulk-actions { width: 100%; }
  .bulk-action-select { flex: 1 1 calc(50% - 4px); min-width: 0; }
}

/* ── Debug panel (?debug=1) ──────────────────────────────────
   Center-anchored modal-ish panel for inspecting the live app state
   without shipping throw-away diagnostic code. The dark backdrop
   makes the data legible against a busy dashboard. */
.debug-panel {
  position: fixed; inset: 0;
  z-index: 9000;
  background: rgba(0, 0, 0, 0.55);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 16px;
  overflow-y: auto;
}
.debug-card {
