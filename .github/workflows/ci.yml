name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  unit:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run Jest tests
        run: npm test -- --ci --reporters=default
      - name: Build GAS bundle (dry-run verify)
        run: node build.js

  qa:
    name: Cloud QA (Playwright, qa/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build qa/ bundle + boot mock server
        run: |
          npm run qa:bundle
          nohup node qa/server.js > qa-server.log 2>&1 &
          echo $! > qa-server.pid
          for i in $(seq 1 30); do
            if curl -fs http://localhost:4567/ > /dev/null; then
              echo "qa/server.js up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "qa/server.js failed to boot within 30s"
          cat qa-server.log
          exit 1
      - name: Run 36-check Playwright QA suite
        run: npm run qa
      - name: Stop mock server
        if: always()
        run: |
          if [ -f qa-server.pid ]; then
            kill "$(cat qa-server.pid)" 2>/dev/null || true
          fi
      - name: Upload QA report + screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: |
            qa/QA-REPORT.md
            qa/results.json
            qa/screenshots/
            qa-server.log
          retention-days: 14
          if-no-files-found: ignore
