name: CI

# ── Trigger policy (solo-dev-with-parallel-agents mode) ────────────
# Jest: runs on every push to main + every PR. Fast, stable, rarely
#   broken by UX iterations, catches real backend regressions.
# QA:   MANUAL ONLY via workflow_dispatch. Rapid UX iteration with
#   two agents + live editing made per-push QA too noisy to be a useful
#   signal. Run it when the dust settles on a design change, or when
#   a PR is ready to merge.
on:
  push:
    branches: [main]
    paths-ignore: ['**.md', '.gitignore', 'DEPLOY.md']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test -- --ci --reporters=default
      - name: Build GAS bundle (dry-run verify)
        run: node build.js

  qa:
    name: Cloud QA (Playwright, qa/) — manual-only
    # Only run on manual trigger; skips on regular push/PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build qa/ bundle + boot mock server
        run: |
          npm run qa:bundle
          nohup node qa/server.js > qa-server.log 2>&1 &
          echo $! > qa-server.pid
          for i in $(seq 1 30); do
            if curl -fs http://localhost:4567/ > /dev/null; then break; fi
            sleep 1
          done
      - run: npm run qa
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: |
            qa/QA-REPORT.md
            qa/results.json
            qa/screenshots/
            qa-server.log
          retention-days: 14
          if-no-files-found: ignore
